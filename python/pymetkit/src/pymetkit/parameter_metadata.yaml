- id: 1
  shortname: strf
  longname: Stream function
  units: m**2 s**-1
  description: The horizontal wind field can be separated into divergent flow (i.e.,
    flow that is purely divergent, with no swirl or rotation) and rotational flow
    (i.e., flow that is purely rotational and has no divergence).<br/><br/>The rotational
    (non-divergent) flow follows lines of constant stream function value (streamlines)
    and the speed of flow is proportional to the stream function gradient.<br/><br/>So
    streamlines show patterns of horizontal, rotational, air flow and the paths that
    particles would follow if the flow did not change with time.
- id: 2
  shortname: vp
  longname: Velocity potential
  units: m**2 s**-1
  description: The horizontal wind field can be separated into divergent flow (i.e.,
    flow that is purely divergent, with no swirl or rotation) and rotational flow
    (i.e., flow that is purely rotational and has no divergence).<br/><br/>This parameter
    is the scalar quantity whose gradient is the velocity vector of the irrotational
    flow. It can be used to show areas where the air is diverging (spreading out)
    or converging, which, depending on the vertical level, relate to ascending or
    descending air.
