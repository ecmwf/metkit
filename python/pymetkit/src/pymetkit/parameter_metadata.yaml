  units: W m**-2
  description: null
- id: 162087
  shortname: viozd
  longname: Total column vertically-integrated divergence of ozone flux
  units: kg m**-2 s**-1
  description: <p>The vertical integral of the ozone flux is the horizontal rate of
    flow of ozone, per metre across the flow, for a column of air extending from the
    surface of the Earth to the top of the atmosphere. Its horizontal divergence is
    the rate of ozone spreading outward from a point, per square metre. This parameter
    is positive for ozone that is spreading out, or diverging, and negative for the
    opposite, for ozone that is concentrating, or converging (convergence).<br><br>This
    parameter thus indicates whether atmospheric motions act to decrease (for divergence)
    or increase (for convergence) the vertical integral of ozone.<br><br>In the ECMWF
    Integrated Forecasting System (IFS), there is a simplified representation of ozone
    chemistry (including a representation of the chemistry which has caused the ozone
    hole). Ozone is also transported around in the atmosphere through the motion of
    air.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#chapter.10">See
    further documentation</a>.</p>
- id: 162088
  shortname: vilwe
  longname: Total column vertically-integrated eastward cloud liquid water flux
