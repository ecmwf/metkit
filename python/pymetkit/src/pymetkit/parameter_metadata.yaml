- id: 171024
  shortname: lmlta
  longname: Lake mix-layer temperature anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mixed-layer temperature of inland water
    bodies (lakes, reservoirs and rivers) or coastal waters is higher/lower than the
    long-term average. The long-term average is typically derived from several decades
    of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates'>further
    information</a> ).<br/><br/>The mixed-layer temperature is the temperature of
    the uppermost layer of a lake that is well mixed. The ECMWF Integrated Forecasting
    System represents inland water bodies and coastal waters with two layers in the
    vertical, the mixed layer above and the thermocline below, where temperature changes
    with depth. The upper boundary of the thermocline is located at the mixed layer
    bottom, and the lower boundary of the thermocline at the lake bottom.<br/><br/>Mixing
    can occur when the density of the surface (and near-surface) water is greater
    than that of the water below. Mixing can also occur through the action of wind
    on the surface of the lake.<br/><br/>ECMWF implemented a lake model in May 2015
    to represent the water temperature and lake ice of all the world's major inland
    water bodies in the Integrated Forecasting System (IFS). The IFS  differentiates
    between (i) ocean water, handled by the ocean model, and (ii) inland water (lakes,
    reservoirs and rivers) and coastal waters handled by the lake parametrisation.
    Lake depth and surface area (or fractional cover) are kept constant in time.
- id: 171025
  shortname: licda
  longname: Lake ice depth anomaly
  units: m
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the ice thickness on inland water bodies
    (lakes, reservoirs and rivers) and coastal waters is higher/lower than the long-term
    average. The long-term average is typically derived from several decades of model
    data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates'>further
    information</a> ).<br/><br/>The ECMWF Integrated Forecasting System represents
    the formation and melting of ice on inland water bodies. A single ice layer is
    represented. Lake ice depth is the thickness of that ice layer.<br/><br/>ECMWF
    implemented a lake model in May 2015 to represent the water temperature and lake
    ice of all the world's major inland water bodies in the Integrated Forecasting
    System (IFS). The IFS  differentiates between (i) ocean water, handled by the
    ocean model, and (ii) inland water (lakes, reservoirs and rivers) and coastal
    waters handled by the lake parametrisation. Lake depth and surface area (or fractional
    cover) are kept constant in time.
