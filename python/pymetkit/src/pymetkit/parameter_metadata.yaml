- id: 228057
  shortname: litota3
  longname: Averaged total lightning flash density in the last 3 hours
  units: km**-2 day**-1
  description: This parameter gives the total lightning flash rate averaged over the
    last 3 hours.<br/><br/>Note that this parameter has units of flashes per square
    kilometre per day. Conversion of this parameter to units of flashes per 100 square
    kilometres per hour can give values that are easier to interpret.<br/><br/>This
    parameter accounts for cloud-to-ground flashes (between the cloud and the Earth's
    surface ) and intra-cloud flashes (between two cloud regions of opposite electric
    charge). In the ECMWF Integrated Forecasting System, the total lightning flash
    density is calculated using an empirical formula involving convective cloud and
    precipitation information, convective available potential energy (CAPE) and convective
    cloud base height, which are diagnosed by the convection scheme.
