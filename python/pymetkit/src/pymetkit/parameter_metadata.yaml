- id: 131078
  shortname: mwpg8
  longname: Mean wave period of at least 8 s
  units: '%'
  description: This parameter gives the probability (in %) that the mean wave period
    will be 8 s or above.  It is derived from the range of possible outcomes as predicted
    by the <a href='https://confluence.ecmwf.int/display/FUG/5+Forecast+Ensemble+%2528ENS%2529+-+Rationale+and+Construction'>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a mean wave period of 8 s or above.<br/><br/>The wave period
    is the average time it takes for two consecutive wave crests, on the surface of
    the ocean/sea, to pass through a fixed point. <br/><br/>The ocean/sea surface
    wave field consists of a combination of waves with different heights, lengths
    and directions (known as the two-dimensional wave spectrum). This parameter is
    derived from the mean over all frequencies and directions of the two-dimensional
    wave spectrum.<br/><br/>The wave spectrum can be decomposed into wind-sea waves,
    which are directly affected by local winds, and swell, the waves that were generated
    by the wind at a different location and time. This parameter takes account of
    both.  See <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>further
    information</a>.
