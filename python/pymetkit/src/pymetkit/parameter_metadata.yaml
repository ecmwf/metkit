- id: 173142
  shortname: lspara
  longname: Stratiform precipitation (Large-scale precipitation) anomalous rate of
    accumulation
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean large-scale precipitation rate
    is higher/lower than the long-term average. The long-term average is typically
    derived from several decades of model data and will vary with location and time
    of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>Mean large-scale precipitation rate is accumulated
    precipitation divided by the length of the accumulation period, <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>which
    depends on the data extracted</a>.<br/><br/>For this parameter, precipitation
    is made up of rain and snow that falls to the Earth's surface, generated by the
    cloud scheme in the ECMWF Integrated Forecasting System (IFS). The cloud scheme
    represents the formation and dissipation of clouds and large-scale precipitation
    due to changes in atmospheric quantities (such as pressure, temperature and moisture)
    predicted directly by the IFS at spatial scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a> or larger. Precipitation can also be due to convection generated by the
    convection scheme in the IFS. The convection scheme represents convection at spatial
    scales smaller than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>.Precipitation parameters do not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.<br/><br/>The
    units include depth in metres of water equivalent. This is the depth the water
    would have if it were spread evenly over the grid box.<br/><br/>Care should be
    taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 173143
  shortname: mcpra
  longname: Mean convective precipitation rate anomaly
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean convective precipitation rate
    is higher/lower than the long-term average. The long-term average is typically
    derived from several decades of model data and will vary with location and time
    of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>
    further information </a>).<br/><br/>Mean convective precipitation rate is accumulated
    precipitation divided by the length the accumulation period, <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>which
    depends on the data extracted</a>.<br/><br/>For this parameter, precipitation
    is rain and snow that falls to the Earth's surface, generated by the convection
    scheme in the ECMWF Integrated Forecasting System (IFS). The convection scheme
    represents convection at spatial scales smaller than the <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>. Total precipitation is made up of convective and large-scale precipitation.
    Large-scale precipitation is generated by the cloud scheme in the IFS. The cloud
    scheme represents the formation and dissipation of clouds and large-scale precipitation
    due to changes in atmospheric quantities (such as pressure, temperature and moisture)
    predicted directly by the IFS at spatial scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a> or larger. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>.<br/><br/>The units include depth, in metres of water equivalent.
    This is the depth the water would have if it were spread evenly over the <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>. Care should be taken when comparing model parameters with observations,
    because observations are often local to a particular point in space and time,
    rather than representing averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>
    model grid box and model time step </a>.
- id: 173144
  shortname: sfara
  longname: Snowfall (convective + stratiform) anomalous rate of accumulation
  units: m of water equivalent s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean snowfall rate is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates'>further
    information</a> ).<br/><br/>The mean snowfall rate is the accumulated snowfall
    divided by the length of the accumulation period, which depends on the data extracted</a>.<br/><br/>Snowfall
    is the sum of large-scale snowfall and convective snowfall. Large-scale snowfall
    is generated by the cloud scheme in the ECMWF Integrated Forecast System. The
    cloud scheme represents the formation and dissipation of clouds and large-scale
    snowfall due to changes in atmospheric quantities (such as pressure, temperature
    and moisture) predicted directly by the IFS at spatial scales of a grid box or
    larger. Convective snowfall is generated by the convection scheme in the IFS.
    The convection scheme represents convection at spatial scales smaller than the
    grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective+and+large-scale+precipitation'>further
    information</a>.<br/><br/>The units are depth of water equivalent in metres which
    falls per second (i.e., the depth the melted snow would have if it were spread
    evenly over the <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid
    box</a> ).<br/><br/>Care should be taken when comparing model parameters with
    observations, because observations are often local to a particular point in space
    and time, rather than representing averages over a model grid box and <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>model
    time step</a>.
- id: 173145
  shortname: '~'
  longname: Boundary layer dissipation anomaly
  units: J m**-2
  description: null
- id: 173146
  shortname: sshfara
  longname: Surface sensible heat flux anomalous rate of accumulation
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. Since
    the ECMWF convention for vertical fluxes is positive downwards, a positive anomaly
    means either a larger downward mean surface sensible heat flux or a smaller upward
    flux, compared with the long-term average. A negative anomaly means either a smaller
    downward flux or a larger upward flux. The long-term average is typically derived
    from several decades of model data and will vary with location and time of year
    (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Surface sensible heat flux is the transfer of heat
    between the Earth's surface and the atmosphere through the effects of turbulent
    air motion (but excluding any heat transfer resulting from condensation or evaporation).
    The mean flux is the accumulated flux divided by the length of the accumulation
    period, which depends on the data extracted</a>.
- id: 173147
  shortname: slhfara
  longname: Surface latent heat flux anomalous rate of accumulation
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. Since
    the ECMWF convention for vertical fluxes is positive downwards, a positive anomaly
    means either a larger downward mean surface latent heat flux or a smaller upward
    flux, compared with the long-term average. A negative anomaly means either a smaller
    downward flux or a larger upward flux. The long-term average is typically derived
    from several decades of model data and will vary with location and time of year
    (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The surface latent heat flux is the transfer of latent
    heat (resulting from evaporation, condensation and other moisture phase changes)
    between the Earth's surface and the atmosphere through the effects of turbulent
    air motion. Evaporation from the Earth's surface represents a transfer of energy
    from the surface to the atmosphere. The mean latent heat flux is the accumulated
    flux divided by the length of the accumulation period, which depends on the data
    extracted</a>.
- id: 173149
  shortname: '~'
  longname: Surface net radiation anomaly
  units: J m**-2
  description: null
- id: 173153
  shortname: '~'
  longname: Short-wave heating rate anomaly
  units: K s**-1
  description: null
- id: 173154
  shortname: '~'
  longname: Long-wave heating rate anomaly
  units: K s**-1
  description: null
- id: 173169
  shortname: ssrdara
  longname: Surface solar radiation downwards anomalous rate of accumulation
  units: J m**-2
  description: null
- id: 173175
  shortname: strdara
  longname: Surface thermal radiation downwards anomalous rate of accumulation
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean flux of surface thermal radiation
    downwards is higher/lower than the long-term average. The long-term average is
    typically derived from several decades of model data and will vary with location
    and time of year (see further information). <br/><br/>Surface thermal radiation
    downwards is the amount of thermal (also known as longwave or terrestrial) radiation
    emitted by the atmosphere and clouds that reaches the Earth's surface. It is the
    amount of radiation passing through a horizontal plane. The mean flux is the accumulated
    flux divided by the length of the accumulation period, which depends on the data
    extracted</a>.<br/><br/>The ECMWF convention for vertical fluxes is positive downwards.
- id: 173176
  shortname: ssrara
  longname: Surface solar radiation anomalous rate of accumulation
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean net surface solar radiation flux
    is higher/lower than the long-term average. The long-term average is typically
    derived from several decades of model data and will vary with location and time
    of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The net surface solar radiation flux is the amount
    of solar radiation (also known as shortwave radiation) reaching the surface of
    the Earth (both direct and diffuse) minus the amount reflected by the Earth's
    surface (which is governed by the albedo). It is the amount of radiation passing
    through a horizontal plane, not a plane perpendicular to the direction of the
    Sun. The mean flux is the accumulated flux divided by the length of the accumulation
    period, which depends on the data extracted</a>.<br/><br/>The ECMWF convention
    for vertical fluxes is positive downwards.
- id: 173177
  shortname: strara
  longname: Surface thermal radiation anomalous rate of accumulation
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. Since
    the ECMWF convention for vertical fluxes is positive downwards, a positive anomaly
    means either a larger downward mean net surface thermal radiation flux or a smaller
    upward flux, compared with the long-term average. A negative anomaly means either
    a smaller downward flux or a larger upward flux. The long-term average is typically
    derived from several decades of model data and will vary with location and time
    of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Thermal radiation (also known as longwave or terrestrial
    radiation) refers to radiation emitted by the atmosphere, clouds and the surface
    of the Earth. The net surface thermal radiation flux is the difference between
    downward and upward thermal radiation at the surface of the Earth. It is the amount
    of radiation passing through a horizontal plane. <br/><br/>The atmosphere and
    clouds emit thermal radiation in all directions, some of which reaches the surface
    as downward thermal radiation. The upward thermal radiation at the surface consists
    of thermal radiation emitted by the surface plus the fraction of downwards thermal
    radiation reflected upward by the surface. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a><br/><br/>The mean flux is the accumulated flux divided
    by the length of the accumulation period, which depends on the data extracted</a>.
- id: 173178
  shortname: tsrara
  longname: Top solar radiation anomalous rate of accumulation
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean net flux of solar radiation at
    the top of the atmosphere is higher/lower than the long-term average. The long-term
    average is typically derived from several decades of model data and will vary
    with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The net flux of solar radiation (also known as shortwave
    radiation) at the top of the atmosphere is the incoming solar radiation minus
    the outgoing solar radiation. It is the amount of radiation passing through a
    horizontal plane. The incoming solar radiation is the amount received from the
    Sun. The outgoing solar radiation is the amount reflected and scattered by the
    Earth's atmosphere and surface. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>The mean flux is the accumulated flux divided
    by the length of the accumulation period, which depends on the data extracted</a>.<br/><br/>The
    ECMWF convention for vertical fluxes is positive downwards.
- id: 173179
  shortname: ttrara
  longname: Top thermal radiation anomalous rate of accumulation
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. The ECMWF
    convention for vertical fluxes is positive downwards and the mean flux of thermal
    radiation at the top of the atmosphere can only be upwards (i.e., negative). Therefore,
    a positive anomaly means a smaller upward flux of thermal radiation and a negative
    anomaly means a larger upward flux, compared with the long-term average. The long-term
    average is typically derived from several decades of model data and will vary
    with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The mean flux of thermal radiation (also known as longwave
    or terrestrial) is the thermal radiation emitted to space at the top of the atmosphere.
    <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>. The mean flux is the accumulated flux divided by the
    length of the accumulation period, which depends on the data extracted</a>.<br/><br/>The
    thermal radiation emitted to space at the top of the atmosphere is commonly known
    as the Outgoing Longwave Radiation (OLR) (but taking a flux from the atmosphere
    to space as positive).
- id: 173180
  shortname: ewssara
  longname: East-West surface stress anomalous rate of accumulation
  units: N m**-2
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the mean East-West surface stress is more eastward (or
    less westward) than average. A negative anomaly indicates that the mean East-West
    surface stress is more westward (or less eastward) than the average. The long-term
    average is typically derived from several decades of model data and will vary
    with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>Air flowing over a surface exerts a stress that transfers
    momentum to the surface and slows the wind. The mean East-West surface stress
    is the accumulated eastward surface stress divided by the length of the accumulation
    period, which depends on the data extracted</a>.<br/><br/>The East-West surface
    stress is the stress on the Earth's surface in the eastward direction due to both
    the turbulent interactions between the atmosphere and the surface, and to turbulent
    orographic form drag. The turbulent interactions between the atmosphere and the
    surface are due to the roughness of the surface. The turbulent orographic form
    drag is the stress due to the valleys, hills and mountains on horizontal scales
    below 5km being derived from land surface data at about 1 km resolution. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a>
- id: 173181
  shortname: nsssara
  longname: North-South surface stress anomalous rate of accumulation
  units: N m**-2
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the mean North-South surface stress is more northward (or
    less southward) than average. A negative anomaly indicates that the mean North-South
    surface stress is more southward (or less northward) than the average. The long-term
    average is typically derived from several decades of model data and will vary
    with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Air flowing over a surface exerts a stress that transfers
    momentum to the surface and slows the wind. The mean North-South surface stress
    is the accumulated northward surface stress divided by the length of the accumulation
    period, which depends on the data extracted</a>.<br/><br/>The North-South surface
    stress is the stress on the Earth's surface in the northward direction due to
    both the turbulent interactions between the atmosphere and the surface, and to
    turbulent orographic form drag. The turbulent interactions between the atmosphere
    and the surface are due to the roughness of the surface. The turbulent orographic
    form drag is the stress due to the valleys, hills and mountains on horizontal
    scales below 5km being derived from land surface data at about 1 km resolution.
    <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a>
- id: 173182
  shortname: evara
  longname: Time-mean evaporation anomalous rate of accumulation
  units: m of water equivalent s**-1
  description: <p>An anomaly is a difference from a defined long-term average. The
    ECMWF Integrated Forecasting System convention is that downward fluxes are positive.
    Therefore a positive anomaly means either a larger downward mean evaporation flux
    (more condensation) or a smaller upward flux (less evaporation), compared with
    the long-term average. A negative anomaly means either a smaller downward flux
    or a larger upward flux. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href="https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates">further
    information</a>).<br><br>Evaporation is the amount of water that has evaporated
    from the Earth's surface, including a simplified representation of transpiration
    (from vegetation), into vapour in the air above.The mean evaporation rate is the
    accumulated evaporation divided by the length of the accumulation period, which
    depends on the data extracted.</p>
- id: 173189
  shortname: sundara
  longname: Sunshine duration anomalous rate of accumulation
  units: dimensionless
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean sunshine duration rate is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see further
    information). <br/><br/>The mean sunshine duration rate is the accumulated sunshine
    duration divided by the length of the accumulation period, which depends on the
    data extracted</a>.<br/><br/>The sunshine duration is the length of time in which
    the direct solar (shortwave) radiation at the Earth's surface, falling on a plane
    perpendicular to the direction of the Sun, is greater than or equal to 120 W m-2.
    <br/><br/>The minimum solar intensity level of 120 W m-2 is defined by the World
    Meteorological Organisation and is consistent with observed values of sunshine
    duration from a Campbell-Stokes recorder (sometimes called a Stokes sphere) that
    can only measure moderately intense sunlight and brighter.
- id: 173195
