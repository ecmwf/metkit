- id: 261001
  shortname: utci
  longname: Universal thermal climate index
  units: K
  description: The Universal Thermal Climate Index (UTCI) is defined as the air temperature
    of a reference outdoor environment that would elicit in the human body the same
    physiological response (sweat production, shivering, skin wettedness,skin blood
    flow and rectal, mean skin and face temperatures) as the actual environment (Jendritzky
    et al. 2012)
- id: 261002
  shortname: mrt
  longname: Mean radiant temperature
  units: K
  description: The mean radiant temperature is the temperature of a uniform, black
    enclosure that exchanges the same amount of heat by radiation with the occupant
    as the actual surroundings (ANSI/ASHRAE 2017).
- id: 261003
  shortname: mal_cases_frac
  longname: Fraction of Malaria cases
  units: Fraction
  description: Fraction of new clinical malaria cases per person
- id: 261004
  shortname: mal_prot_ratio
  longname: Malaria circumsporozoite protein ratio
  units: Fraction
  description: Malaria circumsporozoite protein ratio (Fraction of infective vectors)
- id: 261005
  shortname: mal_innoc_rate
  longname: Plasmodium falciparum entomological inoculation rate
  units: Bites per day per person
  description: The Plasmodium falciparum entomological inoculation rate is a measure
    of exposure to infectious mosquitoes. It is usually interpreted as the number
    of P. falciparum infective bites received by an individual during a day.
- id: 261006
  shortname: mal_hbite_rate
  longname: Human bite rate by anopheles vectors
  units: Bites per day per person
  description: Bite rate by Anopheles vectors
- id: 261007
  shortname: mal_immun_ratio
  longname: Malaria immunity ratio
  units: Fraction
  description: Proportion of population with acquired malaria immunity
- id: 261008
  shortname: mal_infect_ratio
  longname: Falciparum parasite ratio
  units: Fraction
  description: Proportion of hosts infected
- id: 261009
  shortname: mal_infect_d10_ratio
  longname: Detectable falciparum parasite ratio (after day 10)
  units: Fraction
  description: Proportion of hosts infected detected (after day 10)
- id: 261010
  shortname: mal_host_ratio
  longname: Anopheles vector to host ratio
  units: Fraction
  description: Number of Anopheles vectors to number of infected population
- id: 261011
  shortname: mal_vect_dens
  longname: Anopheles vector density
  units: Number m**-2
  description: Number of Anopheles vectors per unit area
- id: 261012
  shortname: mal_hab_frac
  longname: Fraction of malarial vector reproductive habitat
  units: Fraction
  description: Water coverage of small scale breeding sites
- id: 261013
  shortname: pop_dens
  longname: Population density
  units: Person m**-2
  description: Number of persons per unit area
- id: 261014
  shortname: wbgt
  longname: Wet bulb globe temperature
  units: K
  description: The wet bulb globe temperature is a measure of environmental heat as
    it affects humans. It is derived from air temperature, dew point temperature,
    wind speed and mean radiant temperature.
- id: 261015
  shortname: gt
  longname: Globe temperature
  units: K
  description: The (black) globe temperature is an indirect measurement of the radiant
    heat load of the environment. Its name comes from the way the parameter is measured,
    i.e. via a thermometer installed inside a hollow copper sphere painted matte black.
    It is calculated using the air temperature, wind speed and mean radiant temperature.
- id: 261016
  shortname: hmdx
  longname: Humidex
  units: K
  description: The humidex, which is an abbreviation for humidity index, describes
    how the combined effects of warm temperatures and humidity are perceived by an
    average person. It is calculated using the air temperature and the dew point temperature.
- id: 261017
  shortname: efft
  longname: Effective temperature
  units: K
  description: null
- id: 261018
  shortname: nefft
  longname: Normal effective temperature
  units: K
  description: ' The normal effective temperature links air temperature, humidity
    and wind with the human body’s thermoregulatory capacity. It is derived from air
    temperature, wind speed and relative humidity.'
- id: 261019
