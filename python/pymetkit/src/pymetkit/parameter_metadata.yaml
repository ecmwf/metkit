- id: 231002
  shortname: rowe
  longname: Runoff water equivalent (surface plus subsurface)
  units: kg m**-2
  description: '<p>Some water from rainfall, melting snow, or deep in the soil, stays
    stored in the soil. Otherwise, the water drains away, either over the surface
    (surface runoff), or under the ground (sub-surface runoff) and the sum of these
    two is simply called ''runoff''. This parameter is the total amount of water accumulated
    over a <a href="https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations">particular
    time period which depends on the data extracted</a>. Care should be taken when
    comparing model parameters with observations, because observations are often local
    to a particular point rather than averaged over a grid square area. Observations
    are also often taken in different units, such as mm/day, rather than the accumulated
    quantity produced here.<br><br>Runoff is a measure of the availability of water
    in the soil, and can, for example, be used as an indicator of drought or flood.
    More information about how runoff is calculated is given in the <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.H.6.3">IFS
    Physical Processes documentation</a>.<br><br>[NOTE: See 205 for the equivalent
    parameter in "m"]</p>'
