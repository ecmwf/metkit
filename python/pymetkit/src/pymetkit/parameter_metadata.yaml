- id: 171039
  shortname: swval1
  longname: Volumetric soil water anomaly layer 1
  units: m**3 m**-3
  description: 'An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the volumetric soil water is larger/smaller
    in layer 1 than the long-term average. The long-term average is typically derived
    from several decades of model data and will vary with location and time of year
    (see <a href=''https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates''>further
    information</a> ).<br/><br/>Volumetric soil water is the volume of water in soil.<br/><br/>The
    ECMWF Integrated Forecasting System model has a four-layer representation of soil:<br/><br/>Layer
    1: 0 - 7cm<br/><br/>Layer 2: 7 - 28cm<br/><br/>Layer 3: 28 - 100cm<br/><br/>Layer
    4: 100 - 289cm<br/><br/>The volumetric soil water is associated with the soil
    texture (or classification), soil depth, and the underlying groundwater level.'
