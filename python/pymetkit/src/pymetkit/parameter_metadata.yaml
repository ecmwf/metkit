- id: 171228
  shortname: tpa
  longname: Total precipitation anomaly
  units: m
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the total precipitation is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>In the ECMWF Integrated Forecasting System (IFS), total
    precipitation is rain and snow that falls to the Earth's surface. It is the sum
    of large-scale precipitation and convective precipitation. Large-scale precipitation
    is generated by the cloud scheme in the ECMWF Integrated Forecasting System (IFS).
    The cloud scheme represents the formation and dissipation of clouds and large-scale
    precipitation due to changes in atmospheric quantities (such as pressure, temperature
    and moisture) predicted directly by the IFS at spatial scales of a grid box or
    larger. Convective precipitation is generated by the convection scheme in the
    IFS. The convection scheme represents convection at spatial scales smaller than
    the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>. Precipitation parameters do not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.<br/><br/>This
    parameter is calculated from the total amount of water accumulated over a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>particular
    time period which depends on the data extracted</a>.The units of precipitation
    are depth in metres. It is the depth the water would have if it were spread evenly
    over the <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>.<br/><br/>Care should be taken when comparing model parameters with observations,
    because observations are often local to a particular point in space and time,
    rather than representing averages over a model grid box and <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    time step</a>.
- id: 171229
  shortname: iewsa
  longname: Instantaneous X surface stress anomaly
  units: N m**-2
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the surface stress is more eastward (or less westward)
    than average. A negative anomaly indicates that the surface stress is more westward
    (or less eastward) than the average. The long-term average is typically derived
    from several decades of model data and will vary with location and time of year
    (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>). <br/><br/>Air flowing over a surface exerts a stress that transfers
    momentum to the surface and slows the wind. The instantaneous X surface stress
    is the stress on the Earth's surface <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a> in the eastward direction due to both the turbulent interactions
    between the atmosphere and the surface, and to turbulent orographic form drag.<br/><br/>The
    turbulent interactions between the atmosphere and the surface are due to the roughness
    of the surface.<br/><br/>The turbulent orographic form drag is the stress due
    to the valleys, hills and mountains on horizontal scales below 5km being derived
    from land surface data at about 1 km resolution. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a>
- id: 171230
  shortname: inssa
  longname: Instantaneous Y surface stress anomaly
  units: N m**-2
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the surface stress is more northward (or less southward)
    than average. A negative anomaly indicates that the surface stress is more southward
    (or less northward) than the average. The long-term average is typically derived
    from several decades of model data and will vary with location and time of year
    (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>Air flowing over a surface exerts a stress that transfers
    momentum to the surface and slows the wind. The instantaneous Y surface stress
    is the stress on the Earth's surface <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a> in the northward direction due to both the turbulent interactions
    between the atmosphere and the surface, and to turbulent orographic form drag.<br/><br/>The
    turbulent interactions between the atmosphere and the surface are due to the roughness
    of the surface.<br/><br/>The turbulent orographic form drag is the stress due
    to the valleys, hills and mountains on horizontal scales below 5km being derived
    from land surface data at about 1 km resolution. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a>
