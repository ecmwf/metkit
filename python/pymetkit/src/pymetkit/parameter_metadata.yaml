- id: 172228
  shortname: tprate
  longname: Time-mean total precipitation rate
  units: m s**-1
  description: This parameter is the mean rate of total precipitation. It is accumulated
    precipitation divided by the length of the accumulation period, <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>which
    depends on the data extracted</a>.<br/><br/>In the ECMWF Integrated Forecasting
    System (IFS), total precipitation is rain and snow that falls to the Earth's surface.
    It is the sum of large-scale precipitation and convective precipitation. Large-scale
    precipitation is generated by the cloud scheme in the IFS. The cloud scheme represents
    the formation and dissipation of clouds and large-scale precipitation due to changes
    in atmospheric quantities (such as pressure, temperature and moisture) predicted
    directly by the IFS at spatial scales of a grid box or larger. Convective precipitation
    is generated by the convection scheme in the IFS. The convection scheme represents
    convection at spatial scales smaller than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>.  Precipitation parameters do not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.<br/><br/>The
    units are depth of water equivalent in metres which falls per second (i.e., the
    depth the water would have if it were spread evenly over the <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>).<br/><br/>Care should be taken when comparing model parameters with observations,
    because observations are often local to a particular point in space and time,
    rather than representing averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step </a>.
