- id: 260109
  shortname: ceil
  longname: Ceiling
  units: m
  description: The height above the Earth's surface of the base of the lowest layer
    of cloud with a covering of more than 50% of the <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>model
    grid box</a>. Cloud ceiling is a measurement used in the aviation industry to
    indicate airport landing conditions.<br/><br/>This parameter is calculated by
    searching from the second lowest model level upwards, to the height of the level
    where cloud fraction becomes greater than 50% and condensate content greater than
    1.E-6 kg kg-1. Fog (i.e., cloud in the lowest model layer) is not considered when
    defining ceiling.
