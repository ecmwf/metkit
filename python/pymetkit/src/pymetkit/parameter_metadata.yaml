- id: 140200
  shortname: maxswh
  longname: Maximum of significant wave height
  units: m
  description: This parameter is used to give the significant wave height climate
    distribution as obtained from the wave ensemble forecast hindcast runs
- id: 140207
  shortname: wss
  longname: Wave Spectral Skewness
  units: Numeric
  description: This parameter is a statistical measure used to forecast extreme or
    freak ocean/sea waves. It describes the nature of the sea surface elevation and
    how it is affected by waves generated by local winds and associated with swell.
    <br/><br/>Under typical conditions, the sea surface elevation, as described by
    its probability density function, has a near normal distribution in the statistical
    sense. However, under certain wave conditions the probability density function
    of the sea surface elevation can deviate considerably from normality, signalling
    increased probability of freak waves.<br/><br/>This parameter gives one measure
    of the deviation from normality. It is a measure of the asymmetry of the probability
    density function of the sea surface elevation. So, a positive/negative skewness  (typical
    range -0.2 to 0.12) means more frequent occurrences of extreme values above/below
    the mean, relative to a normal distribution.
- id: 140208
  shortname: wstar
  longname: Free convective velocity over the oceans
  units: m s**-1
  description: This parameter is an estimate of the vertical velocity of updraughts
    generated by free convection. Free convection is fluid motion induced by buoyancy
    forces, which are driven by density gradients. The free convective velocity is
    used to estimate the impact of wind gusts on ocean wave growth.<br/><br/>It is
    calculated at the height of the lowest temperature inversion (the height above
    the surface of the Earth where the temperature increases with height).<br/><br/>This
    parameter is one of the parameters used to force the wave model, therefore it
    is only calculated over water bodies represented in the ocean wave model. It is
    interpolated from the atmospheric model horizontal grid onto the horizontal grid
    used by the ocean wave model.
- id: 140209
  shortname: rhoao
  longname: Air density over the oceans
  units: kg m**-3
  description: This parameter is the mass of air per cubic metre over the oceans,
    derived from the temperature, specific humidity and pressure at the lowest model
    level in the atmospheric model. <br/><br/>This parameter is one of the parameters
    used to force the wave model, therefore it is only calculated over water bodies
    represented in the ocean wave model. It is interpolated from the atmospheric model
    horizontal grid onto the horizontal grid used by the ocean wave model.
- id: 140210
  shortname: mswsi
  longname: Mean square wave strain in sea ice
  units: '~'
  description: 'When waves propagate into a sea ice field, they generate mechanical
    strain

    onto the floating ice sheets. This can be estimated in mean square sense by computing

    the following integral over frequency (f):<br>

    Int {F(f) E(f)^2 df},<br>

    where<br>

    F(f) is the frequency wave spectrum.<br>

    E(f) is the strain in the ice:<br>

    E(f) = h k_ice^3 / (2k)<br>

    with h the ice thickness, k the wave number in the water, k_ice is the wave number
    under the ice.'
- id: 140211
  shortname: phiaw
  longname: Normalized energy flux into waves
  units: Numeric
  description: 'This parameter is the normalised vertical flux of energy from wind
    into the ocean waves. A positive flux implies a flux into the waves. <br/><br/>The
    energy flux has units of Watts per metre squared, and this is normalised by being
    divided by the product of air density and the cube of the friction velocity.

    <br>Parameters are normalised by being divided by the product of air density and
    the square of the friction velocity.'
- id: 140212
  shortname: phioc
  longname: Normalized energy flux into ocean
  units: Numeric
  description: 'This parameter is the normalised vertical flux of turbulent kinetic
    energy from ocean waves into the ocean. The energy flux is calculated from an
    estimation of white capping waves across the surface of the ocean. A white capping
    wave is one that appears white at its crest as it breaks, due to air being mixed
    into the water. When waves break in this way, there is a transfer of energy from
    the waves to the ocean. A negative flux implies a flux from the waves into the
    ocean. <br/><br/>The energy flux has units of Watts per metre squared, and this
    is normalised by being divided by the product of air density and the cube of the
    friction velocity.

    <br>Parameters are normalised by being divided by the product of air density and
    the square of the friction velocity.'
- id: 140213
  shortname: tla
  longname: Turbulent Langmuir number
  units: '~'
  description: 'Square root of the ratio of friction velocity to the surface Stokes
    drift.

    This parameter is currently not produced.'
- id: 140214
  shortname: tauoc
  longname: Normalized stress into ocean
  units: Numeric
  description: 'This parameter is the normalised surface stress, or momentum flux,
    from the air into the ocean due to turbulence at the air-sea interface and breaking
    waves. It does not include the flux used to generate waves. The ECMWF convention
    for vertical fluxes is positive downwards.<br/><br/>The stress has units of Newtons
    per metre squared, and this is normalised by being divided by the product of air
    density and the square of the friction velocity.

    <br>Parameters are normalised by being divided by the product of air density and
    the square of the friction velocity.'
- id: 140215
  shortname: ust
  longname: U-component surface stokes drift
  units: m s**-1
  description: This parameter is the eastward component of the surface Stokes drift.
    The Stokes drift is the net drift velocity due to surface wind waves. It is confined
    to the upper few metres of the ocean water column, with the largest value at the
    surface.<br/><br/>For example, a fluid particle near the surface will slowly move
    in the direction of wave propagation.
- id: 140216
  shortname: vst
  longname: V-component surface stokes drift
  units: m s**-1
  description: This parameter is the northward component of the surface Stokes drift.
    The Stokes drift is the net drift velocity due to surface wind waves. It is confined
    to the upper few metres of the ocean water column, with the largest value at the
    surface.<br/><br/>For example, a fluid particle near the surface will slowly move
    in the direction of wave propagation.
- id: 140217
  shortname: tmax
  longname: Period corresponding to maximum individual wave height
  units: s
  description: This parameter is the period of the expected highest individual wave
    within a 20-minute time window. It can be used as a guide to the characteristics
    of extreme or freak waves. Wave period is the average time it takes for two consecutive
    wave crests, on the surface of the ocean/sea, to pass through a fixed point.<br/><br/>Occasionally
    waves of different periods reinforce and interact non-linearly giving a wave height
    considerably larger than the significant wave height. If the maximum individual
    wave height is more than twice the significant wave height, then the wave is considered
    to be a freak wave. The significant wave height represents the average height
    of the highest third of surface ocean/sea waves, generated by local winds and
    associated with swell. <br/><br/>The ocean/sea surface wave field consists of
    a combination of waves with different heights, lengths and directions (known as
    the two-dimensional wave spectrum). This parameter is derived statistically from
    the two-dimensional wave spectrum. See <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>further
    information</a>.<br/><br/>The wave spectrum can be decomposed into wind-sea waves,
    which are directly affected by local winds, and swell, the waves that were generated
    by the wind at a different location and time. This parameter takes account of
    both.
- id: 140218
  shortname: hmax
  longname: Envelop-maximum individual wave height
  units: m
  description: <p>This parameter is an estimate of the height of the expected highest
    individual wave within a 20 minute time window. It can be used as a guide to the
    likelihood of extreme or freak waves.<br><br>The interactions between waves are
    non-linear and occasionally concentrate wave energy giving a wave height considerably
    larger than the significant wave height. If the maximum individual wave height
    is more than twice the significant wave height, then the wave is considered as
    a freak wave. The significant wave height represents the average height of the
    highest third of surface ocean/sea waves, generated by local winds and associated
    with swell.&nbsp;<br><br>The ocean/sea surface wave field consists of a combination
    of waves with different heights, lengths and directions (known as the two-dimensional
    wave spectrum). This parameter is derived statistically from the two-dimensional
    wave spectrum. See <a href="https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM">further
    information</a>.<br><br>The wave spectrum can be decomposed into wind-sea waves,
    which are directly affected by local winds, and swell, the waves that were generated
    by the wind at a different location and time. This parameter takes account of
    both.</p>
- id: 140219
  shortname: wmb
  longname: Model bathymetry
  units: m
  description: This parameter is the depth of water from the surface to the bottom
    of the ocean. It is used by the ocean wave model to specify the propagation properties
    of the different waves that could be present.<br/><br/>Note that the ocean wave
    model grid is too coarse to resolve some small islands and mountains on the bottom
    of the ocean, but they can have an impact on surface ocean waves. The ocean wave
    model has been modified to reduce the wave energy flowing around or over features
    at spatial scales smaller than the grid box.
- id: 140220
  shortname: mp1
  longname: Mean wave period based on first moment
  units: s
  description: This parameter is the reciprocal of the mean frequency of the wave
    components that represent the sea state. All wave components have been averaged
    proportionally to their respective amplitude. This parameter can be used to estimate
    the magnitude of Stokes drift transport in deep water.<br/><br/>The ocean/sea
    surface wave field consists of a combination of waves with different heights,
    lengths and directions (known as the two-dimensional wave spectrum). Moments are
    statistical quantities derived from the two-dimensional wave spectrum.
- id: 140221
  shortname: mp2
  longname: Mean zero-crossing wave period
  units: s
  description: This parameter represents the mean length of time between occasions
    where the sea/ocean surface crosses mean sea level.  In combination with wave
    height information, it could be used to assess the length of time that a coastal
    structure might be under water, for example. <br/><br/>The ocean/sea surface wave
    field consists of a combination of waves with different heights, lengths and directions
    (known as the two-dimensional wave spectrum). In the ECMWF Integrated Forecasting
    System this parameter is calculated from the characteristics of the two-dimensional
    wave spectrum.
- id: 140222
  shortname: wdw
  longname: Wave spectral directional width
  units: radians
  description: This parameter indicates whether waves (generated by local winds and
    associated with swell) are coming from similar directions or from a wide range
    of directions.<br/><br/>The ocean/sea surface wave field consists of a combination
    of waves with different heights, lengths and directions (known as the two-dimensional
    wave spectrum). Many ECMWF wave parameters (such as the mean wave period) give
    information averaged over all wave frequencies and directions, so do not give
    any information about the distribution of wave energy across frequencies and directions.
    This parameter gives more information about the nature of the two-dimensional
    wave spectrum. This parameter is a measure of the range of wave directions for
    each frequency integrated across the two-dimensional spectrum.<br/><br/>This parameter
    takes values between 0 and the square root of 2. Where 0 corresponds to a uni-directional
    spectrum (i.e., all wave frequencies from the same direction) and the square root
    of 2 indicates a uniform spectrum (i.e., all wave frequencies from a different
    direction).
- id: 140223
  shortname: p1ww
  longname: Mean wave period based on first moment for wind waves
  units: s
  description: This parameter is the reciprocal of the mean frequency of the wave
    components generated by local winds. All wave components have been averaged proportionally
    to their respective amplitude. This parameter can be used to estimate the magnitude
    of Stokes drift transport in deep water associated with wind waves.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time.This parameter takes account of wind-sea waves only. Moments
    are statistical quantities derived from the two-dimensional wave spectrum.
- id: 140224
  shortname: p2ww
  longname: Mean wave period based on second moment for wind waves
  units: s
  description: This parameter is equivalent to the zero-crossing mean wave period
    for waves generated by local winds. The zero-crossing mean wave period represents
    the mean length of time between occasions where the sea/ocean surface crosses
    a defined zeroth level (such as mean sea level).  <br/><br/>The ocean/sea surface
    wave field consists of a combination of waves with different heights, lengths
    and directions (known as the two-dimensional wave spectrum). The wave spectrum
    can be decomposed into wind-sea waves, which are directly affected by local winds,
    and swell, the waves that were generated by the wind at a different location and
    time. Moments are statistical quantities derived from the two-dimensional wave
    spectrum.
- id: 140225
  shortname: dwww
  longname: Wave spectral directional width for wind waves
  units: radians
  description: This parameter indicates whether waves generated by the local wind
    are coming from similar directions or from a wide range of directions.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time. This parameter takes account of wind-sea waves only.<br/><br/>Many
    ECMWF wave parameters (such as the mean wave period) give information averaged
    over all wave frequencies and directions, so do not give any information about
    the distribution of wave energy across frequencies and directions. This parameter
    gives more information about the nature of the two-dimensional wave spectrum.
    This parameter is a measure of the range of wave directions for each frequency
    integrated across the two-dimensional spectrum.<br/><br/>This parameter takes
    values between 0 and the square root of 2. Where 0 corresponds to a uni-directional
    spectrum (i.e., all wave frequencies from the same direction) and the square root
    of 2 indicates a uniform spectrum (i.e., all wave frequencies from a different
    direction).
- id: 140226
  shortname: p1ps
  longname: Mean wave period based on first moment for swell
  units: s
  description: This parameter is the reciprocal of the mean frequency of the wave
    components associated with swell. All wave components have been averaged proportionally
    to their respective amplitude. This parameter can be used to estimate the magnitude
    of Stokes drift transport in deep water associated with swell.<br/><br/>The ocean/sea
    surface wave field consists of a combination of waves with different heights,
    lengths and directions (known as the two-dimensional wave spectrum). The wave
    spectrum can be decomposed into wind-sea waves, which are directly affected by
    local winds, and swell, the waves that were generated by the wind at a different
    location and time.This parameter takes account of all swell only. Moments are
    statistical quantities derived from the two-dimensional wave spectrum.
- id: 140227
  shortname: p2ps
  longname: Mean wave period based on second moment for swell
  units: s
  description: This parameter is equivalent to the zero-crossing mean wave period
    for swell. The zero-crossing mean wave period represents the mean length of time
    between occasions where the sea/ocean surface crosses a defined zeroth level (such
    as mean sea level).  <br/><br/>The ocean/sea surface wave field consists of a
    combination of waves with different heights, lengths and directions (known as
    the two-dimensional wave spectrum). The wave spectrum can be decomposed into wind-sea
    waves, which are directly affected by local winds, and swell, the waves that were
    generated by the wind at a different location and time. Moments are statistical
    quantities derived from the two-dimensional wave spectrum.
- id: 140228
  shortname: dwps
  longname: Wave spectral directional width for swell
  units: radians
  description: This parameter indicates whether waves associated with swell are coming
    from similar directions or from a wide range of directions.<br/><br/>The ocean/sea
    surface wave field consists of a combination of waves with different heights,
    lengths and directions (known as the two-dimensional wave spectrum). The wave
    spectrum can be decomposed into wind-sea waves, which are directly affected by
    local winds, and swell, the waves that were generated by the wind at a different
    location and time. This parameter takes account of all swell only.<br/><br/>Many
    ECMWF wave parameters (such as the mean wave period) give information averaged
    over all wave frequencies and directions, so do not give any information about
    the distribution of wave energy across frequencies and directions. This parameter
    gives more information about the nature of the two-dimensional wave spectrum.
    This parameter is a measure of the range of wave directions for each frequency
    integrated across the two-dimensional spectrum.<br/><br/>This parameter takes
    values between 0 and the square root of 2. Where 0 corresponds to a uni-directional
    spectrum (i.e., all wave frequencies from the same direction) and the square root
    of 2 indicates a uniform spectrum (i.e., all wave frequencies from a different
    direction).
- id: 140229
  shortname: swh
  longname: Significant height of combined wind waves and swell
  units: m
  description: This parameter represents the average height of the highest third of
    surface ocean/sea waves generated by wind and swell. It represents the vertical
    distance between the wave crest and the wave trough. <br/><br/>The ocean/sea surface
    wave field consists of a combination of waves with different heights, lengths
    and directions (known as the two-dimensional wave spectrum). <br/><br/>The wave
    spectrum can be decomposed into wind-sea waves, which are directly affected by
    local winds, and swell, the waves that were generated by the wind at a different
    location and time. This parameter takes account of both. <br/><br/>More strictly,
    this parameter is four times the square root of the integral over all directions
    and all frequencies of the two-dimensional wave spectrum. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16651-part-vii-ecmwf-wave-model.pdf'>See
    further documentation.</a> <br/><br/>This parameter can be used to assess sea
    state and swell. For example, engineers use significant wave height to calculate
    the load on structures in the open ocean, such as oil platforms, or in coastal
    applications.
- id: 140230
  shortname: mwd
  longname: Mean wave direction
  units: Degree true
  description: This parameter is the mean direction of ocean/sea surface waves. The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    This parameter is a mean over all frequencies and directions of the two-dimensional
    wave spectrum. <br/><br/>The wave spectrum can be decomposed into wind-sea waves,
    which are directly affected by local winds, and swell, the waves that were generated
    by the wind at a different location and time. This parameter takes account of
    both. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16651-part-vii-ecmwf-wave-model.pdf'>See
    further documentation.</a> <br/><br/>This parameter can be used to assess sea
    state and swell. For example, engineers use this type of wave information when
    designing structures in the open ocean, such as oil platforms, or in coastal applications.
    <br/><br/>The units are degree true which means the direction relative to the
    geographic location of the north pole. Zero means 'coming from the north' and
    90 'coming from the east'.
- id: 140231
  shortname: pp1d
  longname: Peak wave period
  units: s
  description: This parameter represents the period of the most energetic ocean waves
    generated by local winds and associated with swell. The wave period is the average
    time it takes for two consecutive wave crests, on the surface of the ocean/sea,
    to pass through a fixed point.<br/><br/>The ocean/sea surface wave field consists
    of a combination of waves with different heights, lengths and directions (known
    as the two-dimensional wave spectrum). This parameter is calculated from the reciprocal
    of the frequency corresponding to the largest value (peak) of the frequency wave
    spectrum. The frequency wave spectrum is obtained by integrating the two-dimensional
    wave spectrum over all directions.<br/><br/>The wave spectrum can be decomposed
    into wind-sea waves, which are directly affected by local winds, and swell, the
    waves that were generated by the wind at a different location and time. This parameter
    takes account of both.
- id: 140232
  shortname: mwp
  longname: Mean wave period
  units: s
  description: This parameter is the average time it takes for two consecutive wave
    crests, on the surface of the ocean/sea, to pass through a fixed point. The ocean/sea
    surface wave field consists of a combination of waves with different heights,
    lengths and directions (known as the two-dimensional wave spectrum). This parameter
    is a mean over all frequencies and directions of the two-dimensional wave spectrum.
    <br/><br/>The wave spectrum can be decomposed into wind-sea waves, which are directly
    affected by local winds, and swell, the waves that were generated by the wind
    at a different location and time. This parameter takes account of both. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16651-part-vii-ecmwf-wave-model.pdf'>See
    further documentation.</a> <br/><br/>This parameter can be used to assess sea
    state and swell. For example, engineers use such wave information when designing
    structures in the open ocean, such as oil platforms, or in coastal applications.
- id: 140233
  shortname: cdww
  longname: Coefficient of drag with waves
  units: dimensionless
  description: This parameter is the resistance that ocean waves exert on the atmosphere.
    It is sometimes also called a 'friction coefficient'. <br/><br/>It is calculated
    by the wave model as the ratio of the square of the friction velocity, to the
    square of the neutral wind speed at a height of 10 metres above the surface of
    the Earth.<br/><br/>The neutral wind is calculated from the surface stress and
    the corresponding roughness length by assuming that the air is neutrally stratified.
    The neutral wind is, by definition, in the direction of the surface stress. The
    size of the roughness length depends on the sea state.
- id: 140234
  shortname: shww
  longname: Significant height of wind waves
  units: m
  description: This parameter represents the average height of the highest third of
    surface ocean/sea waves generated by the local wind. It represents the vertical
    distance between the wave crest and the wave trough.<br/><br/>The ocean/sea surface
    wave field consists of a combination of waves with different heights, lengths
    and directions (known as the two-dimensional wave spectrum). The wave spectrum
    can be decomposed into wind-sea waves, which are directly affected by local winds,
    and swell, the waves that were generated by the wind at a different location and
    time. This parameter takes account of wind-sea waves only.<br/><br/>More strictly,
    this parameter is four times the square root of the integral over all directions
    and all frequencies of the two-dimensional wind-sea wave spectrum. The wind-sea
    wave spectrum is obtained by only considering the components of the two-dimensional
    wave spectrum that are still under the influence of the local wind. <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>See
    further documentation.</a> <br/><br/>This parameter can be used to assess wind-sea
    waves. For example, engineers use significant wave height to calculate the load
    on structures in the open ocean, such as oil platforms, or in coastal applications.
- id: 140235
  shortname: mdww
  longname: Mean direction of wind waves
  units: degrees
  description: The mean direction of waves generated by local winds.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time.This parameter takes account of wind-sea waves only. It is the
    mean over all frequencies and directions of the total wind-sea wave spectrum.
    See <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>further
    information</a>.<br/><br/>The units are degrees true which means the direction
    relative to the geographic location of the north pole. It is the direction that
    waves are coming FROM, so zero means 'coming from the north' and 90 'coming from
    the east'.
- id: 140236
  shortname: mpww
  longname: Mean period of wind waves
  units: s
  description: This parameter is the average time it takes for two consecutive wave
    crests, on the surface of the ocean/sea generated by local winds, to pass through
    a fixed point. <br/><br/>The ocean/sea surface wave field consists of a combination
    of waves with different heights, lengths and directions (known as the two-dimensional
    wave spectrum). The wave spectrum can be decomposed into wind-sea waves, which
    are directly affected by local winds, and swell, the waves that were generated
    by the wind at a different location and time. This parameter takes account of
    wind-sea waves only. It is the mean over all frequencies and directions of the
    total wind-sea spectrum. See <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>further
    information</a>.
- id: 140237
  shortname: shts
  longname: Significant height of total swell
  units: m
  description: This parameter represents the average height of the highest third of
    surface ocean/sea waves associated with swell. It represents the vertical distance
    between the wave crest and the wave trough.<br/><br/>The ocean/sea surface wave
    field consists of a combination of waves with different heights, lengths and directions
    (known as the two-dimensional wave spectrum). The wave spectrum can be decomposed
    into wind-sea waves, which are directly affected by local winds, and swell, the
    waves that were generated by the wind at a different location and time. This parameter
    takes account of total swell only.<br/><br/>More strictly, this parameter is four
    times the square root of the integral over all directions and all frequencies
    of the two-dimensional total swell spectrum. The total swell spectrum is obtained
    by only considering the components of the two-dimensional wave spectrum that are
    not under the influence of the local wind. <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>See
    further documentation.</a> <br/><br/>This parameter can be used to assess swell.
    For example, engineers use significant wave height to calculate the load on structures
    in the open ocean, such as oil platforms, or in coastal applications.
- id: 140238
  shortname: mdts
  longname: Mean direction of total swell
  units: degrees
  description: This parameter is the mean direction of waves associated with swell.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time.This parameter takes account of all swell only. It is the mean
    over all frequencies and directions of the total swell spectrum. See <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>further
    information</a>.<br/><br/>The units are degrees true which means the direction
    relative to the geographic location of the north pole. It is the direction that
    waves are coming FROM, so zero means 'coming from the north' and 90 'coming from
    the east'.
- id: 140239
  shortname: mpts
  longname: Mean period of total swell
  units: s
  description: This parameter is the average time it takes for two consecutive wave
    crests, on the surface of the ocean/sea associated with swell, to pass through
    a fixed point. <br/><br/>The ocean/sea surface wave field consists of a combination
    of waves with different heights, lengths and directions (known as the two-dimensional
    wave spectrum). The wave spectrum can be decomposed into wind-sea waves, which
    are directly affected by local winds, and swell, the waves that were generated
    by the wind at a different location and time. This parameter takes account of
    all swell only. It is the mean over all frequencies and directions of the total
    swell spectrum. See <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>further
    information</a>.
- id: 140240
  shortname: sdhs
  longname: Standard deviation wave height
  units: m
  description: <p>Used only for post processed wave climate fields before ERA-interim.</p><p>This
    parameter is only available in GRIB1.</p>
- id: 140241
  shortname: mu10
  longname: Mean of 10 metre wind speed
  units: m s**-1
  description: <p>Used only for post processed wave climate fields before ERA-interim.</p><p>This
    parameter is only available in GRIB1.</p>
- id: 140242
  shortname: mdwi
  longname: Mean wind direction
  units: degrees
  description: <p>Used only for post processed wave climate fields before ERA-interim.</p><p>This
    parameter is only available in GRIB1.</p>
- id: 140243
  shortname: sdu
  longname: Standard deviation of 10 metre wind speed
  units: m s**-1
  description: <p>Used only for post processed wave climate fields before ERA-interim.</p><p>This
    parameter is only available in GRIB1.</p>
- id: 140244
  shortname: msqs
  longname: Mean square slope of waves
  units: dimensionless
  description: This parameter can be related analytically to the average slope of
    combined wind-sea and swell waves. It can also be expressed as a function of wind
    speed under some statistical assumptions. The higher the slope, the steeper the
    waves. This parameter indicates the roughness of the sea/ocean surface which affects
    the interaction between ocean and atmosphere. See <a href='https://confluence.ecmwf.int/download/attachments/59774192/wave_parameters.pdf?version=1'>further
    information</a>.<br/><br/>The ocean/sea surface wave field consists of a combination
    of waves with different heights, lengths and directions (known as the two-dimensional
    wave spectrum). This parameter is derived statistically from the two-dimensional
    wave spectrum.
- id: 140245
  shortname: wind
  longname: 10 metre wind speed
  units: m s**-1
  description: 'This parameter is the horizontal speed of the ''neutral wind'', at
    a height of ten metres above the surface of the Earth. The units of this parameter
    are metres per second.<br/><br/>The neutral wind is calculated from the surface
    stress and the corresponding roughness length by assuming that the air is neutrally
    stratified. The neutral wind is, by definition, in the direction of the surface
    stress. The size of the roughness length depends on sea state.<br/><br/>This parameter
    is the wind speed used to force the wave model, therefore it is only calculated
    over water bodies represented in the ocean wave model. It is interpolated from
    the atmospheric model''s horizontal grid onto the horizontal grid used by the
    ocean wave model. '
- id: 140246
  shortname: awh
  longname: Altimeter wave height
  units: m
  description: ' Gridded altimeter wave height data as presented to the wave model
    data assimilation scheme. This parameter only exists as type analysis.'
- id: 140247
  shortname: acwh
  longname: Altimeter corrected wave height
  units: m
  description: ' Gridded bias corrected altimeter wave height data as presented to
    the wave model data assimilation scheme. This parameter only exists as type analysis.'
- id: 140248
  shortname: arrc
  longname: Altimeter range relative correction
  units: '~'
  description: Gridded altimeter range correction as determined from the wave model.<br>This
    parameter only exists as type analysis.
- id: 140249
  shortname: dwi
  longname: 10 metre wind direction
  units: degrees
  description: This parameter is the direction from which the 'neutral wind' blows,
    in degrees clockwise from true north, at a height of ten metres above the surface
    of the Earth. <br/><br/>The neutral wind is calculated from the surface stress
    and roughness length by assuming that the air is neutrally stratified. The neutral
    wind is, by definition, in the direction of the surface stress. The size of the
    roughness length depends on the sea state.<br/><br/>This parameter is the wind
    direction used to force the wave model, therefore it is only calculated over water
    bodies represented in the ocean wave model. It is interpolated from the atmospheric
    model's horizontal grid onto the horizontal grid used by the ocean wave model.
- id: 140250
  shortname: 2dsp
  longname: 2D wave spectra (multiple)
  units: m**2 s radian**-1
  description: This parameter has not been used since 1998. It has been replaced by
    2D wave spectra (single)
- id: 140251
  shortname: 2dfd
  longname: 2D wave spectra (single)
  units: m**2 s radian**-1
  description: The ocean/sea surface wave field consists of a combination of waves
    with different heights, lengths and directions (known as the two-dimensional wave
    spectrum). This parameter represents the wave energy for each frequency and direction
    at each model grid point i.e., it describes the contribution to the frequency
    and direction of the two-dimensional wave spectrum.<br/><br/>Strictly, this parameter
    is the base ten logarithm of the spectral density of ocean waves in two dimensions
    (across the horizontal surface of the ocean). Therefore, all values (except missing
    data) need to be raised to the power of ten to give the spectral density. 'Missing
    data' is indicated by a value of 0. The spectral density describes the combination
    of waves with different heights, lengths and directions. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16651-part-vii-ecmwf-wave-model.pdf'>See
    further documentation</a>.
- id: 140252
  shortname: wsk
  longname: Wave spectral kurtosis
  units: dimensionless
  description: This parameter is a statistical measure used to forecast extreme or
    freak ocean/sea waves. It describes the nature of the sea surface elevation and
    how it is affected by waves generated by local winds and associated with swell.
    <br/><br/>Under typical conditions, the sea surface elevation, as described by
    its probability density function, has a near normal distribution in the statistical
    sense. However, under certain wave conditions the probability density function
    of the sea surface elevation can deviate considerably from normality, signalling
    increased probability of freak waves.<br/><br/>This parameter gives one measure
    of the deviation from normality. It shows how much of the probability density
    function of the sea surface elevation exists in the tails of the distribution.
    So, a positive kurtosis (typical range 0.0 to 0.06) means more frequent occurrences
    of very extreme values (either above or below the mean), relative to a normal
    distribution.
- id: 140253
  shortname: bfi
  longname: Benjamin-Feir index
  units: dimensionless
  description: This parameter is used to calculate the likelihood of freak ocean waves,
    which are waves that are higher than twice the mean height of the highest third
    of waves. Large values of this parameter (in practice of the order 1) indicate
    increased probability of the occurrence of freak waves.<br/><br/>The ocean/sea
    surface wave field consists of a combination of waves with different heights,
    lengths and directions (known as the two-dimensional wave spectrum). This parameter
    is derived from the statistics of the two-dimensional wave spectrum. More precisely,
    it is the square of the ratio of the integral ocean wave steepness and the relative
    width of the frequency spectrum of the waves. <br/><br/>Further information on
    the calculation of this parameter is given in Section 10.6 of the <a href='https://www.ecmwf.int/en/elibrary/18717-part-vii-ecmwf-wave-model'>ECMWF
    Wave Model</a> documentation.
- id: 140254
  shortname: wsp
  longname: Wave spectral peakedness
  units: dimensionless
  description: This parameter is a statistical measure used to forecast extreme or
    freak waves. It is a measure of the relative width of the ocean/sea wave frequency
    spectrum (i.e., whether the ocean/sea wave field is made up of a narrow or broad
    range of frequencies).<br/><br/>The ocean/sea surface wave field consists of a
    combination of waves with different heights, lengths and directions (known as
    the two-dimensional wave spectrum). When the wave field is more focussed around
    a narrow range of frequencies, the probability of freak/extreme waves increases.
    <br/><br/>This parameter is Goda's peakedness factor and is used to calculate
    the Benjamin-Feir Index (BFI). The BFI is in turn used to estimate the probability
    and nature of extreme/freak waves.
