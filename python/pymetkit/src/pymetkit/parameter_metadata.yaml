- id: 171186
  shortname: lcca
  longname: Low cloud cover anomaly
  units: (0 - 1)
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that low cloud cover is larger/smaller than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Low cloud cover is the proportion of a <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>model
    grid box</a> covered by cloud occurring in the lower levels of the troposphere.
    Low cloud is a single level field calculated from cloud occurring on model levels
    with a pressure greater than 0.8 times the surface pressure. So, if the surface
    pressure is 1000 hPa (hectopascal), low cloud would be calculated using levels
    with a pressure greater than 800 hPa (below approximately 2 km (assuming a 'standard
    atmosphere')).<br/><br/>The low cloud cover parameter is calculated from cloud
    cover for the appropriate model levels as described above. Assumptions are made
    about the degree of overlap/randomness between the horizontal positioning of clouds
    in different model levels.
