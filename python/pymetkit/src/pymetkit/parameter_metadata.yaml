    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a 10 m wind speed of 10 m s-1  or above.<br/><br/>10 metre
    wind speed is the horizontal speed of the wind, or movement of air, at a height
    of ten metres above the surface of the Earth.
