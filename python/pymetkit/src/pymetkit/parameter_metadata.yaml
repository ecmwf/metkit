- id: 15
  shortname: aluvp
  longname: UV visible albedo for direct radiation (climatological)
  units: (0 - 1)
  description: Albedo is a measure of the reflectivity of the Earth's surface. This
    parameter is the fraction of direct solar (shortwave) radiation with wavelengths
    shorter than 0.7 µm (microns, 1 millionth of a metre) reflected by the Earth's
    surface (for snow-free land surfaces only). It is one of four components (parameters
    15-18) that were used by the ECMWF Integrated Forecasting System (IFS) to represent
    albedo up to and including Cycle 46R1. Later cycles use instead six components
    (parameters 210186-210191). <a href="https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf">See
    further documentation</a><br/><br/>Solar radiation at the surface can be direct
    or diffuse. Solar radiation can be scattered in all directions by particles in
    the atmosphere, some of which reaches the surface (diffuse solar radiation). Some
    solar radiation reaches the surface without being scattered (direct solar radiation).<br/><br/>In
    the IFS, a climatological (observed values averaged over a period of several years)
    background albedo is used which varies from month to month through the year, modified
    by the model over water, ice and snow.
- id: 16
  shortname: aluvd
  longname: UV visible albedo for diffuse radiation (climatological)
  units: (0 - 1)
  description: Albedo is a measure of the reflectivity of the Earth's surface. This
    parameter is the fraction of diffuse solar (shortwave) radiation with wavelengths
    shorter than 0.7 µm (microns, 1 millionth of a metre) reflected by the Earth's
