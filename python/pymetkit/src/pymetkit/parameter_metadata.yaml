- id: 228246
  shortname: 100u
  longname: 100 metre U wind component
  units: m s**-1
  description: This parameter is the eastward component of the 100 m wind. It is the
    horizontal speed of air moving towards the east, at a height of 100 metres above
    the surface of the Earth, in metres per second.<br/><br/>Care should be taken
    when comparing model parameters with observations, because observations are often
    local to a particular point in space and time, rather than representing averages
    over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.<br/><br/>This parameter can be combined with
    the northward component to give the speed and direction of the horizontal 100
    m wind.
- id: 228247
  shortname: 100v
  longname: 100 metre V wind component
  units: m s**-1
  description: This parameter is the northward component of the 100 m wind. It is
    the horizontal speed of air moving towards the north, at a height of 100 metres
    above the surface of the Earth, in metres per second.<br/><br/>Care should be
    taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step.</a><br/><br/>This parameter can be combined with
    the eastward component to give the speed and direction of the horizontal 100 m
    wind.
- id: 228248
  shortname: tccsw
  longname: Surface short wave-effective total cloudiness
  units: dimensionless
  description: "Let SSRD and STRD be the surface downward short-wave and long-wave\
    \ radiation at the surface, and SSRDC and STRDC the surface clear-sky downward\
    \ short-wave and long-wave radiation at the surface.\r\n\r\nThe short-wave and\
    \ long-wave radiation-effective total cloudiness are\r\nthe equivalent cloud fractions\
    \ of the sky that would give the surface\r\ndownward radiation, without reference\
    \ to any cloud overlap assumption,\r\nany specification (liquid droplets or ice\
    \ particles) of cloud particles,\r\nand related cloud optical properties.\r\n\
    In particular, TCCSW, the surface short-wave-effective total cloudiness\r\nis\
    \ what might be the closest to what the \"person in the street\" could\r\nthink\
    \ of as total cloudiness.\r\n\r\nComputationally speaking, TCCSW = 1 - SSRD /\
    \ SSRDC\r\nand TCCLW = 1 - STRDC / STRD\r\n\r\n(the difference in the ratios is\
    \ due to the fact that, w.r.t. to clear\r\nsky conditions, clouds decrease the\
    \ amount of short-wave radiation\r\nusually available at the surface, whereas\
    \ clouds actually increase the\r\namount of long-wave radiation available at the\
    \ surface)."
- id: 228249
  shortname: 100si
  longname: 100 metre wind speed
  units: m s**-1
  description: This parameter is the horizontal speed of the wind, or movement of
    air, at a height of 100 m above the surface of the Earth. <br/><br/>Care should
    be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.<br/><br/>Two other parameters, the eastward
    and northward components, can be used to give the direction of the horizontal
    100 m wind.
- id: 228250
  shortname: irrfr
  longname: Irrigation fraction
  units: Proportion
  description: ''
- id: 228251
  shortname: pev
  longname: Potential evaporation
  units: m
  description: 'This parameter is a measure of the extent to which near-surface atmospheric
    conditions are conducive to the process of evaporation. It is usually considered
    to be the amount of evaporation, under existing atmospheric conditions, from a
    surface of pure water which has the temperature of the lowest layer of the atmosphere
    and gives an indication of the maximum possible evaporation.<br/><br/>Potential
    evaporation in the current ECMWF Integrated Forecasting System is based on surface
    energy balance calculations with the vegetation parameters set to ''crops/mixed
    farming'' and assuming ''no stress from soil moisture''. In other words, evaporation
    is computed for agricultural land as if it is well watered and assuming that the
    atmosphere is not affected by this artificial surface condition. The latter may
    not always be realistic. Although potential evaporation is meant to provide an
    estimate of irrigation requirements, the method can give unrealistic results in
    arid conditions due to too strong evaporation forced by dry air.<br/><br/>This
    parameter is accumulated over a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>particular
    time period which depends on the data extracted</a>.

    <br>[NOTE: See 231005 for the equivalent parameter in "kg m-2"]'
