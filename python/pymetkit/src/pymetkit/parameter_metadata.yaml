- id: 228131
  shortname: u10n
  longname: 10 metre u-component of neutral wind
  units: m s**-1
  description: 'This parameter is the eastward component of the ''neutral wind'',
    at a height of 10 metres above the surface of the Earth. <br/><br/>The neutral
    wind is calculated from the surface stress and the corresponding roughness length
    by assuming that the air is neutrally stratified. The neutral wind is slower than
    the actual wind in stable conditions, and faster in unstable conditions. The neutral
    wind is, by definition, in the direction of the surface stress. The size of the
    roughness length depends on land surface properties or the sea state. '
- id: 228132
