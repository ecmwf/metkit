- id: 171130
  shortname: ta
  longname: Temperature anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that temperature is higher/lower than the long-term
    average. The long-term average is typically derived from several decades of model
    data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>This parameter is available on multiple levels through
    the atmosphere.
- id: 171131
  shortname: ua
  longname: U component of wind anomaly
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the wind is more eastward (or less westward) than average.
    A negative anomaly indicates that the wind is more westward (or less eastward)
    than average. The long-term average is typically derived from several decades
    of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>The U component of wind is the eastward component of
    the wind. It is the horizontal speed of air moving towards the east, in metres
    per second. A negative U component of wind thus indicates air movement towards
    the west.
- id: 171132
  shortname: va
  longname: V component of wind anomaly
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the wind is more northward (or less southward) than average.
    A negative anomaly indicates that the wind is more southward (or less northward)
    than average. The long-term average is typically derived from several decades
    of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>The V component of wind is the northward component
    of the wind. It is the horizontal speed of air moving towards the north, in metres
    per second. A negative V component of wind thus indicates air movement towards
    the south.
- id: 171133
  shortname: qa
  longname: Specific humidity anomaly
  units: kg kg**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the specific humidity is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>
    further information </a>).<br/><br/>Specific humidity is the mass of water vapour
    per kilogram of moist air. The total mass of moist air is the sum of the dry air,
    water vapour, cloud liquid, cloud ice, rain and falling snow.
- id: 171134
  shortname: spa
