- id: 171203
  shortname: o3a
  longname: Ozone mass mixing ratio anomaly
  units: kg kg**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that ozone mass mixing ratio is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Ozone mass mixing ratio is the mass of ozone per kilogram
    of air.<br/><br/>In the ECMWF Integrated Forecasting System (IFS), there is a
    simplified representation of ozone chemistry (including representation of the
    chemistry which has caused the ozone hole). Ozone is also transported around in
    the atmosphere through the motion of air. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#chapter.10'>See
    further documentation</a>.<br/><br/>Naturally occurring ozone in the stratosphere
    helps protect organisms at the surface of the Earth from the harmful effects of
    ultraviolet (UV) radiation from the Sun. Ozone near the surface, often produced
    because of pollution, is harmful to organisms.<br/><br/>Most of the IFS chemical
    species are archived as mass mixing ratios [kg kg-1]. <a href='https://forum.ecmwf.int/t/convert-mass-mixing-ratio-mmr-to-mass-concentration-or-to-volume-mixing-ratio-vmr/1253'>This
    link</a> explains how to convert to concentration in terms of mass per unit volume.
