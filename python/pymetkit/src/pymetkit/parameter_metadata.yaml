  description: This parameter is the mean rate of snowfall. It is accumulated snowfall
    divided by the length of the accumulation period, which depends on the data extracted</a>.<br/><br/>This
    parameter is the sum of large-scale snowfall and convective snowfall. Large-scale
    snowfall is generated by the cloud scheme in the ECMWF Integrated Forecast System
    (IFS). The cloud scheme represents the formation and dissipation of clouds and
    large-scale snowfall due to changes in atmospheric quantities (such as pressure,
