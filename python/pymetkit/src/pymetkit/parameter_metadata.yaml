  longname: Meridional component of gravity wave stress anomaly
  units: N m**-2
  description: null
- id: 173197
  shortname: '~'
  longname: Gravity wave dissipation anomaly
  units: J m**-2
  description: null
- id: 173205
  shortname: roara
  longname: Runoff anomalous rate of accumulation
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean runoff rate is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The mean runoff rate is the total amount of water from
    rainfall, melting snow, or deep in the soil, that drains away over the surface
    and under the ground. It is the accumulated amount of water, divided by the length
    of the accumulation period, which depends on the data extracted</a>.<br/><br/>This
    quantity represents the depth this water would have if it were spread evenly over
    the grid box. <br/><br/>Care should be taken when comparing model parameters with
    observations, because observations are often local to a particular point in space
    and time, rather than representing averages over a <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>model
    grid box and model time step</a>.
