    >See further documentation</a>\r\n\r\nThis parameter is accumulated over a <a\
    \ href=\"https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations\"\
    >particular time period which depends on the data extracted</a>. The units are\
    \ joules per square metre (J m-2). To convert to watts per square metre (W m-2),\
    \ the accumulated values should be divided by the accumulation period expressed\
    \ in seconds.\r\n\r\nThe ECMWF convention for vertical fluxes is positive downwards."
