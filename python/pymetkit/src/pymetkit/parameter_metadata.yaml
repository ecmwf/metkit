- id: 232012
  shortname: fdlmc
  longname: Fine dead leaf moisture content
  units: kg kg**-1
  description: Amount of water per amount of mass in fine dead leaf fuel bed. These
    fuels include herbaceous plants and leaf litter. Fine dead leaf is classified
    as a 1-h fuel in the Nelson model as moisture responds on hourly timescales to
    atmospheric conditions. Typical diameter is 0.2 cm. Values range between 0.01
    and 0.8.
- id: 232013
  shortname: ddlmc
  longname: Dense dead leaf moisture content
  units: kg kg**-1
  description: Amount of water per amount of mass in dense dead leaf fuel bed. These
    fuels include herbaceous plants and small sticks. Dense dead leaf is classified
    as a 10-h fuel in the Nelson model as moisture responds on sub-daily timescales
    to atmospheric conditions. Typical diameter is 0.6 cm. Values range between 0.01
    and 0.6.
- id: 232014
  shortname: fdwmc
  longname: Fine dead wood moisture content
  units: kg kg**-1
  description: Amount of water per amount of mass in fine dead wood fuel bed. These
    fuels include large sticks and logs. Fine dead wood is classified as a 100-h fuel
    in the Nelson model as moisture responds on daily-to-weekly timescales to atmospheric
    conditions. Typical diameter is 2.0 cm. Values range between 0.01 and 0.5.
- id: 232015
  shortname: ddwmc
  longname: Dense dead wood moisture content
  units: kg kg**-1
  description: Amount of water per amount of mass in dense dead wood fuel bed. These
    fuels include fallen trees and large logs. Dense dead wood is classified as a
    1000-h fuel in the Nelson model as moisture responds on monthly timescales to
    atmospheric conditions. Typical diameter is 6.0 cm. Values range between 0.01
    and 0.4.
