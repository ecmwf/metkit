- id: 131089
  shortname: pts
  longname: Probability of a tropical storm
  units: '%'
  description: This parameter is the potential tropical storm activity. It is derived
    from the range of possible outcomes as predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5%2Bforecast%2Bensemble%2B%2528ENS%2529%2B-%2Brationale%2band%2Bconstruction'>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a tropical storm.<br/><br/>This parameter is calculated
    from the number of ensemble members that have a tropical storm within a radius
    of 300 km of a location, within 48 hours.  This is called the 'strike probability'.<br/><br/>A
    tropical storm is a circular pattern of wind centred around an area of non-frontal
    low atmospheric pressure at mean sea-level that developed over the tropics or
    sub-tropics. Its wind speeds near the surface of the Earth are greater than 17
    m s-1 and less than 32 m s-1. In the northern hemisphere it rotates in an anti-clockwise
    direction near the surface, and in the southern hemisphere it rotates clockwise.
- id: 131090
  shortname: ph
  longname: Probability of a hurricane
  units: '%'
  description: This parameter is the potential hurricane or typhoon activity. It is
    derived from the range of possible outcomes as predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5%2Bforecast%2Bensemble%2B%2528ENS%2529%2B-%2Brationale%2band%2Bconstruction'>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a hurricane or typhoon.<br/><br/>This parameter is calculated
    from the number of ensemble members that have a hurricane or typhoon within a
    radius of 300 km of a location, within 48 hours of the specified time.  This is
    called the 'strike probability'.<br/><br/>A hurricane is a circular pattern of
    wind centred around an area of non-frontal low atmospheric pressure at mean sea-level
    that develops over the tropics or sub-tropics. Its wind speeds near the surface
    of the Earth are greater than 32 m s-1.  In the northern hemisphere it rotates
    in an anti-clockwise direction near the surface, and in the southern hemisphere
    it rotates clockwise. In the western North Pacific it is called a typhoon.
- id: 131091
  shortname: ptd
  longname: Probability of a tropical depression
  units: '%'
  description: This parameter is the potential tropical depression activity. It is
    derived from the range of possible outcomes as predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5%2Bforecast%2Bensemble%2B%2528ENS%2529%2B-%2Brationale%2band%2Bconstruction'>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a tropical depression.<br/><br/>This parameter is calculated
    from the number of ensemble members that have a tropical depression within a radius
    of 300 km of a location, within 48 hours of the specified time.  This is sometimes
    called the 'strike probability'..<br/><br/>A tropical depression is a circular
    pattern of wind centred around an area of non-frontal low atmospheric pressure
    at mean sea-level that developed over the tropics or sub-tropics. Its wind speeds
    near the surface of the Earth are greater than 8 m s-1 and up to 17 m s-1.  In
    the northern hemisphere it rotates in an anti-clockwise direction near the surface,
    and in the southern hemisphere it rotates clockwise.
