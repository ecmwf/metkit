- id: 171078
  shortname: tclwa
  longname: Total column liquid water anomaly
  units: kg m**-2
  description: 'An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the total amount of cloud liquid water
    (in a column extending from the surface of the Earth to the top of the atmosphere)  is
    higher/lower than the long-term average. The long-term average is typically derived
    from several decades of model data and will vary with location and time of year
    (see <a href=''https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates''>further
    information</a>).<br/><br/>This parameter represents the area averaged value for
    a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>.<br/><br/>Clouds contain a continuum of different sized water droplets
    and ice particles. The ECMWF Integrated Forecasting System (IFS) cloud scheme
    simplifies this to represent a number of discrete cloud droplets/particles including:
    cloud water droplets, raindrops, ice crystals and snow (aggregated ice crystals).
    The processes of droplet formation, conversion and aggregation are also highly
    simplified in the IFS.'
- id: 171079
  shortname: tciwa
  longname: Total column ice water anomaly
  units: kg m**-2
  description: 'An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the total amount of cloud ice (in a column
    extending from the surface of the Earth to the top of the atmosphere) is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href=''https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates''>further
    information</a>). This parameter does not include snow (i.e., precipitating ice).<br/><br/>This
    parameter represents the area averaged value for a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>.<br/><br/>Clouds contain a continuum of different sized water droplets
    and ice particles. The ECMWF Integrated Forecasting System (IFS) cloud scheme
    simplifies this to represent a number of discrete cloud droplets/particles including:
    cloud water droplets, raindrops, ice crystals and snow (aggregated ice crystals).
    The processes of droplet formation, conversion and aggregation are also highly
    simplified in the IFS.'
- id: 171121
  shortname: mx2t6a
  longname: Maximum temperature at 2 metres in the last 6 hours anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the maximum 2 metre temperature in the
    previous 6 hours is higher/lower than the long-term average. The long-term average
    is typically derived from several decades of model data and will vary with location
    and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>2m temperature is calculated by interpolating between
    the lowest model level and the Earth's surface, taking account of the atmospheric
    conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
- id: 171122
