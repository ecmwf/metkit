- id: 228001
  shortname: cin
  longname: Convective inhibition
  units: J kg**-1
  description: This parameter is a measure of the amount of energy required for convection
    to commence. If the value of this parameter is too high, then deep, moist convection
    is unlikely to occur even if the convective available potential energy or convective
    available potential energy shear are large. CIN values greater than 200 J kg<sup>-1</sup>
    would be considered high.<br/><br/>An atmospheric layer where temperature increases
    with height (known as a temperature inversion) would inhibit convective uplift
    and is a situation in which convective inhibition would be large.
- id: 228002
  shortname: orog
  longname: Orography
  units: m
  description: null
- id: 228003
  shortname: zust
  longname: Friction velocity
  units: m s**-1
  description: Air flowing over a surface exerts a stress that transfers momentum
    to the surface and slows the wind. This parameter is a theoretical wind speed
    at the Earth's surface that expresses the magnitude of stress. It is calculated
    by dividing the surface stress by air density and taking its square root. For
    turbulent flow, the friction velocity is approximately constant in the lowest
    few metres of the atmosphere. <br/><br/>This parameter increases with the roughness
    of the surface. It is used to calculate the way wind changes with height in the
    lowest levels of the atmosphere.
- id: 228004
  shortname: avg_2t
  longname: Time-mean 2 metre temperature
  units: K
  description: null
- id: 228005
  shortname: avg_10ws
  longname: Time-mean 10 metre wind speed
  units: m s**-1
  description: null
- id: 228006
  shortname: meantcc
  longname: Mean total cloud cover
  units: (0 - 1)
  description: null
- id: 228007
  shortname: dl
  longname: Lake total depth
  units: m
  description: This parameter is the mean depth of inland water bodies (lakes, reservoirs
    and rivers) and coastal waters. This field is specified from in-situ measurements
    and indirect estimates and is constant in time.<br/><br/>ECMWF implemented a lake
    model in May 2015 to represent the water temperature and lake ice of all the world's
    major inland water bodies in the Integrated Forecasting System (IFS). The IFS  differentiates
    between (i) ocean water, handled by the ocean model, and (ii) inland water (lakes,
    reservoirs and rivers) and coastal waters handled by the lake parametrisation.
    Lake depth and surface area (or fractional cover) are kept constant in time.
- id: 228008
  shortname: lmlt
  longname: Lake mix-layer temperature
  units: K
  description: This parameter is the temperature of the uppermost layer of inland
    water bodies (lakes, reservoirs and rivers) or coastal waters, that is well mixed
    and has a near constant temperature with depth (i.e., a uniform distribution of
    temperature with depth). <br/><br/>The ECMWF Integrated Forecasting System represents
    inland water bodies and coastal waters with two layers in the vertical, the mixed
    layer above and the thermocline below. The upper boundary of the thermocline is
    located at the mixed layer bottom, and the lower boundary of the thermocline at
    the lake bottom.<br/><br/>Mixing within the mixed layer can occur when the density
    of the surface (and near-surface) water is greater than that of the water below.
    Mixing can also occur through the action of wind on the surface of the lake. <br/><br/>This
    parameter has units of kelvin (K). Temperature measured in kelvin can be converted
    to degrees Celsius (&deg;C) by subtracting 273.15.<br/><br/>ECMWF implemented
    a lake model in May 2015 to represent the water temperature and lake ice of all
    the world's major inland water bodies in the Integrated Forecasting System (IFS).
    The IFS  differentiates between (i) ocean water, handled by the ocean model, and
    (ii) inland water (lakes, reservoirs and rivers) and coastal waters handled by
    the lake parametrisation. Lake depth and surface area (or fractional cover) are
    kept constant in time.
- id: 228009
  shortname: lmld
  longname: Lake mix-layer depth
  units: m
  description: This parameter is the thickness of the uppermost layer of inland water
    bodies (lakes, reservoirs and rivers) or coastal waters, that is well mixed and
    has a near constant temperature with depth (i.e., a uniform distribution of temperature
    with depth). <br/><br/>The ECMWF Integrated Forecasting System represents inland
    water bodies and coastal waters with two layers in the vertical, the mixed layer
    above and the thermocline below, where temperature changes with depth. The upper
    boundary of the thermocline is located at the mixed layer bottom, and the lower
    boundary of the thermocline at the lake bottom.<br/><br/>Mixing within the mixed
    layer can occur when the density of the surface (and near-surface) water is greater
    than that of the water below. Mixing can also occur through the action of wind
    on the surface of the lake. <br/><br/>ECMWF implemented a lake model in May 2015
    to represent the water temperature and lake ice of all the world's major inland
    water bodies in the Integrated Forecasting System (IFS). The IFS  differentiates
    between (i) ocean water, handled by the ocean model, and (ii) inland water (lakes,
    reservoirs and rivers) and coastal waters handled by the lake parametrisation.
    Lake depth and surface area (or fractional cover) are kept constant in time.
- id: 228010
  shortname: lblt
  longname: Lake bottom temperature
  units: K
  description: This parameter is the temperature of water at the bottom of inland
    water bodies (lakes, reservoirs, rivers) and coastal waters. <br/><br/>This parameter
    has units of kelvin (K). Temperature measured in kelvin can be converted to degrees
    Celsius (&deg;C) by subtracting 273.15.<br/><br/>ECMWF implemented a lake model
    in May 2015 to represent the water temperature and lake ice of all the world's
    major inland water bodies in the Integrated Forecasting System (IFS). The IFS  differentiates
    between (i) ocean water, handled by the ocean model, and (ii) inland water (lakes,
    reservoirs and rivers) and coastal waters handled by the lake parametrisation.
    Lake depth and surface area (or fractional cover) are kept constant in time.
- id: 228011
  shortname: ltlt
  longname: Lake total layer temperature
  units: K
  description: This parameter is the mean temperature of the total water column in
    inland water bodies (lakes, reservoirs and rivers) and coastal waters. <br/><br/>The
    ECMWF Integrated Forecasting System represents inland water bodies and coastal
    waters with two layers in the vertical, the mixed layer above and the thermocline
    below, where temperature changes with depth. This parameter is the mean over the
    two layers.<br/><br/>The upper boundary of the thermocline is located at the mixed
    layer bottom, and the lower boundary of the thermocline at the lake bottom. <br/><br/>This
    parameter has units of kelvin (K). Temperature measured in kelvin can be converted
    to degrees Celsius (&deg;C) by subtracting 273.15.<br/><br/>ECMWF implemented
    a lake model in May 2015 to represent the water temperature and lake ice of all
    the world's major inland water bodies in the Integrated Forecasting System (IFS).
    The IFS  differentiates between (i) ocean water, handled by the ocean model, and
    (ii) inland water (lakes, reservoirs and rivers) and coastal waters handled by
    the lake parametrisation. Lake depth and surface area (or fractional cover) are
    kept constant in time.
- id: 228012
  shortname: lshf
  longname: Lake shape factor
  units: dimensionless
  description: This parameter describes the way that temperature changes with depth
    in the thermocline layer of inland water bodies (lakes, reservoirs and rivers)
    and coastal waters (i.e., it describes the shape of the vertical temperature profile).
    It is used to calculate the lake bottom temperature and other lake-related parameters.<br/><br/>The
    ECMWF Integrated Forecasting System represents inland water bodies and coastal
    waters with two layers in the vertical, the mixed layer above and the thermocline
    below, where temperature changes with depth. The upper boundary of the thermocline
    is located at the mixed layer bottom, and the lower boundary of the thermocline
    at the lake bottom.<br/><br/>ECMWF implemented a lake model in May 2015 to represent
    the water temperature and lake ice of all the world's major inland water bodies
    in the Integrated Forecasting System (IFS). The IFS  differentiates between (i)
    ocean water, handled by the ocean model, and (ii) inland water (lakes, reservoirs
    and rivers) and coastal waters handled by the lake parametrisation. Lake depth
    and surface area (or fractional cover) are kept constant in time.
- id: 228013
  shortname: lict
  longname: Lake ice surface temperature
  units: K
  description: This parameter is the temperature of the uppermost surface of ice on
    inland water bodies (lakes, reservoirs, and rivers) and coastal waters. That is
    the temperature at the ice/atmosphere or ice/snow interface.<br/><br/>The ECMWF
    Integrated Forecasting System represents the formation and melting of ice on lakes.
    A single ice layer is represented. <br/><br/>This parameter has units of kelvin
    (K). Temperature measured in kelvin can be converted to degrees Celsius (&deg;C)
    by subtracting 273.15.<br/><br/>ECMWF implemented a lake model in May 2015 to
    represent the water temperature and lake ice of all the world's major inland water
    bodies in the Integrated Forecasting System (IFS). The IFS  differentiates between
    (i) ocean water, handled by the ocean model, and (ii) inland water (lakes, reservoirs
    and rivers) and coastal waters handled by the lake parametrisation. Lake depth
    and surface area (or fractional cover) are kept constant in time.
- id: 228014
  shortname: licd
  longname: Lake ice total depth
  units: m
  description: This parameter is the thickness of ice on inland water bodies (lakes,
    reservoirs and rivers) and coastal waters.<br/><br/>The ECMWF Integrated Forecasting
    System represents the formation and melting of ice on inland water bodies. A single
    ice layer is represented. This parameter is the thickness of that ice layer.<br/><br/>ECMWF
    implemented a lake model in May 2015 to represent the water temperature and lake
    ice of all the world's major inland water bodies in the Integrated Forecasting
    System (IFS). The IFS  differentiates between (i) ocean water, handled by the
    ocean model, and (ii) inland water (lakes, reservoirs and rivers) and coastal
    waters handled by the lake parametrisation. Lake depth and surface area (or fractional
    cover) are kept constant in time.
- id: 228015
  shortname: dndzn
  longname: Minimum vertical gradient of refractivity inside trapping layer
  units: m**-1
  description: Minimum vertical gradient of atmospheric refractivity inside trapping
    layer.<br>A duct layer is an atmospheric layer with a refractivity which leads
    to a trapping of electromagnetic waves. In a trapping layer the refractivity leads
    to a bending of EM waves, which is stronger than the earth's curvature.
- id: 228016
  shortname: dndza
  longname: Mean vertical gradient of refractivity inside trapping layer
  units: m**-1
  description: "Minimum vertical gradient of atmospheric refractivity\r\ninside trapping\
    \ layer.<br>A duct layer is an atmospheric layer with a refractivity which leads\
    \ to a trapping of electromagnetic waves. In a trapping layer the refractivity\
    \ leads to a bending of EM waves, which is stronger than the earth's curvature."
- id: 228017
  shortname: dctb
  longname: Duct base height
  units: m
  description: Duct base height as diagnosed from vertical gradient of atmospheric
    refractivity.<br>A duct layer is an atmospheric layer with a refractivity which
    leads to a trapping of electromagnetic waves. In a trapping layer the refractivity
    leads to a bending of EM waves, which is stronger than the earth's curvature.
- id: 228018
  shortname: tplb
  longname: Trapping layer base height
  units: m
  description: "Trapping layer base height as diagnosed from vertical\r\ngradient\
    \ of atmospheric refractivity.<br>A duct layer is an atmospheric layer with a\
    \ refractivity which leads to a trapping of electromagnetic waves. In a trapping\
    \ layer the refractivity leads to a bending of EM waves, which is stronger than\
    \ the earth's curvature."
- id: 228019
  shortname: tplt
  longname: Trapping layer top height
  units: m
  description: "Trapping layer top height as diagnosed from vertical\r\ngradient of\
    \ atmospheric refractivity.<br>A duct layer is an atmospheric layer with a refractivity\
    \ which leads to a trapping of electromagnetic waves. In a trapping layer the\
    \ refractivity leads to a bending of EM waves, which is stronger than the earth's\
    \ curvature."
- id: 228020
  shortname: degm10l
  longname: Geometric height of -10 degrees C atmospheric isothermal level above ground
  units: m
  description: "The height above the Earth's surface where the temperature crosses\
    \ the -10 degree isotherm. If more than one crossing is encountered, then the\
    \ -10 degree level corresponds to the top of the second atmospheric layer.\r\n\
    This parameter is set to zero when the temperature in the whole atmosphere is\
    \ below -10 degrees C."
- id: 228021
  shortname: fdir
  longname: Surface direct short-wave (solar) radiation
  units: J m**-2
  description: <p>This parameter is the amount of direct solar radiation (also known
    as shortwave radiation) reaching the surface of the Earth. It is the amount of
    radiation passing through a horizontal plane, not a plane perpendicular to the
    direction of the Sun.<br><br>Solar radiation at the surface can be direct or diffuse.
    Solar radiation can be scattered in all directions by particles in the atmosphere,
    some of which reaches the surface (diffuse solar radiation). Some solar radiation
    reaches the surface without being scattered (direct solar radiation). <a href="https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf">See
    further documentation</a>.<br><br>This parameter is <a href="https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations">accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br><br>The ECMWF convention for vertical fluxes is positive downwards.</p>
- id: 228022
  shortname: cdir
  longname: Surface direct short-wave radiation, clear sky
  units: J m**-2
  description: This parameter is the amount of direct radiation from the Sun (also
    known as solar or shortwave radiation) reaching the surface of the Earth, assuming
    clear-sky (cloudless) conditions. It is the amount of radiation passing through
    a horizontal plane, not a plane perpendicular to the direction of the Sun.<br/><br/>Solar
    radiation at the surface can be direct or diffuse. Solar radiation can be scattered
    in all directions by particles in the atmosphere, some of which reaches the surface
    (diffuse solar radiation). Some solar radiation reaches the surface without being
    scattered (direct solar radiation).  <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>Clear-sky radiation quantities are computed
    for exactly the same atmospheric conditions of temperature, humidity, ozone, trace
    gases and aerosol as the corresponding total-sky quantities (clouds included),
    but assuming that the clouds are not there.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br/><br/>The ECMWF convention for vertical fluxes is positive downwards.
- id: 228023
  shortname: cbh
  longname: Cloud base height
  units: m
  description: The height above the Earth's surface of the base of the lowest cloud
    layer, <a href='https://confluence.ecmwf.int/display/CKB/parameters%2bvalid%2bat%2bthe%2bspecified%2btime'>at
    the specified time</a>.<br/><br/>This parameter is calculated by searching from
    the second lowest model level upwards, to the height of the level where cloud
    fraction becomes greater than 1% and condensate content greater than 1.E-6 kg
    kg-1. Fog (i.e., cloud in the lowest model layer) is not considered when defining
    cloud base height.
- id: 228024
  shortname: deg0l
  longname: Geometric height of 0 degrees C atmospheric isothermal level above ground
  units: m
  description: The height above the Earth's surface where the temperature passes from
    positive to negative values, corresponding to the top of a warm layer, <a href='https://confluence.ecmwf.int/display/CKB/parameters%2bvalid%2bat%2bthe%2bspecified%2btime'>at
    the specified time</a>. This parameter can be used to help forecast snow.<br/><br/>If
    more than one warm layer is encountered, then the zero degree level corresponds
    to the top of the second atmospheric layer. <br/><br/>This parameter is set to
    zero when the temperature in the whole atmosphere is below 0&#8451.
- id: 228025
  shortname: hvis
  longname: Horizontal visibility
  units: m
  description: ''
- id: 228026
  shortname: mx2t3
  longname: Maximum temperature at 2 metres in the last 3 hours
  units: K
  description: The highest value of 2 metre temperature in the previous 3 hour period.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>
    further information </a>.<br/><br/>This parameter has units of kelvin (K). Temperature
    measured in kelvin can be converted to degrees Celsius (&deg;C) by subtracting
    273.15.
- id: 228027
  shortname: mn2t3
  longname: Minimum temperature at 2 metres in the last 3 hours
  units: K
  description: The lowest value of 2 metre temperature in the previous 3 hour period.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.<br/><br/>This parameter has units of kelvin (K). Temperature
    measured in kelvin can be converted to degrees Celsius (&deg;C) by subtracting
    273.15.
- id: 228028
  shortname: 10fg3
  longname: Maximum 10 metre wind gust in the last 3 hours
  units: m s**-1
  description: This parameter is the maximum wind gust in the last 3 hours at a height
    of ten metres above the surface of the Earth. <br/><br/>The WMO defines a wind
    gust as the maximum of the wind averaged over 3 second intervals. This duration
    is shorter than a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    time step</a>, and so the ECMWF Integrated Forecasting System deduces the magnitude
    of a gust within each time step from the time-step-averaged surface stress, surface
    friction, wind shear and stability. Then, the maximum wind gust is selected from
    the gusts at each time step during the last 3 hours.<br/><br/>Care should be taken
    when comparing model parameters with observations, because observations are often
    local to a particular point in space and time, rather than representing averages
    over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 228029
  shortname: i10fg
  longname: Instantaneous 10 metre wind gust
  units: m s**-1
  description: This parameter is the maximum wind gust <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a>, at a height of ten metres above the surface of the Earth.<br/><br/>The
    WMO defines a wind gust as the maximum of the wind averaged over 3 second intervals.
    This duration is shorter than a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>
    model time step </a>, and so the ECMWF Integrated Forecasting System deduces the
    magnitude of a gust within each time step from the time-step-averaged surface
    stress, surface friction, wind shear and stability.<br/><br/>Care should be taken
    when comparing model parameters with observations, because observations are often
    local to a particular point in space and time, rather than representing averages
    over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 228030
  shortname: rhw
  longname: Relative humidity with respect to water
  units: '%'
  description: The relative humidity with respect to water of moist air at pressure
    p and temperature T is the ratio in per cent of the vapour mole fraction xv to
    the vapour mole fraction xvw which the air would have if it were saturated with
    respect to water at the same pressure p and temperature T
- id: 228031
  shortname: rhi
  longname: Relative humidity with respect to ice
  units: '%'
  description: The relative humidity with respect to ice of moist air at pressure
    p and temperature T is the ratio in per cent of the vapour mole fraction xv to
    the vapour mole fraction xvi which the air would have if it were saturated with
    respect to ice at the same pressure p and temperature T
- id: 228032
  shortname: asn
  longname: Snow albedo
  units: '%'
  description: 'The broadband albedo of snow.

    <br>[NOTE: See 32 for the equivalent parameter in "(0-1)"]'
- id: 228034
  shortname: fcpc
  longname: Fraction of convective precipitation cover
  units: Proportion
  description: Horizontal fraction of the grid box covered by convective precipitation
- id: 228035
  shortname: mxcape6
  longname: Maximum CAPE in the last 6 hours
  units: J kg**-1
  description: <p>From 48r1 this parameter is based on most unstable CAPE rather than
    the previously used surface based CAPE.<br><br>The maximum CAPE (convective available
    potential energy) value that has occurred over the last 6 hours.<br><br>CAPE is
    an indication of the instability (or stability) of the atmosphere and can be used
    to assess the potential for the development of deep convection. When air rises
    through a large depth of the atmosphere, extensive condensation can occur and
    heavy rainfall, thunderstorms and other severe weather can result.&nbsp;<br><br>Care
    should be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href="https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep">model
    grid box and model time step</a>.</p>
- id: 228036
  shortname: mxcapes6
  longname: Maximum CAPES in the last 6 hours
  units: m**2 s**-2
  description: <p>From 48r1 this parameter is based on most unstable CAPE rather than
    the previously used surface based CAPE.<br><br>The maximum CAPES (convective available
    potential energy shear) value that has occurred over the last 6 hours.<br><br>High
    values of CAPES indicate where deep, organised convection is more likely to occur,
    if it is initiated. When air rises through a large depth of the atmosphere, extensive
    condensation can occur and heavy rainfall, thunderstorms and other severe weather
    can result.&nbsp;<br><br>Care should be taken when comparing model parameters
    with observations, because observations are often local to a particular point
    in space and time, rather than representing averages over a <a href="https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep">model
    grid box and model time step</a>.</p>
- id: 228037
  shortname: 2rhw
  longname: 2 metre relative humidity with respect to water
  units: '%'
  description: See 228030
- id: 228038
  shortname: lwcs
  longname: Liquid water content in snow pack
  units: kg m**-2
  description: This parameter represent the liquid water content in snow pack, i.e.
    the amount of water in its liquid form (not frozen/snowflake/etc). This is an
    indicator of how "wet" the snow is.
- id: 228039
  shortname: sm
  longname: Soil moisture
  units: kg m**-3
  description: <p>This GRIB2 encoding is <strong>only</strong> to be used in TIGGE
    as it is WMO deprecated. Please use paramId 260368 otherwise.</p>
- id: 228040
  shortname: swi1
  longname: Soil wetness index in layer 1
  units: dimensionless
  description: ''
- id: 228041
  shortname: swi2
  longname: Soil wetness index in layer 2
  units: dimensionless
  description: ''
- id: 228042
  shortname: swi3
  longname: Soil wetness index in layer 3
  units: dimensionless
  description: ''
- id: 228043
  shortname: swi4
  longname: Soil wetness index in layer 4
  units: dimensionless
  description: ''
- id: 228044
  shortname: capes
  longname: Convective available potential energy shear
  units: m**2 s**-2
  description: <p>From 48r1 this parameter is based on most unstable CAPE rather than
    the previously used surface based CAPE.<br><br>High values of this parameter indicate
    where deep, organised convection is more likely to occur, if it is initiated.
    When air rises through a large depth of the atmosphere, extensive condensation
    can occur and heavy rainfall, thunderstorms and other severe weather can result.<br><br>The
    likelihood of severe weather and its level of intensity tend to increase with
    increasing organisation of convection. Convective supercells are the most prominent
    example. Such organised areas of convection tend to occur where wind (intensity
    and/or direction) changes rapidly with height i.e., areas with strong vertical
    wind shear.<br><br>This parameter is the product of wind shear and the square
    root of convective available potential energy (CAPE). The wind shear denotes bulk
    shear which is a vector difference of winds at two different heights in the atmosphere
    (925 hPa and 500 hPa). The square root of CAPE is proportional to the maximum
    vertical velocity in convective updraughts.<br><br>To help determine whether deep,
    moist convection will be initiated or not, the probability forecast for precipitation
    (for example) can be used, in conjunction with this parameter.</p>
- id: 228045
  shortname: trpp
  longname: Tropopause pressure
  units: Pa
  description: This parameter uses a stability-based definition of the tropopause.
    The use of this parameter is recommended for the tropical belt (typically +-30
    degrees). Outside of this belt the pressure of the surface PV=2 (Potential Vorticity
    = 2 PV units) provides a more appropriate measure of the tropopause height.
- id: 228046
  shortname: hcct
  longname: Height of convective cloud top
  units: m
  description: The height above the Earth's surface of the top of convective cloud
    produced by the ECMWF Integrated Forecasting System convection scheme, <a href='https://confluence.ecmwf.int/display/CKB/parameters%2bvalid%2bat%2bthe%2bspecified%2btime'>at
    the specified time</a>. The convection scheme represents convection at spatial
    scales smaller than the <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>grid
    box</a>. See <a href='https://confluence.ecmwf.int/display/CKB/convective%2band%2blarge-scale%2bprecipitation'>further
    information</a>.
- id: 228047
  shortname: hwbt0
  longname: Height of zero-degree wet-bulb temperature
  units: m
  description: "The height above the Earth's surface where the wet-bulb temperature\
    \ drops to 0&#8451;, <a href='https://confluence.ecmwf.int/display/CKB/parameters%2bvalid%2bat%2bthe%2bspecified%2btime'>at\
    \ the specified time</a>. This parameter can be used to help forecast snow.<br/><br/>The\
    \ wet-bulb temperature is the temperature to which the air must drop to become\
    \ saturated with moisture (keeping pressure constant and accounting only for latent\
    \ heat). It can also be defined as the temperature recorded by a thermometer with\
    \ its bulb covered by a wet cloth or wick. The greater the difference between\
    \ the dry-bulb and wet-bulb temperature, the lower the humidity.<br/><br/>This\
    \ parameter is set to zero when the wet bulb temperature in the whole atmosphere\
    \ is below 0&#8451;.\r\n\r\n<a href='https://confluence.ecmwf.int/display/FCST/43r1+new+parameters%3A+Height+of+zero-degree+%28and+one-degree%29+wet-bulb+temperature'>See\
    \ here for further information.</a>"
- id: 228048
  shortname: hwbt1
  longname: Height of one-degree wet-bulb temperature
  units: m
  description: "The height above the Earth's surface where the wet-bulb temperature\
    \ drops to 1&#8451;, <a href='https://confluence.ecmwf.int/display/CKB/parameters%2bvalid%2bat%2bthe%2bspecified%2btime'>at\
    \ the specified time</a>. This parameter can be used to help forecast snow.<br/><br/>The\
    \ wet-bulb temperature is the temperature to which the air must drop to become\
    \ saturated with moisture (keeping pressure constant and accounting only for latent\
    \ heat). It can also be defined as the temperature recorded by a thermometer with\
    \ its bulb covered by a wet cloth or wick. The greater the difference between\
    \ the dry-bulb and wet-bulb temperature, the lower the humidity.<br/><br/>This\
    \ parameter is set to zero when the wet bulb temperature in the whole atmosphere\
    \ is below 1&#8451;.\r\n\r\n<a href='https://confluence.ecmwf.int/display/FCST/43r1+new+parameters%3A+Height+of+zero-degree+%28and+one-degree%29+wet-bulb+temperature'>See\
    \ here for further information.</a>"
- id: 228050
  shortname: litoti
  longname: Instantaneous total lightning flash density
  units: km**-2 day**-1
  description: 'This parameter gives the total lightning flash rate <a href=''https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime''>at
    the specified time</a>. Users should be aware that it is prone to large errors,
    e.g. due to any spatial and temporal discrepancies between model convection and
    observed convection.<br/><br/>Note that this parameter has units of flashes per
    square kilometre per day. Conversion of this parameter to units of flashes per
    100 square kilometres per hour can give values that are easier to interpret.<br/><br/>This
    parameter accounts for cloud-to-ground flashes (between the the cloud and the
    Earth''s surface) and intra-cloud flashes (between two cloud regions of opposite
    electric charge). In the ECMWF Integrated Forecasting System, the total lightning
    flash density is calculated using an empirical formula involving convective cloud
    and precipitation information, convective available potential energy (CAPE) and
    convective cloud base height, which are diagnosed by the convection scheme. '
- id: 228051
  shortname: litota1
  longname: Averaged total lightning flash density in the last hour
  units: km**-2 day**-1
  description: Averaged total (cloud-to-cloud and cloud-to-ground) lightning flash
