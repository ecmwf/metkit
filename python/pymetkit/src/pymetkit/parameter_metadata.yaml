- id: 171206
  shortname: tco3a
  longname: Total column ozone anomaly
  units: kg m**-2
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that total column ozone is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Total column ozone is the total amount of ozone in
    a column of air extending from the surface of the Earth to the top of the (model)
    atmosphere. This parameter can also be referred to as total ozone, or vertically
    integrated ozone. The values are dominated by ozone within the stratosphere.<br/><br/>In
    the ECMWF Integrated Forecasting System (IFS), there is a simplified representation
    of ozone chemistry (including representation of the chemistry which has caused
    the ozone hole). Ozone is also transported around in the atmosphere through the
    motion of air. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#chapter.10'>See
    further documentation</a>.<br/><br/>Naturally occurring ozone in the stratosphere
    helps protect organisms at the surface of the Earth from the harmful effects of
    ultraviolet (UV) radiation from the Sun. Ozone near the surface, often produced
    because of pollution, is harmful to organisms.<br/><br/>In the IFS, the units
    for total ozone are kilograms per square metre, but before 12/06/2001 dobson units
    were used. Dobson units (DU) are still used extensively for total column ozone.
    1 DU = 2.1415E-5 kg m-2.
- id: 171207
  shortname: 10sia
  longname: 10 metre wind speed anomaly
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the 10 metre wind speed is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>The 10 metre wind speed is the horizontal speed of
    the wind, or movement of air, at a height of ten metres above the surface of the
    Earth.<br/><br/>Care should be taken when comparing model parameters with observations,
    because observations are often local to a particular point in space and time,
    rather than representing averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
