  units: s
  description: ''
- id: 171051
  shortname: mx2t24a
  longname: Maximum 2 metre temperature in the last 24 hours anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the maximum 2 metre temperature in the
    previous 24 hours is higher/lower than the long-term average. The long-term average
    is typically derived from several decades of model data and will vary with location
    and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>2m temperature is calculated by interpolating between
    the lowest model level and the Earth's surface, taking account of the atmospheric
    conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
- id: 171052
  shortname: mn2t24a
  longname: Minimum 2 metre temperature in the last 24 hours anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the minimum  2 metre temperature in the
    previous 24 hours is higher/lower than the long-term average. The long-term average
    is typically derived from several decades of model data and will vary with location
    and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>2m temperature is calculated by interpolating between
    the lowest model level and the Earth's surface, taking account of the atmospheric
    conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
