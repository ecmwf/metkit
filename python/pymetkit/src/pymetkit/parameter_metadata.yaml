- id: 228231
  shortname: mlcape50
  longname: Mixed-layer CAPE in the lowest 50 hPa
  units: J kg**-1
  description: Convective Available Potential Energy (CAPE) is a measure of the amount
    of energy available for convection. It is related to the maximum potential vertical
    velocity in the updraught. MLCAPE50 refers to CAPE of a pseudoadiabatically ascending
    air parcel representing the mean conditions in the lowest 50 hPa of the atmosphere.
- id: 228232
  shortname: mlcin50
  longname: Mixed-layer CIN in the lowest 50 hPa
  units: J kg**-1
  description: Convective Inhibition (CIN) is a measure of the amount of energy needed
    to be overcome for storm initiation. CIN reflects the strength of the capping
    inversion. MLCIN50 refers to CIN of a pseudoadiabatically ascending air parcel
    representing the mean conditions in the lowest 50 hPa of the atmosphere.
- id: 228233
  shortname: mlcape100
  longname: Mixed-layer CAPE in the lowest 100 hPa
  units: J kg**-1
  description: Convective Available Potential Energy (CAPE) is a measure of the amount
    of energy available for convection. It is related to the maximum potential vertical
    velocity in the updraught. MLCAPE100 refers to CAPE of a pseudoadiabatically ascending
    air parcel representing the mean conditions in the lowest 100 hPa of the atmosphere.
- id: 228234
  shortname: mlcin100
  longname: Mixed-layer CIN in the lowest 100 hPa
  units: J kg**-1
  description: Convective Inhibition (CIN) is a measure of the amount of energy needed
    to be overcome for storm initiation. CIN reflects the strength of the capping
    inversion. MLCIN100 refers to CIN of a pseudoadiabatically ascending air parcel
    representing the mean conditions in the lowest 100 hPa of the atmosphere.
- id: 228235
  shortname: mucape
  longname: Most-unstable CAPE
  units: J kg**-1
  description: Convective Available Potential Energy (CAPE) is a measure of the amount
    of energy available for convection. It is related to the maximum potential vertical
    velocity in the updraught. In the IFS MUCAPE refers to the most unstable parcel
    (the parcel with the largest CAPE) found in the atmosphere from the surface up
    to 350 hPa. For all the model levels in the lowest 60 hPa, 30-hPa mixed-layer
    parameters are used.
- id: 228236
  shortname: mucin
  longname: Most-unstable CIN
  units: J kg**-1
  description: Convective Inhibition (CIN) is a measure of the amount of energy needed
    to be overcome for storm initiation. CIN reflects the strength of the capping
    inversion. In the IFS MUCIN refers to the most unstable parcel (the parcel with
    the largest CAPE) found in the atmosphere from the surface up to 350 hPa. For
    all the model levels in the lowest 60 hPa, 30-hPa mixed-layer parameters are used.
- id: 228237
