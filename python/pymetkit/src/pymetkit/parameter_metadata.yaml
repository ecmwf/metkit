- id: 240011
  shortname: chcross
  longname: Cross sectional area of flow in channel
  units: m**2
  description: 'Channel cross sectional area is defined as the cross section area
    of the water flowing in the river channel (wet area).

    The channel cross section area multiplied by the mean velocity of the flow gives
    the discharge (instant)'
- id: 240012
  shortname: chside
  longname: Side flow into river channel
  units: m**3 s**-1 m**-1
  description: Rate of runoff that enters the river channel in each grid cell. The
    runoff consists of the contributions from surface runoff, outflow from ground
    water, additional runoff from rivers and reservoirs. Calculated as a flow (m3/s)
    per m river length. The value is the mean rate over the timestep
- id: 240013
  shortname: dis
  longname: Discharge from rivers or streams
  units: m**3 s**-1
  description: The instantaneous volume rate of water flow, including sediments, chemical
    and biological material, in the river channel through a cross section.
- id: 240014
  shortname: rivsto
  longname: River storage of water
  units: m**3
  description: The amount of water storage in the river network within a grid cell;
    this does not include the floodplain. The term storage refers to the total volume
    of water. This value is instantaneous.
- id: 240015
  shortname: fldsto
  longname: Floodplain storage of water
  units: m**3
  description: "The amount of water storage on the floodplain within a grid cell.The\
    \ term storage refers to the total volume of water.\r\nA floodplain is defined\
    \ as: 'A flat or nearly flat land adjacent to a stream or river that stretches\
    \ from the banks of its channel to the base of the enclosing valley walls and\
    \ experiences flooding during periods of high discharge' (Goudie, A. S., 2004,\
    \ Encyclopedia of Geomorphology, vol. 1. Routledge, New York. ISBN 0-415-32737-7).\
    \ This value is instantaneous."
- id: 240017
  shortname: dslr
  longname: Days since last observation
  units: Integer
  description: 'The number of days since the last observation.

    The value is initialised as 1 on the first day, and then incremented (instant)'
- id: 240018
  shortname: frost
  longname: Frost index
  units: K
  description: "When the soil surface is frozen, this affects the hydrological processes\
    \ occurring near the soil surface. To estimate whether the soil surface is frozen\
    \ or not, a frost index F is calculated. The equation is based on Molnau & Bissell\
    \ (1983, cited in Maidment 1993), and adjusted for variable time steps. The rate\
    \ at which the frost index changes is given by:\r\n<br><br>\r\ndF/dt = (1-Af)F-Tav•e(-0.04•K•ds/wes)\r\
    \n<br><br>\r\ndF/dt is expressed in [°C day-1 day-1 ]. Af is a decay coefficient\
    \ [day-1], K is a a snow\r\ndepth reduction coefficient [cm-1], ds is the (pixel-average)\
    \ depth of the snow cover\r\n(expressed as mm equivalent water depth), and wes\
    \ is a parameter called snow\r\nwater equivalent, which is the equivalent water\
    \ depth water of a snow cover\r\n(Maidment, 1993). The soil is considered frozen\
    \ when the frost index rises above a\r\ncritical threshold of 56. For each time\
    \ step the value of F [°C day-1] is updated as:\n<br><br>\r\nF(t) = F(t &#8722;1)\
    \ + dF/dt•&#916;t\r\n<br><br>\r\nF is not allowed to become less than 0 (instant)"
- id: 240020
  shortname: woss
  longname: Depth of water on soil surface
  units: kg m**-2
  description: Total amount on water on soil surface that is not infiltrating the
    ground or intercepted on vegetation. The parameter can also be defined as water
    intercepted on soil (accum)
- id: 240021
  shortname: tpups
  longname: Upstream accumulated precipitation
  units: kg m**-2
  description: Total accumulated precipitation (rain + snowfall) upstream each grid
    cell, including the value of the grid cell, for each time step (accum)
- id: 240022
  shortname: smups
  longname: Upstream accumulated snow melt
  units: kg m**-2
  description: Total snow melt from areas upstream each grid cell, including the value
    of the grid cell, for each time step (accum)
- id: 240023
  shortname: dis06
  longname: Mean discharge in the last 6 hours
  units: m**3 s**-1
  description: Volume rate of water flow, including sediments, chemical and biological
    material, in the river channel averaged over a time step through a cross-section
- id: 240024
