  longname: Total column vertically-integrated ozone
  units: kg m**-2
  description: ''
- id: 162059
  shortname: vike
  longname: Total column vertically-integrated kinetic energy
  units: J m**-2
  description: ''
- id: 162060
  shortname: vithe
  longname: Total column vertically-integrated enthalpy
  units: J m**-2
  description: This parameter is the mass-weighted vertical integral of thermal energy
    for a column of air extending from the surface of the Earth to the top of the
    atmosphere. Thermal energy is calculated from the product of temperature and the
    specific heat capacity of air at constant pressure.<br/><br/>The thermal energy
    is equal to enthalpy, which is the sum of the internal energy and the energy associated
    with the pressure of the air on its surroundings.<br/><br/>Internal energy is
    the energy contained within a system i.e., the microscopic energy of the air molecules,
    rather than the macroscopic energy associated with, for example, wind, or gravitational
    potential energy. The energy associated with the pressure of the air on its surroundings
    is the energy required to make room for the system by displacing its surroundings
    and is calculated from the product of pressure and volume.<br/><br/>This parameter
    can be used to study the atmospheric energy budget.<br/><br/>Total atmospheric
    energy is made up of internal, potential, kinetic and latent energy.<a href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further documentation</a>.
- id: 162061
  shortname: vipie
  longname: Total column vertically-integrated potential + internal energy
  units: J m**-2
  description: This parameter is the mass weighted vertical integral of potential
    and internal energy for a column of air extending from the surface of the Earth
    to the top of the atmosphere. <br/><br/>The potential energy of an air parcel
    is the amount of work that would have to be done, against the force of gravity,
    to lift the air to that location from mean sea level. Internal energy is the energy
    contained within a system i.e., the microscopic energy of the air molecules, rather
    than the macroscopic energy associated with, for example, wind, or gravitational
    potential energy.<br/><br/>This parameter can be used to study the atmospheric
    energy budget. <br/><br/>Total atmospheric energy is made up of internal, potential,
    kinetic and latent energy.<a href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further documentation</a>.
- id: 162062
  shortname: vipile
  longname: Total column vertically-integrated potential+internal+latent energy
  units: J m**-2
  description: This parameter is the mass weighted vertical integral of potential,
    internal and latent energy for a column of air extending from the surface of the
    Earth to the top of the atmosphere.<br/><br/>The potential energy of an air parcel
    is the amount of work that would have to be done, against the force of gravity,
    to lift the air to that location from mean sea level. Internal energy is the energy
    contained within a system i.e., the microscopic energy of the air molecules, rather
    than the macroscopic energy associated with, for example, wind, or gravitational
    potential energy.<br/><br/>The latent energy refers to the energy associated with
    the water vapour in the atmosphere and is equal to the energy required to convert
    liquid water into water vapour.<br/><br/>This parameter can be used to study the
    atmospheric energy budget.<br/><br/>Total atmospheric energy is made up of internal,
    potential, kinetic and latent energy.<a href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further documentation</a>.
- id: 162063
  shortname: vitoe
  longname: Total column vertically-integrated total energy
  units: J m**-2
  description: ''
- id: 162064
  shortname: viec
  longname: Total column vertically-integrated energy conversion
  units: W m**-2
  description: This parameter is one contribution to the amount of energy being converted
    between kinetic energy, and internal plus potential energy, for a column of air
    extending from the surface of the Earth to the top of the atmosphere. Negative
    values indicate a conversion to kinetic energy from potential plus internal energy.<br/><br/>This
    parameter can be used to study the atmospheric energy budget. The circulation
    of the atmosphere can also be considered in terms of energy conversions.<br/><br/><a
    href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further documentation</a>.
- id: 162065
  shortname: vimae
  longname: Total column vertically-integrated eastward mass flux
  units: kg m**-1 s**-1
  description: <p>This parameter is the horizontal rate of flow of mass, in the eastward
    direction, per metre across the flow, for a column of air extending from the surface
    of the Earth to the top of the atmosphere. Positive values indicate a flux from
    west to east.<br><br>This parameter can be used to study the atmospheric mass
    and energy budgets.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">
    See further information</a>.</p>
- id: 162066
  shortname: viman
  longname: Total column vertically-integrated northward mass flux
  units: kg m**-1 s**-1
  description: <p>This parameter is the horizontal rate of flow of mass, in the northward
    direction, per metre across the flow, for a column of air extending from the surface
    of the Earth to the top of the atmosphere. Positive values indicate a flux from
    south to north.<br><br>This parameter can be used to study the atmospheric mass
    and energy budgets.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">
    See further information</a>.</p>
- id: 162067
  shortname: vikee
  longname: Total column vertically-integrated eastward kinetic energy flux
  units: W m**-1
  description: <p>This parameter is the horizontal rate of flow of kinetic energy,
    in the eastward direction, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Positive values indicate
    a flux from west to east.<br><br>Atmospheric kinetic energy is the energy of the
    atmosphere due to its motion. Only horizontal motion is considered in the calculation
    of this parameter.<br><br>This parameter can be used to study the atmospheric
    energy budget.<br><br><a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">See
    further documentation</a>.</p>
- id: 162068
  shortname: viken
  longname: Total column vertically-integrated northward kinetic energy flux
  units: W m**-1
  description: <p>This parameter is the horizontal rate of flow of kinetic energy,
    in the northward direction, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Positive values indicate
    a flux from south to north.<br><br>Atmospheric kinetic energy is the energy of
    the atmosphere due to its motion. Only horizontal motion is considered in the
    calculation of this parameter.<br><br>This parameter can be used to study the
    atmospheric energy budget.<br><br><a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">See
    further documentation</a>.</p>
- id: 162069
  shortname: vithee
  longname: Total column vertically-integrated eastward heat flux
  units: W m**-1
  description: This parameter is the horizontal rate of flow of heat in the eastward
    direction, per meter across the flow, for a column of air extending from the surface
    of the Earth to the top of the atmosphere. Positive values indicate a flux from
    west to east.<br/><br/>Heat (or thermal energy) is equal to enthalpy, which is
    the sum of the internal energy and the energy associated with the pressure of
    the air on its surroundings.<br/><br/>Internal energy is the energy contained
    within a system i.e., the microscopic energy of the air molecules, rather than
    the macroscopic energy associated with, for example, wind, or gravitational potential
    energy. The energy associated with the pressure of the air on its surroundings
    is the energy required to make room for the system by displacing its surroundings
    and is calculated from the product of pressure and volume.<br/><br/>This parameter
    can be used to study the atmospheric energy budget.<br/><br/><a href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further documentation</a>.
- id: 162070
  shortname: vithen
  longname: Total column vertically-integrated northward heat flux
  units: W m**-1
  description: This parameter is the horizontal rate of flow of heat in the northward
    direction, per meter across the flow, for a column of air extending from the surface
    of the Earth to the top of the atmosphere. Positive values indicate a flux from
    south to north.<br/><br/>Heat (or thermal energy) is equal to enthalpy, which
    is the sum of the internal energy and the energy associated with the pressure
    of the air on its surroundings.<br/><br/>Internal energy is the energy contained
    within a system i.e., the microscopic energy of the air molecules, rather than
    the macroscopic energy associated with, for example, wind, or gravitational potential
    energy. The energy associated with the pressure of the air on its surroundings
    is the energy required to make room for the system by displacing its surroundings
    and is calculated from the product of pressure and volume.<br/><br/>This parameter
    can be used to study the atmospheric energy budget.<br/><br/><a href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further documentation</a>.
- id: 162071
  shortname: viwve
  longname: Total column vertically-integrated eastward water vapour flux
  units: kg m**-1 s**-1
  description: This parameter is the horizontal rate of flow of water vapour, in the
    eastward direction, per metre across the flow, for a column of air extending from
    the surface of the Earth to the top of the atmosphere. Positive values indicate
    a flux from west to east.
- id: 162072
  shortname: viwvn
  longname: Total column vertically-integrated northward water vapour flux
  units: kg m**-1 s**-1
  description: This parameter is the horizontal rate of flow of water vapour, in the
    northward direction, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Positive values indicate
    a flux from south to north.
- id: 162073
  shortname: vige
  longname: Total column vertically-integrated eastward geopotential flux
  units: W m**-1
  description: null
- id: 162074
  shortname: vign
  longname: Total column vertically-integrated northward geopotential flux
  units: W m**-1
  description: <p>This parameter is the horizontal rate of flow of geopotential in
    the northward direction, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Positive values indicate
    a flux from south to north.<br><br>Geopotential is the gravitational potential
    energy of a unit mass, at a particular location, relative to mean sea level. It
    is also the amount of work that would have to be done, against the force of gravity,
    to lift a unit mass to that location from mean sea level.<br><br>This parameter
    can be used to study the atmospheric energy budget.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">
    See further information</a>.</p>
- id: 162075
  shortname: vitee
  longname: Total column vertically-integrated eastward total energy flux
  units: W m**-1
  description: <p>This parameter is the horizontal rate of flow of total energy in
    the eastward direction, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Positive values indicate
    a flux from west to east.<br><br>Total atmospheric energy is made up of internal,
    potential, kinetic and latent energy.<br><br>This parameter can be used to study
    the atmospheric energy budget.<br><br><a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">See
    further documentation</a>.</p>
- id: 162076
  shortname: viten
  longname: Total column vertically-integrated northward total energy flux
  units: W m**-1
  description: <p>This parameter is the horizontal rate of flow of total energy in
    the northward direction, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Positive values indicate
    a flux from south to north.<br><br>Total atmospheric energy is made up of internal,
    potential, kinetic and latent energy.<br><br>This parameter can be used to study
    the atmospheric energy budget.<br><br><a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">See
    further documentation</a>.</p>
- id: 162077
  shortname: vioze
  longname: Total column vertically-integrated eastward ozone flux
  units: kg m**-1 s**-1
  description: <p>This parameter is the horizontal rate of flow of ozone in the eastward
    direction, per metre across the flow, for a column of air extending from the surface
    of the Earth to the top of the atmosphere. Positive values denote a flux from
    west to east.<br><br>In the ECMWF Integrated Forecasting System (IFS), there is
    a simplified representation of ozone chemistry (including a representation of
    the chemistry which has caused the ozone hole). Ozone is also transported around
    in the atmosphere through the motion of air. <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#chapter.10">See
    further documentation</a>.</p>
- id: 162078
  shortname: viozn
  longname: Total column vertically-integrated northward ozone flux
  units: kg m**-1 s**-1
  description: <p>This parameter is the horizontal rate of flow of ozone in the northward
    direction, per metre across the flow, for a column of air extending from the surface
    of the Earth to the top of the atmosphere. Positive values denote a flux from
    south to north.<br><br>In the ECMWF Integrated Forecasting System (IFS), there
    is a simplified representation of ozone chemistry (including a representation
    of the chemistry which has caused the ozone hole). Ozone is also transported around
    in the atmosphere through the motion of air.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#chapter.10">See
    further documentation</a>.</p>
- id: 162079
  shortname: vilwd
  longname: Total column vertically-integrated divergence of cloud liquid water flux
  units: kg m**-2 s**-1
  description: <p>The vertical integral of the cloud liquid water flux is the horizontal
    rate of flow of cloud liquid water, per metre across the flow, for a column of
    air extending from the surface of the Earth to the top of the atmosphere. Its
    horizontal divergence is the rate of cloud liquid water spreading outward from
    a point, per square metre. This parameter is positive for cloud liquid water that
    is spreading out, or diverging, and negative for the opposite, for cloud liquid
    water that is concentrating, or converging (convergence).<br><br>This parameter
    thus indicates whether atmospheric motions act to decrease (for divergence) or
    increase (for convergence) the vertical integral of cloud liquid water.</p>
- id: 162080
  shortname: viiwd
  longname: Total column vertically-integrated divergence of cloud frozen water flux
  units: kg m**-2 s**-1
  description: The vertical integral of the cloud frozen water flux is the horizontal
    rate of flow of cloud frozen water, per metre across the flow, for a column of
    air extending from the surface of the Earth to the top of the atmosphere. Its
    horizontal divergence is the rate of cloud frozen water  spreading outward from
    a point, per square metre. This parameter is positive for cloud frozen water that
    is spreading out, or diverging, and negative for the opposite, for cloud frozen
    water that is concentrating, or converging (convergence).<br/><br/>This parameter
    thus indicates whether atmospheric motions act to decrease (for divergence) or
    increase (for convergence) the vertical integral of cloud frozen water.<br/><br/>Note
    that 'cloud frozen water' is the same as 'cloud ice water'.
- id: 162081
  shortname: vimad
  longname: Total column vertically-integrated divergence of mass flux
  units: kg m**-2 s**-1
  description: <p>The vertical integral of the mass flux is the horizontal rate of
    flow of mass, per metre across the flow, for a column of air extending from the
    surface of the Earth to the top of the atmosphere. Its horizontal divergence is
    the rate of mass spreading outward from a point, per square metre.<br><br>This
    parameter is positive for mass that is spreading out, or diverging, and negative
    for the opposite, for mass that is concentrating, or converging (convergence).<br><br>This
    parameter thus indicates whether atmospheric motions act to decrease (for divergence)
    or increase (for convergence) the vertical integral of mass.<br><br>This parameter
    can be used to study the atmospheric mass and energy budgets.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">
    See further information</a>.</p>
- id: 162082
  shortname: viked
  longname: Total column vertically-integrated divergence of kinetic energy flux
  units: W m**-2
  description: <p>The vertical integral of the kinetic energy flux is the horizontal
    rate of flow of kinetic energy, per metre across the flow, for a column of air
    extending from the surface of the Earth to the top of the atmosphere. Its horizontal
    divergence is the rate of kinetic energy spreading outward from a point, per square
    metre. This parameter is positive for kinetic energy that is spreading out, or
    diverging, and negative for the opposite, for kinetic energy that is concentrating,
    or converging (convergence).<br><br>This parameter thus indicates whether atmospheric
    motions act to decrease (for divergence) or increase (for convergence) the vertical
    integral of kinetic energy.<br><br>Atmospheric kinetic energy is the energy of
    the atmosphere due to its motion. Only horizontal motion is considered in the
    calculation of this parameter.<br><br>This parameter can be used to study the
    atmospheric energy budget.<br><br><a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">See
    further documentation</a>.</p>
- id: 162083
  shortname: vithed
  longname: Total column vertically-integrated divergence of thermal energy flux
  units: W m**-2
  description: The vertical integral of the thermal energy flux is the horizontal
    rate of flow of thermal energy, per metre across the flow, for a column of air
    extending from the surface of the Earth to the top of the atmosphere. Its horizontal
    divergence is the rate of thermal energy spreading outward from a point, per square
    metre. This parameter is positive for thermal energy that is spreading out, or
    diverging, and negative for the opposite, for thermal energy that is concentrating,
    or converging (convergence).<br/><br/>This parameter thus indicates whether atmospheric
    motions act to decrease (for divergence) or increase (for convergence) the vertical
    integral of thermal energy.<br/><br/>The thermal energy is equal to enthalpy,
    which is the sum of the internal energy and the energy associated with the pressure
    of the air on its surroundings.<br/><br/>Internal energy is the energy contained
    within a system i.e., the microscopic energy of the air molecules, rather than
    the macroscopic energy associated with, for example, wind, or gravitational potential
    energy. The energy associated with the pressure of the air on its surroundings
    is the energy required to make room for the system by displacing its surroundings
    and is calculated from the product of pressure and volume.<br/><br/>This parameter
    can be used to study the flow of thermal energy through the climate system and
    to investigate the <a href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>atmospheric
    energy budget</a>.
- id: 162084
  shortname: vimdf
  longname: Total column vertically-integrated moisture divergence flux
  units: kg m**-2 s**-1
  description: <p>The vertical integral of the moisture flux is the horizontal rate
    of flow of moisture, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Its horizontal divergence
    is the rate of moisture spreading outward from a point, per square metre.<br><br>This
    parameter is positive for moisture that is spreading out, or diverging, and negative
    for the opposite, for moisture that is concentrating, or converging (convergence).<br><br>This
    parameter thus indicates whether atmospheric motions act to decrease (for divergence)
    or increase (for convergence) the vertical integral of moisture.</p>
- id: 162085
  shortname: vigd
  longname: Total column vertically-integrated divergence of geopotential flux
  units: W m**-2
  description: <p>The vertical integral of the geopotential flux is the horizontal
    rate of flow of geopotential, per metre across the flow, for a column of air extending
    from the surface of the Earth to the top of the atmosphere. Its horizontal divergence
    is the rate of geopotential spreading outward from a point, per square metre.<br><br>This
    parameter is positive for geopotential that is spreading out, or diverging, and
    negative for the opposite, for geopotential that is concentrating, or converging
    (convergence).<br><br>This parameter thus indicates whether atmospheric motions
    act to decrease (for divergence) or increase (for convergence) the vertical integral
    of geopotential.<br><br>Geopotential is the gravitational potential energy of
    a unit mass, at a particular location, relative to mean sea level. It is also
    the amount of work that would have to be done, against the force of gravity, to
    lift a unit mass to that location from mean sea level.<br><br>This parameter can
    be used to study the atmospheric energy budget. <a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">See
    further information</a>.</p>
- id: 162086
