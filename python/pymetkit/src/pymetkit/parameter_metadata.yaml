- id: 162053
  shortname: vima
  longname: Total column vertically-integrated mass of atmosphere
  units: kg m**-2
  description: This parameter is the total mass of air for a column extending from
    the surface of the Earth to the top of the atmosphere, per square metre.<br/><br/>This
    parameter is calculated by dividing surface pressure by the Earth's gravitational
    acceleration, g (=9.80665 m s<sup>-2</sup>), and has units of kilograms per square
    metre.<br/><br/>This parameter can be used to study the atmospheric mass budget.<a
    href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further information</a>.
- id: 162054
  shortname: vit
  longname: Total column vertically-integrated temperature
  units: K kg m**-2
  description: <p>This parameter is the mass-weighted vertical integral of temperature
    for a column of air extending from the surface of the Earth to the top of the
    atmosphere.<br><br>This parameter can be used to study the atmospheric energy
    budget.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf">
    See further documentation</a>.</p>
