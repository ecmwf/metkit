- id: 131006
  shortname: tpag20
  longname: Total precipitation anomaly of at least 20 mm
  units: '%'
  description: This parameter gives the probability (in %) that the total precipitation
    anomaly will be 20 mm or above.  It is derived from the range of possible outcomes
    as predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction'>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a total precipitation anomaly of 20mm or above. An anomaly
    is a difference from a defined long-term average or climate.<br/><br/>In the ECMWF
    Integrated Forecasting System (IFS), total precipitation is rain and snow that
    falls to the Earth's surface. It is the sum of large-scale precipitation and convective
    precipitation. Large-scale precipitation is generated by the cloud scheme in the
    IFS. The cloud scheme represents the formation and dissipation of clouds and large-scale
    precipitation due to changes in atmospheric quantities (such as pressure, temperature
    and moisture) predicted directly by the IFS at spatial scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid
    box</a> or larger. Convective precipitation is generated by the convection scheme
    in the IFS. The convection scheme represents convection at spatial scales smaller
    than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>.<br/><br/>Precipitation parameters do not include fog, dew or
    the precipitation that evaporates in the atmosphere before it lands at the surface
    of the Earth.
