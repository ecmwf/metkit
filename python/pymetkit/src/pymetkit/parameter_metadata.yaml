- id: 171049
  shortname: 10fga
  longname: 10 metre wind gust anomaly
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the 10 metre wind gust is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>The WMO defines a wind gust as the maximum of the wind
    averaged over 3 second intervals. This duration is shorter than a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    time step</a>, and so the ECMWF Integrated Forecasting System deduces the magnitude
    of a gust within each time step from the time-step-averaged surface stress, surface
    friction, wind shear and stability. Then, the maximum wind gust is selected from
    the gusts at each time step during a particular time period which depends on the
    data extracted.<br/><br/>This parameter is calculated at a height of ten metres
    above the surface of the Earth. <br/><br/>Care should be taken when comparing
    model parameters with observations, because observations are often local to a
    particular point in space and time, rather than representing averages over a <a
    href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 171050
