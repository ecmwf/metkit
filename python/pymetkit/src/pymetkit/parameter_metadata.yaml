- id: 261022
  shortname: wbpt
  longname: Wet-bulb potential temperature
  units: K
  description: This parameter describes the temperature a parcel of air at any level
    would have if, starting at the wet-bulb temperature, it were brought at the saturated
    adiabatic lapse rate to the standard pressure of 1,000 mbar.
- id: 261023
  shortname: wbt
  longname: Wet-bulb temperature
  units: K
  description: The (natural) wet bulb temperature represents the temperature measured
    by a thermometer wrapped in a wet cloth, which simulates the cooling effect of
    human sweat.
