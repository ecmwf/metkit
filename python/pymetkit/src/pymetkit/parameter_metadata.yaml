- id: 131001
  shortname: 2tag2
  longname: 2m temperature anomaly of at least +2K
  units: '%'
  description: This parameter gives the probability (in %) that the 2m temperature
    anomaly will be +2K or above. It is derived from the range of possible outcomes
    as predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction'>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a 2m temperature anomaly of +2K or above.<br/><br/>An anomaly
    is a difference from a defined long-term average. 2m temperature is calculated
    by interpolating between the lowest model level and the Earth's surface, taking
    account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
