- id: 171151
  shortname: msla
  longname: Mean sea level pressure anomaly
  units: Pa
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean sea level pressure is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The mean sea level pressure is the pressure (force
    per unit area) of the atmosphere adjusted to the height of mean sea level. It
    is a measure of the weight that all the air in a column vertically above the area
    of Earth's surface would have at that point, if the point were located at the
    mean sea level. It is calculated over all surfaces - land, sea and in-land water.<br/><br/>Maps
    of mean sea level pressure are used to identify the locations of low and high
    pressure systems, often referred to as cyclones and anticyclones. Contours of
    mean sea level pressure also indicate the strength of the wind. Tightly packed
    contours show stronger winds.<br/><br/>The units of this parameter are pascals
    (Pa). Mean sea level pressure is often measured in hPa and sometimes is presented
    in the old units of millibars, mb (1 hPa = 1 mb = 100 Pa).
- id: 171152
  shortname: lspa
  longname: Logarithm of surface pressure anomaly
  units: '~'
  description: ''
- id: 171153
  shortname: swhra
  longname: Short-wave heating rate anomaly
  units: K
  description: ''
- id: 171154
  shortname: lwhra
  longname: Long-wave heating rate anomaly
  units: K
  description: ''
- id: 171155
  shortname: da
  longname: Relative divergence anomaly
  units: s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the relative divergence is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The relative divergence, also called simply the divergence,
    is the horizontal divergence of velocity. It is the rate at which air is spreading
    out horizontally from a point, per square metre. This parameter is positive for
    air that is spreading out, or diverging, and negative for the opposite, for air
    that is concentrating, or converging (convergence).
- id: 171156
  shortname: gha
  longname: Height anomaly
  units: m
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that geopotential height is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Geopotential height is a measure of the height of a
    point in the atmosphere in relation to its potential energy. It is calculated
    by dividing the geopotential by the Earth's mean gravitational acceleration, g
    (=9.80665 m s-2). The geopotential is the gravitational potential energy of a
    unit mass, at a particular location, relative to mean sea level. Geopotential
    is also the amount of work that would have to be done, against the force of gravity,
    to lift a unit mass to that location from mean sea level.<br/><br/>Geopotential
    height plays an important role in synoptic meteorology (analysis of weather patterns).
    Charts of geopotential height plotted at constant pressure levels (e.g., 300,
    500 or 850 hPa) can be used to identify weather systems such as cyclones, anticyclones,
    troughs and ridges. <br/><br/>The units of this parameter are geopotential metres.
    A geopotential metre is 2% shorter than  a dynamic metre (also called a geodynamic
    metre).
- id: 171157
  shortname: ra
  longname: Relative humidity anomaly
  units: '%'
