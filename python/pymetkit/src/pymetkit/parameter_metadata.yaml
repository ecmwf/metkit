- id: 26
  shortname: cl
  longname: Lake cover
  units: (0 - 1)
  description: '<p>This parameter is the proportion of a <a href="https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step">grid
    box</a> covered by inland water bodies (lakes, reservoirs, rivers) and coastal
    waters. Values vary between 0: no inland or coastal water body, and 1: grid box
    is fully covered with inland or coastal water body. This field is specified from
    observations and is constant in time.<br><br>ECMWF implemented a lake model in
    May 2015 to represent the water temperature and lake ice of all the world''s major
    inland water bodies in the Integrated Forecasting System (IFS). The IFS differentiates
    between (i) ocean water, handled by the ocean model, and (ii) inland water (lakes,
    reservoirs and rivers) and coastal waters handled by the lake parametrisation.
    Lake depth and surface area (or fractional cover) are kept constant in time.</p>'
- id: 27
  shortname: cvl
  longname: Low vegetation cover
  units: (0 - 1)
  description: This parameter is the fraction of the <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>grid
    box</a> (0-1) that is covered with vegetation that is classified as 'low'.<br/><br/>This
    is one of the parameters in the model that describes land surface vegetation.
    'Low vegetation' consists of crops and mixed farming, irrigated crops, short grass,
    tall grass, tundra, semidesert, bogs and marshes, evergreen shrubs, deciduous
    shrubs, and water and land mixtures.
- id: 28
  shortname: cvh
  longname: High vegetation cover
  units: (0 - 1)
  description: This parameter is the fraction of the <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>grid
    box</a> (0-1) that is covered with vegetation that is classified as 'high'.<br/><br/>This
    is one of the parameters in the model that describes land surface vegetation.
    'High vegetation' consists of evergreen trees, deciduous trees, mixed forest/woodland,
    and interrupted forest.
- id: 29
  shortname: tvl
  longname: Type of low vegetation
  units: (Code table 4.234)
  description: This parameter indicates the 10 types of low vegetation recognised
    by the ECMWF Integrated Forecasting System:<br/><br/>1 = Crops, Mixed farming<br/><br/>2
    =  Grass<br/><br/>7 = Tall grass<br/><br/>9 = Tundra<br/><br/>10 = Irrigated crops<br/><br/>11
    = Semidesert <br/><br/>13 = Bogs and marshes<br/><br/>16 = Evergreen shrubs<br/><br/>17
    = Deciduous shrubs<br/><br/>20 = Water and land mixtures<br/><br/>They are used
    to calculate the surface energy balance and the snow albedo.<br/><br/>The other
    types (3, 4, 5, 6, 18, 19 and 19) are high vegetation, or indicate no land surface
    vegetation (8 = Desert, 12=Ice caps and Glaciers, 14 = Inland water, 15 =Ocean).
- id: 30
  shortname: tvh
  longname: Type of high vegetation
  units: (Code table 4.234)
  description: This parameter indicates the 6 types of high vegetation recognised
    by the ECMWF Integrated Forecasting System:<br/><br/>3 = Evergreen needleleaf
    trees<br/><br/>4 = Deciduous needleleaf trees<br/><br/>5 = Deciduous broadleaf
    trees<br/><br/>6 = Evergreen broadleaf trees<br/><br/>18 = Mixed forest/woodland<br/><br/>19
    = Interrupted forest<br/><br/>They are used to calculate the surface energy balance
    and the snow albedo.<br/><br/>The other types (1, 2, 7, 9, 10, 11, 13, 16, 17
    and 20) are low vegetation, or indicate no land surface vegetation (8 = Desert,
    12=Ice caps and Glaciers, 14 = Inland water, 15 =Ocean).
- id: 31
  shortname: ci
  longname: Sea ice area fraction
  units: (0 - 1)
  description: This parameter is the fraction of a <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid
    box</a> which is covered by sea ice. Sea ice can only occur in a grid box which
    includes ocean or inland water according to the land sea mask and lake cover,
    at the resolution being used. This parameter can be known as sea-ice (area) fraction,
    sea-ice concentration and more generally as sea-ice cover. <br/><br/>Coupled atmosphere
    ocean simulations of the ECMWF Integrated Forecasting System (IFS) predict the
    formation and melting of sea ice. Otherwise, in analyses and atmosphere only simulations,
    sea ice is derived from observations, but the model does take account of the way
    that sea ice alters the interaction between the atmosphere and ocean. <br/><br/>Sea
    ice is frozen sea water which floats on the surface of the ocean. Sea ice does
    not include ice which forms on land such as glaciers, icebergs and ice-sheets.
    It also excludes ice shelves which are anchored on land, but protrude out over
    the surface of the ocean. These phenomena are not modelled by the IFS. <br/><br/>Long-term
    monitoring of sea ice is important for understanding climate change. Sea ice also
    affects shipping routes through the polar regions.
- id: 32
  shortname: asn
  longname: Snow albedo
  units: (0 - 1)
  description: 'This parameter is a measure of the reflectivity of the snow-covered
    part of the <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>grid
    box</a>. It is the fraction of solar (shortwave) radiation reflected by snow across
    the solar spectrum.<br/><br/>The <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4''>ECMWF
    Integrated Forecast System represents snow</a>  as a single additional layer over
    the uppermost soil level.<br/><br/>This parameter changes with snow age and also
    depends on vegetation height. For low vegetation, it ranges between 0.52 for old
    snow and 0.88 for fresh snow. For high vegetation with snow underneath, it depends
    on vegetation type and has values between 0.27 and 0.38. See <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4''>further
    information</a>.

    <br>[NOTE: See 228032 for the equivalent parameter in "%"]'
- id: 33
  shortname: rsn
  longname: Snow density
  units: kg m**-3
  description: This parameter is the mass of snow per cubic metre in the snow layer.<br/><br/>The
    ECMWF Integrated Forecast System (IFS) model represents snow as a single additional
    layer over the uppermost soil level. The snow may cover all or part of the<a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>
    grid box</a>.<br/><br/><a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4'>
    See further information on snow in the IFS</a>.
- id: 34
  shortname: sst
  longname: Sea surface temperature
  units: K
  description: This parameter is the temperature of sea water near the surface.<br/><br/>This
    parameter is taken from various providers, who process the observational data
    in different ways. Each provider uses data from several different observational
    sources. For example, satellites measure sea surface temperature (SST) in a layer
    a few microns thick in the uppermost mm of the ocean, drifting buoys measure SST
    at a depth of about 0.2-1.5m, whereas ships sample sea water down to about 10m,
    while the vessel is underway.  Deeper measurements are not affected by changes
    that occur during a day, due to the rising and setting of the Sun (diurnal variations).<br/><br/>Sometimes
    this parameter is taken from a forecast made by coupling the NEMO ocean model
    to the ECMWF Integrated Forecasting System. In this case, the SST is the average
    temperature of the uppermost metre of the ocean and does exhibit diurnal variations.<br/><br/><a
    href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.10'>
    See further documentation </a>.<br/><br/>This parameter has units of kelvin (K).
    Temperature measured in kelvin can be converted to degrees Celsius (&deg;C) by
    subtracting 273.15.
- id: 35
  shortname: istl1
  longname: Ice temperature layer 1
  units: K
  description: 'This parameter is the sea-ice temperature in layer 1 (0 to 7cm).<br/><br/>The
    ECMWF Integrated Forecasting System (IFS) has a four-layer sea-ice slab:<br/>Layer
    1: 0-7cm<br/>Layer 2: 7-28cm<br/>Layer 3: 28-100cm<br/>Layer 4: 100-150cm<br/><br/>The
    temperature of the sea-ice in each layer changes as heat is transferred between
    the sea-ice layers and the atmosphere above and ocean below.<a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.8.9''>
    See further documentation</a>.'
- id: 36
  shortname: istl2
  longname: Ice temperature layer 2
  units: K
  description: 'This parameter is the sea-ice temperature in layer 2 (7 to 28 cm).<br/><br/>The
    ECMWF Integrated Forecasting System (IFS) has a four-layer sea-ice slab:<br/>Layer
    1: 0-7cm<br/>Layer 2: 7-28cm<br/>Layer 3: 28-100cm<br/>Layer 4: 100-150cm<br/><br/>The
    temperature of the sea-ice in each layer changes as heat is transferred between
    the sea-ice layers and the atmosphere above and ocean below.<a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.8.9''>
    See further documentation</a>.'
- id: 37
  shortname: istl3
  longname: Ice temperature layer 3
  units: K
  description: 'This parameter is the sea-ice temperature in layer 3 (28 to 100 cm).<br/><br/>The
    ECMWF Integrated Forecasting System (IFS) has a four-layer sea-ice slab:<br/>Layer
    1: 0-7cm<br/>Layer 2: 7-28cm<br/>Layer 3: 28-100cm<br/>Layer 4: 100-150cm<br/><br/>The
    temperature of the sea-ice in each layer changes as heat is transferred between
    the sea-ice layers and the atmosphere above and ocean below.<a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.8.9''>
    See further documentation</a>.'
- id: 38
  shortname: istl4
  longname: Ice temperature layer 4
  units: K
  description: 'This parameter is the sea-ice temperature in layer 4 (100 to 150 cm).<br/><br/>The
    ECMWF Integrated Forecasting System (IFS) has a four-layer sea-ice slab:<br/>Layer
    1: 0-7cm<br/>Layer 2: 7-28cm<br/>Layer 3: 28-100cm<br/>Layer 4: 100-150cm<br/><br/>The
    temperature of the sea-ice in each layer changes as heat is transferred between
    the sea-ice layers and the atmosphere above and ocean below.<a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.8.9''>
    See further documentation</a>.'
- id: 39
  shortname: swvl1
  longname: Volumetric soil water layer 1
  units: m**3 m**-3
  description: 'This parameter is the volume of water in soil layer 1 (0 - 7cm, the
    surface is at 0cm).<br/><br/>The ECMWF Integrated Forecasting System model has
    a four-layer representation of soil:<br/>Layer 1: 0 - 7cm <br/>Layer 2: 7 - 28cm
    <br/>Layer 3: 28 - 100cm<br/>Layer 4: 100 - 289cm<br/><br/>The volumetric soil
    water is associated with the soil texture (or classification), soil depth, and
    the underlying groundwater level.'
- id: 40
  shortname: swvl2
  longname: Volumetric soil water layer 2
  units: m**3 m**-3
  description: 'This parameter is the volume of water in soil layer 2 (7 - 28cm, the
    surface is at 0cm).<br/><br/>The ECMWF Integrated Forecasting System model has
    a four-layer representation of soil:<br/>Layer 1: 0 - 7cm <br/>Layer 2: 7 - 28cm
    <br/>Layer 3: 28 - 100cm<br/>Layer 4: 100 - 289cm<br/><br/>The volumetric soil
    water is associated with the soil texture (or classification), soil depth, and
    the underlying groundwater level.'
- id: 41
  shortname: swvl3
  longname: Volumetric soil water layer 3
  units: m**3 m**-3
  description: 'This parameter is the volume of water in soil layer 3 (28 - 100cm,
    the surface is at 0cm).<br/><br/>The ECMWF Integrated Forecasting System model
    has a four-layer representation of soil:<br/>Layer 1: 0 - 7cm <br/>Layer 2: 7
    - 28cm <br/>Layer 3: 28 - 100cm<br/>Layer 4: 100 - 289cm<br/><br/>The volumetric
    soil water is associated with the soil texture (or classification), soil depth,
    and the underlying groundwater level.'
- id: 42
  shortname: swvl4
  longname: Volumetric soil water layer 4
  units: m**3 m**-3
  description: 'This parameter is the volume of water in soil layer 4 (100 - 289cm,
    the surface is at 0cm).<br/><br/>The ECMWF Integrated Forecasting System model
    has a four-layer representation of soil:<br/>Layer 1: 0 - 7cm <br/>Layer 2: 7
    - 28cm <br/>Layer 3: 28 - 100cm<br/>Layer 4: 100 - 289cm<br/><br/>The volumetric
    soil water is associated with the soil texture (or classification), soil depth,
    and the underlying groundwater level.'
- id: 43
  shortname: slt
  longname: Soil type
  units: (Code table 4.213)
  description: <p>This parameter is the texture (or classification) of soil used by
    the land surface scheme of the ECMWF Integrated Forecast System to predict the
    water holding capacity of soil in soil moisture and runoff calculations. It is
    derived from the root zone data (30-100 cm below the surface) of the FAO/UNESCO
    Digital Soil Map of the World, DSMW (FAO, 2003), which exists at a resolution
    of 5' X 5' (about 10 km).<br><br>The seven soil types are:</p><figure class="table"><table><tbody><tr><td>Coarse</td><td>1</td></tr><tr><td>Medium</td><td>2</td></tr><tr><td>Medium
    fine</td><td>3</td></tr><tr><td>Fine</td><td>4</td></tr><tr><td>Very fine</td><td>5</td></tr><tr><td>Organic</td><td>6</td></tr><tr><td>Tropical
    organic</td><td>7</td></tr></tbody></table></figure>
- id: 44
  shortname: es
  longname: Snow evaporation
  units: m of water equivalent
  description: 'This parameter is the accumulated amount of water that has evaporated
    from snow from the snow-covered area of a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%253A+What+is+the+spatial+reference''>grid
    box</a>  into vapour in the air above.<br/><br/>The <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4''>ECMWF
    Integrated Forecast System represents snow</a>   as a single additional layer
    over the uppermost soil level. The snow may cover all or part of the grid box.
    This parameter is the depth of water there would be if the evaporated snow (from
    the snow-covered area of a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%253A+What+is+the+spatial+reference''>grid
    box</a> ) were liquid and were spread evenly over the whole grid box.<br/><br/>This
    parameter is accumulated over a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>&nbsp;particular
    time period which depends on the data extracted</a>.<br/><br/>The ECMWF Integrated
    Forecasting System convention is that downward fluxes are positive. Therefore,
    negative values indicate evaporation and positive values indicate deposition.

    <br>[NOTE: See 231003 for the equivalent parameter in "kg m-2"]'
- id: 45
  shortname: smlt
  longname: Snowmelt
  units: m of water equivalent
  description: 'This parameter is the accumulated amount of water that has melted
    from snow in the snow-covered area of a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%253A+What+is+the+spatial+reference''>grid
    box</a>.<br/><br/>The <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4''>ECMWF
    Integrated Forecast System represents snow</a>   as a single additional layer
    over the uppermost soil level. The snow may cover all or part of the grid box.
    This parameter is the depth of water there would be if the melted snow (from the
    snow-covered area of a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%253A+What+is+the+spatial+reference''>grid
    box</a> ) were spread evenly over the whole grid box. For example, if half the
    grid box were covered in snow with a water equivalent depth of 0.02m, this parameter
    would have a value of 0.01m.<br/><br/>This parameter is accumulated over a <a
    href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>&nbsp;particular
    time period which depends on the data extracted</a>.

    [NOTE: See 3099 for the equivalent parameter in "kg m-2"]'
- id: 46
  shortname: sdur
  longname: Solar duration
  units: s
  description: null
- id: 47
  shortname: dsrp
  longname: Surface direct normal short-wave (solar) radiation
  units: J m**-2
  description: <p>This parameter is the amount of direct radiation from the Sun (also
    known as solar or shortwave radiation) reaching the surface on a plane perpendicular
    to the direction of the Sun.&nbsp;<br><br>Solar radiation at the surface can be
    direct or diffuse. Solar radiation can be scattered in all directions by particles
    in the atmosphere, some of which reaches the surface (diffuse solar radiation).
    Some solar radiation reaches the surface without being scattered (direct solar
    radiation). <a href="https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf">See
    further documentation</a>.<br><br>This parameter is accumulated over a particular
    time period which depends on the data extracted. The units are joules per square
    metre (J m-2). To convert to watts per square metre (W m-2), the accumulated values
    should be divided by the accumulation period expressed in seconds.<br><br>The
    ECMWF convention for vertical fluxes is positive downwards.</p>
- id: 48
  shortname: magss
  longname: Time-integrated magnitude of turbulent surface stress
  units: N m**-2 s
  description: <p>Accumulated field</p>
- id: 49
  shortname: 10fg
  longname: Maximum 10 metre wind gust since previous post-processing
  units: m s**-1
  description: "Maximum 3 second wind at 10 m height as defined by WMO.<br><br>\r\n\
    Parametrization represents turbulence only before 01102008; thereafter effects\
    \ of convection are included. The 3 s gust is computed every time step and and\
    \ the maximum is kept since the last postprocessing."
- id: 50
  shortname: lspf
  longname: Large-scale precipitation fraction
  units: s
  description: This parameter is the accumulation of the fraction of the grid box
    (0-1) that was covered by large-scale precipitation.<br/><br/>This parameter is
    accumulated over a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>
    particular time period which depends on the data extracted</a>. See <a  href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.7.2.4'>further
    information</a>.
- id: 51
  shortname: mx2t24
  longname: Maximum temperature at 2 metres in the last 24 hours
  units: K
  description: The highest value of 2 metre temperature in the previous 24 hour period.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.<br/><br/>This parameter has units of kelvin (K). Temperature
    measured in kelvin can be converted to degrees Celsius (&deg;C) by subtracting
    273.15.
- id: 52
  shortname: mn2t24
  longname: Minimum temperature at 2 metres in the last 24 hours
  units: K
  description: The lowest value of 2 metre temperature in the previous 24 hour period.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.<br/><br/>This parameter has units of kelvin (K). Temperature
    measured in kelvin can be converted to degrees Celsius (&deg;C) by subtracting
    273.15.
- id: 53
  shortname: mont
  longname: Montgomery potential
  units: m**2 s**-2
  description: Takes the role of geopotential in an isentropic vertical coordinate
- id: 54
  shortname: pres
  longname: Pressure
  units: Pa
  description: null
- id: 55
  shortname: mean2t24
  longname: Mean temperature at 2 metres in the last 24 hours
  units: K
  description: <p>The mean value of 2 metre temperature in the previous 24 hour period.
    The mean is calculated from the temperature at each <a href="https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep">model
    time step</a>.<br><br>2m temperature is calculated by interpolating between the
    lowest model level and the Earth's surface, taking account of the atmospheric
    conditions. See <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3">further
    information</a>.<br><br>This parameter has units of kelvin (K). Temperature measured
    in kelvin can be converted to degrees Celsius (°C) by subtracting 273.15</p><p>Please
    use 228004 for the GRIB2 encoding of this parameter.</p>
- id: 56
  shortname: mn2d24
  longname: Mean 2 metre dewpoint temperature in the last 24 hours
  units: K
  description: <p>6-hourly intervals</p><p>Please use 235168 for the GRIB2 encoding
    of this parameter.</p>
- id: 57
  shortname: uvb
  longname: Surface downward UV radiation
  units: J m**-2
  description: <p>This parameter is the amount of ultraviolet (UV) radiation reaching
    the surface. It is the amount of radiation passing through a horizontal plane,
    not a plane perpendicular to the direction of the Sun.<br><br>UV radiation is
    part of the electromagnetic spectrum emitted by the Sun that has wavelengths shorter
    than visible light. In the ECMWF Integrated Forecasting system it is defined as
    radiation with a wavelength of 0.20-0.44 µm (microns, 1 millionth of a metre).&nbsp;<br><br>Small
    amounts of UV are essential for living organisms, but overexposure may result
    in cell damage; in humans this includes acute and chronic health effects on the
    skin, eyes and immune system. UV radiation is absorbed by the ozone layer, but
    some reaches the surface. The depletion of the ozone layer is causing concern
    over an increase in the damaging effects of UV.&nbsp;<br><br>This parameter is
    <a href="https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations">accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br><br>The ECMWF convention for vertical fluxes is positive downwards.</p>
- id: 58
  shortname: par
  longname: Photosynthetically active radiation at the surface
  units: J m**-2
  description: '0.40-0.70 um. Accumulated field.<br>

    Before Cycle 43R1, a coding error meant that PAR was computed from the wrong spectral
    bands and hence was underestimated by around 30%.<br>It should therefore only
    be used from Cycles 43R1 and later.'
- id: 59
  shortname: cape
  longname: Convective available potential energy
  units: J kg**-1
  description: 'This is an indication of the instability (or stability) of the atmosphere
    and can be used to assess the potential for the development of convection, which
    can lead to heavy rainfall, thunderstorms and other severe weather.<br/><br/>In
    the ECMWF Integrated Forecasting System (IFS), CAPE is calculated by considering  parcels
    of air departing at different model levels below the 350 hPa level. If a parcel
    of air is more buoyant (warmer and/or with more moisture) than its surrounding
    environment, it will continue to rise (cooling as it rises) until it reaches a
    point where it no longer has positive buoyancy. CAPE is the potential energy represented
    by the total excess buoyancy. The maximum CAPE produced by the different parcels
    is the value retained.<br/><br/> Large positive values of CAPE indicate that an
    air parcel would be much warmer than its surrounding environment and therefore,
    very buoyant. CAPE is related to the maximum potential vertical velocity of air
    within an updraft; thus, higher values indicate greater potential for severe weather.
    Observed values in thunderstorm environments often may exceed 1000 joules per
    kilogram (J kg<sup>-1</sup>), and in extreme cases may exceed 5000 J kg<sup>-1</sup>.<br/><br/>
    The calculation of this parameter assumes: (i) the parcel of air does not mix
    with surrounding air; (ii) ascent is pseudo-adiabatic (all condensed water falls
    out) and (iii) other simplifications related to the mixed-phase condensational
    heating.'
- id: 60
  shortname: pv
  longname: Potential vorticity
  units: K m**2 kg**-1 s**-1
  description: 'Potential vorticity is a measure of the capacity for air to rotate
    in the atmosphere. If we ignore the effects of heating and friction, potential
    vorticity is conserved following an air parcel. It is used to look for places
    where large wind storms are likely to originate and develop.  Potential vorticity
    increases strongly above the tropopause and therefore, it can also be used in
    studies related to the stratosphere and stratosphere-troposphere exchanges.<br/><br/>Large
    wind storms develop when a column of air in the atmosphere starts to rotate. Potential
    vorticity is calculated from the wind, temperature and pressure across a column
    of air in the atmosphere. '
- id: 62
  shortname: obct
  longname: Observation count
  units: '~'
  description: Count of observations used in calculating value at a gridpoint
- id: 63
  shortname: stsktd
  longname: Start time for skin temperature difference
  units: s
  description: Seconds from reference time
- id: 64
  shortname: ftsktd
  longname: Finish time for skin temperature difference
  units: s
  description: Seconds from reference time
- id: 65
  shortname: sktd
  longname: Skin temperature difference
  units: K
  description: ''
- id: 66
  shortname: lai_lv
  longname: Leaf area index, low vegetation
  units: m**2 m**-2
  description: This parameter is the surface area of one side of all the leaves found
    over an area of land for vegetation classified as 'low'. This parameter has a
    value of 0 over bare ground or where there are no leaves. It can be calculated
    daily from satellite data. It is important for forecasting, for example, how much
    rainwater will be intercepted by the vegetative canopy, rather than falling to
    the ground. <br/><br/>This is one of the parameters in the model that describes
    land surface vegetation. 'Low vegetation' consists of crops and mixed farming,
    irrigated crops, short grass, tall grass, tundra, semidesert, bogs and marshes,
    evergreen shrubs, deciduous shrubs, and water and land mixtures.
- id: 67
  shortname: lai_hv
  longname: Leaf area index, high vegetation
  units: m**2 m**-2
  description: This parameter is the surface area of one side of all the leaves found
    over an area of land for vegetation classified as 'high'. This parameter has a
    value of 0 over bare ground or where there are no leaves. It can be calculated
    daily from satellite data.  It is important for forecasting, for example, how
    much rainwater will be intercepted by the vegetative canopy, rather than falling
    to the ground. <br/><br/>This is one of the parameters in the model that describes
    land surface vegetation. 'High vegetation' consists of evergreen trees, deciduous
    trees, mixed forest/woodland, and interrupted forest.
- id: 68
  shortname: msr_lv
  longname: Minimum stomatal resistance, low vegetation
  units: s m**-1
  description: ''
- id: 69
  shortname: msr_hv
  longname: Minimum stomatal resistance, high vegetation
  units: s m**-1
  description: ''
- id: 70
  shortname: bc_lv
  longname: Biome cover, low vegetation
  units: (0 - 1)
  description: ''
- id: 71
  shortname: bc_hv
  longname: Biome cover, high vegetation
  units: (0 - 1)
  description: ''
- id: 72
  shortname: issrd
  longname: Instantaneous surface solar radiation downwards
  units: W m**-2
  description: <p>This parameter is only available in GRIB1.</p>
- id: 73
  shortname: istrd
  longname: Instantaneous surface thermal radiation downwards
  units: W m**-2
  description: <p>This parameter is only available in GRIB1.</p>
- id: 74
  shortname: sdfor
  longname: Standard deviation of filtered subgrid orography (climatological)
  units: m
  description: Climatological field (scales between approximately 3 and 22 km are
    included)
- id: 75
  shortname: crwc
  longname: Specific rain water content
  units: kg kg**-1
  description: 'The mass of water produced from large-scale clouds that is of raindrop
    size and so can fall to the surface as precipitation.<br/><br/>Large-scale clouds
    are generated by the cloud scheme in the ECMWF Integrated Forecasting System (IFS).
    The cloud scheme represents the formation and dissipation of clouds and large-scale
    precipitation due to changes in atmospheric quantities (such as pressure, temperature
    and moisture) predicted directly by the IFS at spatial scales of a grid box or
    larger. See <a href=''https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation''>further
    information</a>.<br/><br/>The quantity is expressed in kilograms per kilogram
    of the total mass of moist air. The ''total mass of moist air'' is the sum of
    the dry air, water vapour, cloud liquid, cloud ice, rain and falling snow. This
    parameter represents the average value for a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>.<br/><br/>Clouds contain a continuum of different sized water droplets
    and ice particles. The IFS cloud scheme simplifies this to represent a number
    of discrete cloud droplets/particles including: cloud water droplets, raindrops,
    ice crystals and snow (aggregated ice crystals). The processes of droplet formation,
    phase transition and aggregation are also highly simplified in the IFS.'
- id: 76
  shortname: cswc
  longname: Specific snow water content
  units: kg kg**-1
  description: 'The mass of snow (aggregated ice crystals) produced from large-scale
    clouds that can fall to the surface as precipitation. <br/><br/>Large-scale clouds
    are generated by the cloud scheme in the ECMWF Integrated Forecasting System (IFS).
    The cloud scheme represents the formation and dissipation of clouds and large-scale
    precipitation due to changes in atmospheric quantities (such as pressure, temperature
    and moisture) predicted directly by the IFS at spatial scales of a grid box or
    larger. See <a href=''https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation''>further
    information</a>.<br/><br/>The mass is expressed in kilograms per kilogram of the
    total mass of moist air. The ''total mass of moist air'' is the sum of the dry
    air, water vapour, cloud liquid, cloud ice, rain and falling snow. This parameter
    represents the average value for a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>.<br/><br/>Clouds contain a continuum of different sized water droplets
    and ice particles. The IFS cloud scheme simplifies this to represent a number
    of discrete cloud droplets/particles including: cloud water droplets, raindrops,
    ice crystals and snow (aggregated ice crystals). The processes of droplet formation,
    phase transition and aggregation are also highly simplified in the IFS.'
- id: 77
  shortname: etadot
  longname: Eta-coordinate vertical velocity
  units: s**-1
  description: This parameter is the rate of air motion in the upward or downward
    direction. The ECMWF Integrated Forecasting System (IFS) uses a pressure and terrain-based
    vertical coordinate system called eta-coordinate. Since pressure in the atmosphere
    decreases with height, negative values of eta-coordinate vertical velocity indicate
    upward motion.  <br/><br/>This parameter is used in the IFS to calculate the vertical
    transport, or advection, of atmospheric quantities such as moisture.
- id: 78
  shortname: tclw
  longname: Total column cloud liquid water
  units: kg m**-2
  description: 'This parameter is the amount of liquid water contained within cloud
    droplets in a column extending from the surface of the Earth to the top of the
    atmosphere. Rain water droplets, which are much larger in size (and mass), are
    not included in this parameter.<br/><br/>This parameter represents the area averaged
    value for a <a href=''https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep''>model
    grid box</a>.<br/><br/>Clouds contain a continuum of different- sized water droplets
    and ice particles. The ECMWF Integrated Forecasting System (IFS) cloud scheme
    simplifies this to represent a number of discrete cloud droplets/particles including:
    cloud water droplets, raindrops, ice crystals and snow (aggregated ice crystals).
    The processes of droplet formation, phase transition and aggregation are also
    highly simplified in the IFS.'
- id: 79
  shortname: tciw
  longname: Total column cloud ice water
  units: kg m**-2
  description: 'This parameter is the amount of ice contained within clouds in a column
    extending from the surface of the Earth to the top of the atmosphere. Snow (aggregated
    ice crystals) is not included in this parameter.<br/><br/>This parameter represents
    the area averaged value for a <a href=''https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep''>model
    grid box</a>.<br/><br/>Clouds contain a continuum of different- sized water droplets
    and ice particles. The  ECMWF Integrated Forecasting System (IFS) cloud scheme
    simplifies this to represent a number of discrete cloud droplets/particles including:
    cloud water droplets, raindrops, ice crystals and snow (aggregated ice crystals).
    The processes of droplet formation, phase transition and aggregation are also
    highly simplified in the IFS.'
