- id: 171137
  shortname: tcwva
  longname: Total column water vapour anomaly
  units: kg m**-2
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the total water vapour (in a column extending
    from the surface of the Earth to the top of the atmosphere) is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>This parameter represents the area averaged value for
    a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>.
- id: 171138
  shortname: voa
  longname: Relative vorticity anomaly
  units: s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the relative vorticity is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Relative vorticity is a measure of the rotation of
    air in the horizontal, around a vertical axis, relative to a fixed point on the
    surface of the Earth.<br/><br/>On the scale of weather systems, low pressure systems
    (weather features that can include rain) are associated with anticlockwise rotation
    (in the northern hemisphere), and high pressure systems (weather features that
    bring light or still winds) are associated with clockwise rotation.<br/><br/>Adding
    the effect of rotation of the Earth, the Coriolis parameter, to the relative vorticity
    produces the absolute vorticity.
- id: 171139
  shortname: stal1
  longname: Soil temperature anomaly level 1
  units: K
  description: 'An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the soil temperature at level 1 (the middle
    of layer 1) is higher/lower than the long-term average. The long-term average
    is typically derived from several decades of model data and will vary with location
    and time of year (see <a href=''https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates''>further
    information</a> ).<br/><br/>The ECMWF Integrated Forecasting System model has
    a four-layer representation of soil:<br/><br/>Layer 1: 0 - 7cm<br/><br/>Layer
    2: 7 - 28cm<br/><br/>Layer 3: 28 - 100cm<br/><br/>Layer 4: 100 - 289cm<br/><br/>Soil
    temperature is set at the middle of each layer, and heat transfer is calculated
    at the interfaces between them. It is assumed that there is no heat transfer out
    of the bottom of the lowest layer.<br/><br/>This parameter has units of kelvin
    (K). Temperature measured in kelvin can be converted to degrees Celsius (&deg;C)
    by subtracting 273.15.<br/><br/> <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.5''>See
    further information</a>.'
- id: 171140
  shortname: swal1
  longname: Soil wetness anomaly level 1
  units: kg m**-2
  description: ''
- id: 171141
  shortname: sda
  longname: Snow depth anomaly
  units: m of water equivalent
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the snow depth is higher/lower than the
    long-term average. The long-term average is typically derived from several decades
    of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates'>further
    information</a> ).<br/><br/>The <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4'>ECMWF
    Integrated Forecast System represents snow</a>   as a single additional layer
    over the uppermost soil level. The snow may cover all or part of the grid box.
    Snow depth is the depth the water would have if the snow (from the snow-covered
    area of a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%253A+What+is+the+spatial+reference'>grid
    box</a> ) melted and was spread evenly over the whole grid box. Therefore, its
    units are metres of water equivalent.
