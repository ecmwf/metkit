- id: 228078
  shortname: gppbfas
  longname: GPP coefficient from Biogenic Flux Adjustment System
  units: dimensionless
  description: "The two parameters \"gppbfas\" and \"recbfas\" are dimensionless re-scaling\
    \ factors which are applied to the\nCO2 ecosystem fluxes from the Carbon module\
    \ (CTESSEL) in the IFS:\n<ul>\r\n<li>gppbfas is applied to the Gross Primary Production\
    \ (GPP)</li>\r\n<li>recbfas is applied to the ecosystem Respiration (Reco)</li>\n\
    </ul>\r\nThe factors are used in order to reduce the biases of the CO2 ecosystem\
    \ fluxes which are used in the operational CAMS CO2 forecast/analysis.\r\nThey\
    \ are currently computed before the beginning of the forecast by comparing the\
    \ Net Ecosystem Exchange budget of the model (NEE=GPP+Reco) within a 10-day window\
    \ and a reference climatology (based on optimized fluxes) plus/minus the NEE budget\
    \ anomaly of the model.\r\nIn the long term, these factors will be adjusted by\
    \ the data assimilation system using flux and/or atmospheric CO2 observations."
- id: 228079
  shortname: recbfas
  longname: Rec coefficient from Biogenic Flux Adjustment System
  units: dimensionless
  description: 'The two parameters "gppbfas" and "recbfas" are dimensionless re-scaling
    factors which are applied to the

    CO2 ecosystem fluxes from the Carbon module (CTESSEL) in the IFS:

    <ul>

    <li>gppbfas is applied to the Gross Primary Production (GPP)</li>

    <li>recbfas is applied to the ecosystem Respiration (Reco)</li>

    </ul>

    The factors are used in order to reduce the biases of the CO2 ecosystem fluxes
    which are used in the operational CAMS CO2 forecast/analysis.

    They are currently computed before the beginning of the forecast by comparing
    the Net Ecosystem Exchange budget of the model (NEE=GPP+Reco) within a 10-day
    window and a reference climatology (based on optimized fluxes) plus/minus the
    NEE budget anomaly of the model.

    In the long term, these factors will be adjusted by the data assimilation system
    using flux and/or atmospheric CO2 observations.'
