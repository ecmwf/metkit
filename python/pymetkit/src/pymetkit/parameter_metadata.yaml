- id: 260048
  shortname: tprate
  longname: Total precipitation rate
  units: kg m**-2 s**-1
  description: This parameter is the rate of total precipitation, <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a>.<br/><br/>In the ECMWF Integrated Forecasting System (IFS),
    total precipitation is rain and snow that falls to the Earth's surface.  It is
    the sum of large-scale precipitation and convective precipitation. Large-scale
    precipitation is generated by the cloud scheme in the IFS. The cloud scheme represents
    the formation and dissipation of clouds and large-scale precipitation due to changes
    in atmospheric quantities (such as pressure, temperature and moisture) predicted
    directly by the IFS at spatial scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid
    box</a> or larger. Convective precipitation is generated by the convection scheme
    in the IFS. The convection scheme represents convection at spatial scales smaller
    than the grid box.See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>. Precipitation parameters do not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.<br/><br/>1
    kg of water spread over 1 square metre of surface is 1 mm deep (neglecting the
    effects of temperature on the density of water), therefore the units are equivalent
    to mm per second.<br/><br/>Care should be taken when comparing model parameters
    with observations, because observations are often local to a particular point
    in space and time, rather than representing averages over a model grid box and
    <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    time step </a>.
