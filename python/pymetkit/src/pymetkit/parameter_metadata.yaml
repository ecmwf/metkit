- id: 260645
  shortname: titspf
  longname: Time integral of total solid precipitation flux
  units: kg m**-2
  description: "This parameter is the accumulated sum of all types of solid water,\
    \ e.g. graupel, snow and hail that falls to the Earth's surface. It is the sum\
    \ of large-scale solid precipitation and convective solid precipitation.\r\n\r\
    \nIn the ECMWF Integrated Forecasting System (IFS), large-scale solid precipitation\
    \ is generated by the prognostic cloud scheme.  Convective solid precipitation\
    \ is generated by the convection scheme in the IFS, which represents convection\
    \ at spatial scales smaller than the grid box.<a href=\"https://confluence.ecmwf.int/display/CKB/Convective+and+large-scale+precipitation\"\
    >See further information</a>. This parameter does not include precipitation that\
    \ evaporates in the atmosphere before it lands at the surface of the Earth.\r\n\
    \r\nThis parameter is the total amount of solid precipitation <a href=\"https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations\"\
    >accumulated over a particular time period which depends on the data extracted</a>.\r\
    \n\r\nCare should be taken when comparing model parameters with observations,\
    \ because observations are often local to a particular point in space and time,\
    \ rather than representing averages over a model grid box."
- id: 260646
  shortname: 10efg
  longname: 10 metre eastward wind gust since previous post-processing
  units: m s**-1
  description: 'This parameter is the eastward component of the maximum wind gust
    since the previous post-processing step at a height of ten metres above the surface
    of the Earth.<br>

    The WMO defines a wind gust as the maximum of the wind averaged over 3 second
    intervals. This duration is shorter than a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>model
    time step</a>, and so the ECMWF Integrated Forecasting System deduces the magnitude
    of a gust within each time step from the time-step-averaged surface stress, surface
    friction, wind shear and stability. Then, the maximum wind gust is selected from
    the gusts at each time step since the previous post-processing time.<br>

    Care should be taken when comparing model parameters with observations, because
    observations are often local to a particular point in space and time, rather than
    representing averages over a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>model
    grid box and model time step</a>.'
- id: 260647
  shortname: 10nfg
  longname: 10 metre northward wind gust since previous post-processing
  units: m s**-1
  description: 'This parameter is the northward component of the maximum wind gust
    since the previous post-processing step at a height of ten metres above the surface
    of the Earth.<br>

    The WMO defines a wind gust as the maximum of the wind averaged over 3 second
    intervals. This duration is shorter than a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>model
    time step</a>, and so the ECMWF Integrated Forecasting System deduces the magnitude
    of a gust within each time step from the time-step-averaged surface stress, surface
    friction, wind shear and stability. Then, the maximum wind gust is selected from
    the gusts at each time step since the previous post-processing time.<br>

    Care should be taken when comparing model parameters with observations, because
    observations are often local to a particular point in space and time, rather than
    representing averages over a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>model
    grid box and model time step</a>.'
