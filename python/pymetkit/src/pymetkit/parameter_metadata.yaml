  description: ''
- id: 162092
  shortname: vimat
  longname: Total column vertically-integrated mass tendency
  units: kg m**-2 s**-1
  description: This parameter is the rate of change of the mass of a column of air
    extending from the Earth's surface to the top of the atmosphere. An increasing
    mass of the column indicates rising surface pressure. In contrast, a decrease
    indicates a falling surface pressure trend.<br/><br/>The mass of the column is
    calculated by dividing pressure at the Earth's surface by the gravitational acceleration,
    g (=9.80665 m s<sup>-2</sup>).<br/><br/>This parameter can be used to study the
    atmospheric mass and energy budgets.<a href='https://www.ecmwf.int/sites/default/files/elibrary/2011/8175-atmospheric-conservation-properties-era-interim.pdf'>
    See further information</a>.
