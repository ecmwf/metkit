    and over frequencies less than 0.1 hertz (i.e. periods longer than 10 seconds).
    <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>See
    further documentation.</a> <br/><br/>This parameter can be used to assess sea
    state and swell. For example, engineers use significant wave height to calculate
    the load on structures in the open ocean, such as oil platforms, or in coastal
    applications.
- id: 140121
  shortname: swh1
  longname: Significant wave height of first swell partition
  units: m
  description: This parameter represents the average height of the highest third of
    surface ocean/sea waves associated with the first swell partition. Wave height
    represents the vertical distance between the wave crest and the wave trough.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time. <br/><br/>In many situations, swell can be made up of different
    swell systems, for example, from two distant and separate storms. To account for
    this, the swell spectrum is partitioned into up to three parts. The swell partitions
    are labelled first, second and third based on their respective wave height. Therefore,
    there is no guarantee of spatial coherence (the first might be from one system
    at one location and another system at the neighbouring location). See <a href='https://confluence.ecmwf.int/download/attachments/59774192/wave_parameters.pdf?version=1'>further
    information</a>.<br/><br/>More strictly, this parameter is four times the square
    root of the integral over all directions and all frequencies of the first swell
    partition of the two-dimensional swell spectrum. The swell spectrum is obtained
    by only considering the components of the two-dimensional wave spectrum that are
    not under the influence of the local wind.<br/><br/>This parameter can be used
    to assess swell. For example, engineers use significant wave height to calculate
    the load on structures in the open ocean, such as oil platforms, or in coastal
    applications.
- id: 140122
  shortname: mwd1
  longname: Mean wave direction of first swell partition
  units: degrees
  description: This parameter is the mean direction of waves in the first swell partition.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time. <br/><br/>In many situations, swell can be made up of different
    swell systems, for example, from two distant and separate storms. To account for
    this, the swell spectrum is partitioned into up to three parts. The swell partitions
    are labelled first, second and third based on their respective wave height. Therefore,
    there is no guarantee of spatial coherence (the first swell partition might be
    from one system at one location and a different system at the neighbouring location).
    See <a href='https://confluence.ecmwf.int/download/attachments/59774192/wave_parameters.pdf?version=1'>further
    information</a>.<br/><br/>The units are degrees true which means the direction
    relative to the geographic location of the north pole. It is the direction that
    waves are coming FROM, so zero means 'coming from the north' and 90 'coming from
    the east'.
- id: 140123
  shortname: mwp1
  longname: Mean wave period of first swell partition
  units: s
  description: This parameter is the mean period of waves in the first swell partition.
    The wave period is the average time it takes for two consecutive wave crests,
    on the surface of the ocean/sea, to pass through a fixed point.<br/><br/>The ocean/sea
    surface wave field consists of a combination of waves with different heights,
    lengths and directions (known as the two-dimensional wave spectrum). The wave
    spectrum can be decomposed into wind-sea waves, which are directly affected by
    local winds, and swell, the waves that were generated by the wind at a different
    location and time. <br/><br/>In many situations, swell can be made up of different
    swell systems, for example, from two distant and separate storms. To account for
    this, the swell spectrum is partitioned into up to three parts. The swell partitions
    are labelled first, second and third based on their respective wave height. Therefore,
    there is no guarantee of spatial coherence (the first swell partition might be
    from one system at one location and a different system at the neighbouring location).
    See <a href='https://confluence.ecmwf.int/download/attachments/59774192/wave_parameters.pdf?version=1'>further
    information</a>.
- id: 140124
  shortname: swh2
  longname: Significant wave height of second swell partition
  units: m
  description: This parameter represents the average height of the highest third of
    surface ocean/sea waves associated with the second swell partition. Wave height
    represents the vertical distance between the wave crest and the wave trough.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time. <br/><br/>In many situations, swell can be made up of different
    swell systems, for example, from two distant and separate storms. To account for
    this, the swell spectrum is partitioned into up to three parts. The swell partitions
    are labelled first, second and third based on their respective wave height. Therefore,
    there is no guarantee of spatial coherence (the second might be from one system
    at one location and another system at the neighbouring location). See <a href='https://confluence.ecmwf.int/download/attachments/59774192/wave_parameters.pdf?version=1'>further
    information</a>.<br/><br/>More strictly, this parameter is four times the square
    root of the integral over all directions and all frequencies of the first swell
    partition of the two-dimensional swell spectrum. The swell spectrum is obtained
    by only considering the components of the two-dimensional wave spectrum that are
    not under the influence of the local wind.<br/><br/>This parameter can be used
    to assess swell. For example, engineers use significant wave height to calculate
    the load on structures in the open ocean, such as oil platforms, or in coastal
    applications.
