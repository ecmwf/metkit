  description: null
- id: 173212
  shortname: soiara
  longname: Solar insolation anomalous rate of accumulation
  units: W m**-2 s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean solar insolation is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Solar insolation is the incoming radiation from the
    Sun (also known as solar or shortwave radiation) at the top of the atmosphere
    (TOA). It is the amount of radiation passing through a horizontal plane, not a
    plane perpendicular to the direction of the Sun. <br/><br/>Solar insolation has
    a diurnal cycle (as it is defined into a horizontal plane and not a plane perpendicular
    to the Sun), as well as an annual cycle due to the change in Sun-Earth distance,
    and the approximately 11-year solar cycle. Solar insolation at the TOA has experienced
    no absorption, scattering or reflection within the atmosphere (e.g., from clouds,
    water vapour, ozone, trace gases and aerosol). <br/><br/>The mean flux is the
    accumulated flux divided by the length of the accumulation period, which depends
    on the data extracted</a>. The ECMWF convention for vertical fluxes is positive
    downwards.
- id: 173228
  shortname: tpara
  longname: Total precipitation anomalous rate of accumulation
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean precipitation rate is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>The mean precipitation rate is the accumulated precipitation
    divided by the length of the accumulation period, <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>which
    depends on the data extracted</a>.<br/><br/>In the ECMWF Integrated Forecasting
    System (IFS), total precipitation is rain and snow that falls to the Earth's surface.
    It is the sum of large-scale precipitation and convective precipitation. Large-scale
    precipitation is generated by the cloud scheme in the IFS. The cloud scheme represents
    the formation and dissipation of clouds and large-scale precipitation due to changes
    in atmospheric quantities (such as pressure, temperature and moisture) predicted
    directly by the IFS at spatial scales of a grid box or larger. Convective precipitation
    is generated by the convection scheme in the IFS. The convection scheme represents
    convection at spatial scales smaller than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>. Precipitation parameters do not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.<br/><br/>The
    units are depth of water equivalent in metres which falls per second. It is the
    depth the water would have if it were spread evenly over the <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>.<br/><br/>Care should be taken when comparing model parameters with observations,
    because observations are often local to a particular point in space and time,
    rather than representing averages over a model grid box and <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>
    model time step </a>.
