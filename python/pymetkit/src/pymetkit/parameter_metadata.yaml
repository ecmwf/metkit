- id: 173008
  shortname: msrora
  longname: Mean surface runoff rate anomaly
  units: m of water equivalent s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean surface runoff rate is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The mean surface runoff rate is the amount of water
    from rainfall or melting snow that is not absorbed by the soil and drains away
    over the surface. Water may also drain away under the ground. It is the accumulated
    amount of water, divided by the length of the accumulation period, which depends
    on the data extracted</a>.<br/><br/>This quantity represents the depth this water
    would have if it were spread evenly over the grid box. <br/><br/>Care should be
    taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>model
    grid box and model time step</a>
- id: 173009
  shortname: mssrora
  longname: Mean sub-surface runoff rate anomaly
  units: m of water equivalent s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the mean sub-surface runoff rate is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The mean sub-surface runoff rate is the amount of water
    deep in the soil that drains away under the ground. Water may also drain away
    over the surface. It is the accumulated amount of water, divided by the length
    of the accumulation period, which depends on the data extracted</a>.<br/><br/>This
    quantity represents the depth this water would have if it were spread evenly over
    the grid box. <br/><br/>Care should be taken when comparing model parameters with
    observations, because observations are often local to a particular point in space
    and time, rather than representing averages over a <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>model
    grid box and model time step</a>
