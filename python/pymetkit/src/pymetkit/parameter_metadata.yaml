- id: 3020
  shortname: vis
  longname: Visibility
  units: m
  description: 'A visibility parameter was introduced in the ECMWF Integrated Forecasting
    System (IFS) from 12 May 2015. It uses model projections of water vapour, cloud,
    rain and snow, and climatological aerosol fields to estimate the visibility that
    would be recorded by weather observers. It is calculated in the IFS at 10 m above
    the surface of the Earth. <br/><br/>Visibility is normally many kilometers, but
    is reduced by several meteorological factors including water droplets (fog), precipitation,
    humidity and aerosols.  <br/><br/>Historically, visibility observations have  been
    estimated by human observers judging whether they can see distant objects. More
    recently, visibility sensors measure the length of atmosphere over which a beam
    of light travels before its luminous flux is reduced to 5% of its original value. '
