- id: 228216
  shortname: fzra
  longname: Accumulated freezing rain
  units: m
  description: 'This parameter is the total amount of precipitation falling as freezing
    rain, accumulated over a particular time period <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>which
    depends on the data extracted</a>.<br/><br/>Freezing rain occurs when supercooled
    water droplets (below 0&deg;C but still in liquid form) immediately freeze as
    they hit the ground (and other surfaces) to form a coating or glaze of clear ice.
    Freezing rain creates hazardous, extremely slippery surface conditions and can
    cause disruption to road, rail and air transport. If prolonged, it can damage
    vegetation and crops and can accumulate on power lines, causing them to collapse.
    <br/><br/>The units are depth in metres of liquid water equivalent. It is the
    depth the liquid water would have if it were spread evenly over <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>
    the  </a><a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>. Care should be taken when comparing model parameters with observations,
    because observations are often local to a particular point in space and time,
    rather than representing averages over a <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>
    model grid box and model time step</a><br>

    [NOTE: See 231001 for the equivalent parameter in "kg m-2"]'
- id: 228217
  shortname: ilspf
  longname: Instantaneous large-scale precipitation fraction
  units: Proportion
  description: <p>This parameter is the fraction of the <a href="https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step">grid
    box</a> (0-1) covered by large-scale precipitation <a href="https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime">at
    the specified time </a>.<br><br>Large-scale precipitation is rain and snow that
    falls to the Earth's surface, and is generated by the cloud scheme in the ECMWF
    Integrated Forecasting System (IFS). The cloud scheme represents the formation
    and dissipation of clouds and large-scale precipitation due to changes in atmospheric
    quantities (such as pressure, temperature and moisture) predicted directly by
    the IFS at spatial scales of a grid box or larger. Precipitation can also be due
    to convection generated by the convection scheme in the IFS. The convection scheme
    represents convection at spatial scales smaller than the grid box. See <a href="https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation">further
    information</a>.</p>
- id: 228218
  shortname: crr
  longname: Convective rain rate
  units: kg m**-2 s**-1
  description: This parameter is the rate of rainfall (rainfall intensity), <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time </a>, generated by the convection scheme in the ECMWF Integrated
    Forecasting System (IFS). The convection scheme represents convection at spatial
    scales smaller than the <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>.<br/><br/>Total rainfall is made up of convective and large-scale rainfall.
    Large-scale rainfall is generated by the cloud scheme in the IFS. The cloud scheme
    represents the formation and dissipation of clouds and large-scale rainfall due
    to changes in atmospheric quantities (such as pressure, temperature and moisture)
    predicted directly by the IFS at spatial scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>or larger. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>.  Rainfall is one component of precipitation. In the IFS, precipitation
    is rain and snow that falls to the Earth's surface.<br/><br/>1 kg of water spread
    over 1 square metre of surface is 1 mm deep (neglecting the effects of temperature
    on the density of water), therefore the units are equivalent to mm per second.<br/><br/>Care
    should be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 228219
  shortname: lsrr
  longname: Large scale rain rate
  units: kg m**-2 s**-1
  description: This parameter is the rate of rainfall (rainfall intensity), <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a>, generated by the cloud scheme in the ECMWF Integrated
    Forecasting System (IFS). The cloud scheme represents the formation and dissipation
    of clouds and large-scale precipitation due to changes in atmospheric quantities
    (such as pressure, temperature and moisture) predicted directly by the IFS at
    spatial scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid
    box</a> or larger.<br/><br/>Rainfall can also be due to convection generated by
    the convection scheme in the IFS. The convection scheme represents convection
    at spatial scales smaller than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>. Rainfall is one component of precipitation. In the IFS, precipitation
    is rain and snow that falls to the Earth's surface.<br/><br/>1 kg of water spread
    over 1 square metre of surface is 1 mm deep (neglecting the effects of temperature
    on the density of water), therefore the units are equivalent to mm per second.<br/><br/>Care
    should be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 228220
  shortname: csfr
  longname: Convective snowfall rate water equivalent
  units: kg m**-2 s**-1
  description: This parameter is the rate of snowfall (snowfall intensity), <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a>, generated by the convection scheme in the ECMWF Integrated
    Forecasting System (IFS). The convection scheme represents convection at spatial
    scales smaller than the <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>.<br/><br/>Total snowfall is made up of convective and large-scale snowfall.
    Large-scale snowfall is generated by the cloud scheme in the IFS. The cloud scheme
    represents the formation and dissipation of clouds and large-scale snowfall due
    to changes in atmospheric quantities (such as pressure, temperature and moisture)
    predicted directly by the IFS at spatial scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a> or larger. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>. Snowfall is one component of precipitation. In the IFS, precipitation
    is rain and snow that falls to the Earth's surface<br/><br/>Snowfall rate is considered
    here in terms of its water equivalent. Since 1 kg of water spread over 1 square
    metre of surface is 1 mm thick (neglecting the effects of temperature on the density
    of water), the units are equivalent to mm (of liquid water) per second. <br/><br/>Care
    should be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 228221
  shortname: lssfr
  longname: Large scale snowfall rate water equivalent
  units: kg m**-2 s**-1
  description: This parameter is the rate of snowfall (snowfall intensity), <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a>, generated by the cloud scheme in the ECMWF Integrated
    Forecasting System (IFS). The cloud scheme represents the formation and dissipation
    of clouds and large-scale snowfall due to changes in atmospheric quantities (such
    as pressure, temperature and moisture) predicted directly by the IFS at spatial
    scales of a <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid
    box</a> or larger.<br/><br/>Snowfall can also be due to convection generated by
    the convection scheme in the IFS. The convection scheme represents convection
    at spatial scales smaller than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective%2Band%2Blarge-scale%2Bprecipitation'>further
    information</a>. Snowfall is one component of precipitation. In the IFS, precipitation
    is rain and snow that falls to the Earth's surface<br/><br/>Snowfall rate is considered
    here in terms of its water equivalent. Since 1 kg of water spread over 1 square
    metre of surface is 1 mm thick (neglecting the effects of temperature on the density
    of water), the units are equivalent to mm (of liquid water) per second. <br/><br/>Care
    should be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
