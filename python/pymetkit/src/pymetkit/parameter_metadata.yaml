- id: 171001
  shortname: strfa
  longname: Stream function anomaly
  units: m**2 s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the stream function is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The horizontal wind field can be separated into divergent
    flow (i.e., flow that is purely divergent, with no swirl or rotation) and rotational
    flow (i.e., flow that is purely rotational and has no divergence).<br/><br/>The
    rotational (non-divergent) flow follows lines of constant stream function value
    (streamlines) and the speed of flow is proportional to the stream function gradient.<br/><br/>So
    streamlines show patterns of horizontal, rotational, air flow and the paths that
    particles would follow if the flow did not change with time.
- id: 171002
  shortname: vpota
  longname: Velocity potential anomaly
  units: m**2 s**-1
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the velocity potential is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The horizontal wind field can be separated into divergent
    flow (i.e., flow that is purely divergent, with no swirl or rotation) and rotational
    flow (i.e., flow that is purely rotational and has no divergence).<br/><br/>This
    parameter is the scalar quantity whose gradient is the velocity vector of the
    irrotational flow. It can be used to show areas where the air is diverging (spreading
    out) or converging, which, depending on the vertical level, relate to ascending
    or descending air.
