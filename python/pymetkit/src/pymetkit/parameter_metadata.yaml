- id: 228088
  shortname: tcslw
  longname: Total column supercooled liquid water
  units: kg m**-2
  description: 'This parameter is the total amount of supercooled water in a column
    extending from the surface of the Earth to the top of the atmosphere. Supercooled
    water is water that exists in liquid form below 0oC. It is common in cold clouds
    and is important in the formation of precipitation. Also, supercooled water in
    clouds extending to the surface (i.e., fog) can cause icing/riming of various
    structures.<br/><br/>This parameter represents the area averaged value for a <a
    href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>.<br/><br/>Clouds contain a continuum of different sized water droplets
    and ice particles. The ECMWF Integrated Forecasting System (IFS) cloud scheme
    simplifies this to represent a number of discrete cloud droplets/particles including:
    cloud water droplets, raindrops, ice crystals and snow (aggregated ice crystals).
    The processes of droplet formation, conversion and aggregation are also highly
    simplified in the IFS.'
- id: 228089
  shortname: tcrw
  longname: Total column rain water
  units: kg m**-2
  description: 'This parameter is the total amount of water in droplets of raindrop
    size (which can fall to the surface as precipitation) in a column extending from
    the surface of the Earth to the top of the atmosphere. <br/><br/>This parameter
    represents the area averaged value for a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>.<br/><br/>Clouds contain a continuum of different sized water droplets
    and ice particles. The ECMWF Integrated Forecasting System (IFS) cloud scheme
    simplifies this to represent a number of discrete cloud droplets/particles including:
    cloud water droplets, raindrops, ice crystals and snow (aggregated ice crystals).
    The processes of droplet formation, conversion and aggregation are also highly
    simplified in the IFS.'
- id: 228090
  shortname: tcsw
  longname: Total column snow water
  units: kg m**-2
  description: 'This parameter is the total amount of water in the form of snow (aggregated
    ice crystals which can fall to the surface as precipitation) in a column extending
    from the surface of the Earth to the top of the atmosphere. <br/><br/>This parameter
    represents the area averaged value for a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>grid
    box</a>.<br/><br/>Clouds contain a continuum of different sized water droplets
    and ice particles. The ECMWF Integrated Forecasting System (IFS) cloud scheme
    simplifies this to represent a number of discrete cloud droplets/particles including:
    cloud water droplets, raindrops, ice crystals and snow (aggregated ice crystals).
    The processes of droplet formation, conversion and aggregation are also highly
    simplified in the IFS.'
