- id: 260123
  shortname: totalx
  longname: Total totals index
  units: K
  description: This parameter gives an indication of the probability of occurrence
    of a thunderstorm and its severity by using the vertical gradient of temperature
    and humidity.<br/><br/><table><tr><td>TT index</td><td>Thunderstorm Probability</td></tr><tr><td><44</td><td>Thunderstorms
    not likely.</td></tr><tr><td>44-50</td><td>Thunderstorms likely.</td></tr><tr><td>51-52</td><td>Isolated
    severe thunderstorms.</td></tr><tr><td>53-56</td><td>Widely scattered severe thunderstorms.</td></tr><tr><td>56-60</td><td>Scattered
    severe thunderstorms more likely.</td></tr></table> The total totals index is
    the temperature difference between 850 hPa (near surface) and 500 hPa (mid-troposphere)
    (lapse rate) plus a measure of the moisture content between 850 hPa and 500 hPa.
    The probability of deep convection tends to increase with increasing lapse rate
    and atmospheric moisture content.<br/><br/>There are a number of limitations to
    this index. Also, the interpretation of the index value varies with season and
    location. <a href='https://confluence.ecmwf.int/display/FUG/Instability%2BIndices'>See
    further information</a>.
