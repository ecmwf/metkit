- id: 140112
  shortname: wefxm
  longname: Wave energy flux magnitude
  units: W m**-1
  description: This parameter is the amount of energy from ocean/sea waves which are
    generated by local winds and associated with swell. It is the magnitude of the
    energy flux per unit length of wave crest, also known as the wave power per unit
    length of wave crest. <br/><br/>In deep water, the wave energy flux magnitude
    can be estimated from the mean wave period and the significant wave height. In
    the ECMWF Integrated Forecasting System, it is calculated by integrating the full
    two-dimensional wave spectrum multiplied by the wave group velocity (the velocity
    of the envelope of a group of waves of nearly equal frequencies).
- id: 140113
  shortname: wefxd
  longname: Wave energy flux mean direction
  units: Degree true
  description: This parameter is the direction of the flux of energy of ocean/sea
    waves which are generated by local winds and associated with swell. <br/><br/>It
    is the spectral mean direction calculated by integrating the full two-dimensional
    wave energy spectrum multiplied by the wave group velocity (the velocity of the
    envelope of a group of waves of nearly equal frequencies). <br/><br/>The units
    are degrees true which means the direction relative to the geographic location
    of the north pole. It is the direction that waves are coming FROM, so zero means
    'coming from the north' and 90 'coming from the east'.
- id: 140114
  shortname: h1012
  longname: Significant wave height of all waves with periods within the inclusive
    range from 10 to 12 seconds
  units: m
  description: This parameter represents the average height of the highest third of
    surface ocean/sea waves that have a period between 10 and 12 seconds. It includes
    all waves generated by local winds and associated with swell. Wave height represents
    the vertical distance between the wave crest and the wave trough.<br/><br/>The
    ocean/sea surface wave field consists of a combination of waves with different
    heights, lengths and directions (known as the two-dimensional wave spectrum).
    The wave spectrum can be decomposed into wind-sea waves, which are directly affected
    by local winds, and swell, the waves that were generated by the wind at a different
    location and time. <br/><br/>More strictly, this parameter is four times the square
    root of the integral over all directions of the two-dimensional wave spectrum
    and all frequencies between 1/12 and 1/10 hertz (i.e. periods between 10 and 12
    seconds). <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>See
    further documentation.</a> <br/><br/>This parameter can be used to assess sea
    state and swell. For example, engineers use significant wave height to calculate
    the load on structures in the open ocean, such as oil platforms, or in coastal
    applications.
