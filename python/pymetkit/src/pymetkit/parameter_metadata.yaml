- id: 260015
  shortname: ptype
  longname: Precipitation type
  units: (Code table 4.201)
  description: '<p>This parameter describes the type of precipitation at the surface,
    <a href="https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime">at
    the specified time</a>.<br><br>A precipitation type is assigned wherever there
    is a non-zero value of precipitation in the model output field. The precipitation
    type should be used together with the precipitation rate to provide, for example,
    an indication of potential freezing rain events.<br><br>In the ECMWF Integrated
    Forecasting System (IFS) there are only two predicted precipitation variables:
    rain and snow. Precipitation type is derived from these two predicted variables
    in combination with atmospheric conditions, such as temperature.<br><br>Values
    of precipitation type defined in the IFS:<br><br>0 = No precipitation<br>1 = Rain<br>3
    = Freezing rain (i.e. supercooled raindrops which freeze on contact with the ground
    and other surfaces)<br>5 = Snow<br>6 = Wet snow (i.e. snow particles which are
    starting to melt)<br>7 = Mixture of rain and snow<br>8 = Ice pellets<br>12 = Freezing
    drizzle (i.e. supercooled drizzle which freezes on contact with the ground and
    other surfaces)</p><p>These precipitation types are consistent with <a href="https://codes.ecmwf.int/grib/format/grib2/ctables/4/201/">WMO
    Code Table 4.201</a>. 2 (thunderstorm), 4 (mixed ice) and 9 (graupel), 10 (hail)
    and 11 (drizzle) are not diagnosed in the IFS.</p>'
