- id: 140120
  shortname: sh10
  longname: Significant wave height of all waves with period larger than 10s
  units: m
  description: This parameter represents the average height of the highest third of
    surface ocean/sea waves that have a period of longer than 10 seconds. It includes
    all waves generated by local winds and associated with swell. Wave height represents
