- id: 210186
  shortname: aluvpi
  longname: UV visible albedo for direct radiation, isotropic component (climatological)
  units: (0 - 1)
  description: 'Albedo is a measure of the reflectivity of the Earth''s surface. This
    parameter is the isotropic component of the snow-free land-surface albedo for
    solar radiation with wavelength shorter than 0.7 µm (microns, 1 millionth of a
    metre).<br/><br/>In the ECMWF Integrated Forecasting System (IFS) albedo is dealt
    with separately for solar radiation with wavelengths greater/less than 0.7µm.
    Within each of these two bands, the dependence of the albedo of the snow-free
    land surface on solar zenith angle is parameterized using three coefficients:
    an isotropic component, a volumetric component and a geometric component. This
    leads to a total of six components. The IFS first uses them to compute the snow-free
    land-surface albedo to direct and diffuse downwelling solar radiation, and then
    modifies these albedos to account for water, ice and snow. Climatological (observed
    values averaged over a period of several years) values are used for these albedo
    components, which were taken from observations by the MODIS satellite instrument
    and vary from month to month through the year. <a href="https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf">See
    further documentation</a><br/><br/>Solar radiation at the surface can be direct
    or diffuse. Solar radiation can be scattered in all directions by particles in
    the atmosphere, some of which reaches the surface (diffuse solar radiation). Some
    solar radiation reaches the surface without being scattered (direct solar radiation).'
