- id: 171243
  shortname: fala
  longname: Forecast albedo anomaly
  units: (0 - 1)
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the forecast albedo is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The forecast albedo is a measure of the reflectivity
    of the Earth's surface. It is the fraction of solar (shortwave) radiation reflected
    by Earth's surface, across the solar spectrum, for both direct and diffuse radiation.
    Typically, snow and ice have high reflectivity with albedo values of 0.8 and above,
    land has intermediate values between about 0.1 and 0.4 and the ocean has low values
    of 0.1 or less. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>In the ECMWF Integrated Forecasting System
    (IFS), the model only modifies albedo values over water, ice and snow, elsewhere
    a background climatological albedo is used.
