- id: 171031
  shortname: sica
  longname: Sea-ice cover anomaly
  units: (0 - 1)
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the sea-ice cover is higher/lower than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates'>further
    information</a> ).<br/><br/>Sea-ice cover is the fraction of a <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid
    box</a>  which is covered by sea-ice. Sea-ice can only occur in a grid box which
    is defined as ocean according to the land sea mask at the resolution being used.
    Sea-ice cover can also be known as sea-ice fraction or sea-ice concentration.<br/><br/>Sea-ice
    is frozen sea water which floats on the surface of the ocean. Sea-ice does not
    include ice which forms on land such as glaciers, icebergs and ice-sheets. It
    also excludes ice shelves which are anchored on land, but protrude out over the
    surface of the ocean. These phenomena are not modelled by the IFS.<br/><br/>Long-term
    monitoring of sea-ice cover is important for understanding climate change. Sea-ice
    cover also affects shipping routes through the polar regions.
- id: 171032
  shortname: asna
  longname: Snow albedo anomaly
  units: (0 - 1)
  description: ''
- id: 171033
  shortname: rsna
  longname: Snow density anomaly
  units: kg m**-3
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the snow density is higher/lower than the
    long-term average. The long-term average is typically derived from several decades
    of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates'>further
    information</a> ).<br/><br/>The <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4'>ECMWF
    Integrated Forecast System represents snow</a>  as a single additional layer over
    the uppermost soil level. Snow density is assumed to be constant through the depth
    of the snow layer. Snow density changes with time due to the weight of snow and
    melt water in the snowpack.
- id: 171034
  shortname: ssta
  longname: Sea surface temperature anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the temperature of sea water near the surface
    is higher/lower than the long-term average. The long-term average is typically
    derived from several decades of model data and will vary with location and time
    of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates'>further
    information</a> ).<br/><br/>Sea surface temperature (SST) is taken from various
    providers, who process the observational data in different ways. Each provider
    uses data from several different observational sources. For example, satellites
    measure SST in a layer a few microns thick in the uppermost mm of the ocean, drifting
    buoys measure SST at a depth of about 0.2-1.5m, whereas ships sample sea water
    down to about 10m, while the vessel is underway. Deeper measurements are not affected
    by changes that occur during a day, due to the rising and setting of the Sun (diurnal
    variations).<br/><br/>Sometimes SST is taken from a forecast made by coupling
    the NEMO ocean model to the ECMWF Integrated Forecasting System. In this case,
    the SST is the average temperature of the uppermost metre of the ocean and does
    exhibit diurnal variations.<br/><br/> <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.10'>See
    further SST documentation</a>.
