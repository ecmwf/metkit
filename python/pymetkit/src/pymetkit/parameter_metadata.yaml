- id: 121
  shortname: mx2t6
  longname: Maximum temperature at 2 metres in the last 6 hours
  units: K
  description: The highest value of 2 metre temperature in the previous 6 hour period.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.<br/><br/>This parameter has units of kelvin (K). Temperature
    measured in kelvin can be converted to degrees Celsius (&deg;C) by subtracting
    273.15.
- id: 122
  shortname: mn2t6
  longname: Minimum temperature at 2 metres in the last 6 hours
  units: K
  description: The lowest value of 2 metre temperature in the previous 6 hour period.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.<br/><br/>This parameter has units of kelvin (K). Temperature
    measured in kelvin can be converted to degrees Celsius (&deg;C) by subtracting
    273.15.
- id: 123
  shortname: 10fg6
  longname: Maximum 10 metre wind gust in the last 6 hours
  units: m s**-1
  description: This parameter is the maximum wind gust in the last 6 hours at a height
    of ten metres above the surface of the Earth. <br/><br/>The WMO defines a wind
    gust as the maximum of the wind averaged over 3 second intervals. This duration
    is shorter than a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    time step</a>, and so the ECMWF Integrated Forecasting System deduces the magnitude
    of a gust within each time step from the time-step-averaged surface stress, surface
    friction, wind shear and stability. Then, the maximum wind gust is selected from
    the gusts at each time step during the last 6 hours.<br/><br/>Care should be taken
    when comparing model parameters with observations, because observations are often
    local to a particular point in space and time, rather than representing averages
    over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 124
  shortname: emis
  longname: Surface emissivity
  units: Proportion
  description: null
- id: 125
  shortname: vite
  longname: Vertically integrated total energy
  units: J m**-2
  description: ''
- id: 126
  shortname: '~'
  longname: Generic parameter for sensitive area prediction
  units: Various
  description: Originating centre dependent
- id: 127
  shortname: at
  longname: Atmospheric tide
  units: '~'
  description: Not GRIB data (pseudo-GRIB)
- id: 128
  shortname: bv
  longname: Budget values
  units: '~'
  description: Not GRIB data (pseudo-GRIB)
- id: 129
  shortname: z
  longname: Geopotential
  units: m**2 s**-2
  description: <p>This parameter is the gravitational potential energy of a unit mass,
    at a particular location, relative to mean sea level. It is also the amount of
    work that would have to be done, against the force of gravity, to lift a unit
    mass to that location from mean sea level.<br><br>The geopotential height can
    be calculated by dividing the geopotential by the Earth's gravitational acceleration,
    g (=9.80665 m s-2). The geopotential height plays an important role in synoptic
    meteorology (analysis of weather patterns). Charts of geopotential height plotted
    at constant pressure levels (e.g., 300, 500 or 850 hPa) can be used to identify
    weather systems such as cyclones, anticyclones, troughs and ridges.<br><br>At
    the surface of the Earth, this parameter shows the variations in geopotential
    (height) of the surface, and is often referred to as the orography.</p>
- id: 130
  shortname: t
  longname: Temperature
  units: K
  description: <p>This parameter is the temperature in the atmosphere.<br><br>It has
    units of kelvin (K). Temperature measured in kelvin can be converted to degrees
    Celsius (°C) by subtracting 273.15.<br><br>This parameter is available on multiple
    levels through the atmosphere.</p>
- id: 131
  shortname: u
  longname: U component of wind
  units: m s**-1
  description: <p>This parameter is the eastward component of the wind. It is the
    horizontal speed of air moving towards the east, in metres per second. A negative
    sign thus indicates air movement towards the west.<br><br>This parameter can be
    combined with the V component of wind to give the speed and direction of the horizontal
    wind.</p>
- id: 132
  shortname: v
  longname: V component of wind
  units: m s**-1
  description: <p>This parameter is the northward component of the wind. It is the
    horizontal speed of air moving towards the north, in metres per second. A negative
    sign thus indicates air movement towards the south.<br><br>This parameter can
    be combined with the U component of wind to give the speed and direction of the
    horizontal wind.</p>
- id: 133
  shortname: q
  longname: Specific humidity
  units: kg kg**-1
  description: <p>This parameter is the mass of water vapour per kilogram of moist
    air.<br><br>The total mass of moist air is the sum of the dry air, water vapour,
    cloud liquid, cloud ice, rain and falling snow.</p>
- id: 134
  shortname: sp
  longname: Surface pressure
  units: Pa
  description: This parameter is the pressure (force per unit area) of the atmosphere
    on the surface of land, sea and in-land water.<br/><br/>It is a measure of the
    weight of all the air in a column vertically above the area of the Earth's surface
    represented at a fixed point.<br/><br/>Surface pressure is often used in combination
    with temperature to calculate air density.<br/><br/>The strong variation of pressure
    with altitude makes it difficult to see the low and high pressure systems over
    mountainous areas, so mean sea level pressure, rather than surface pressure, is
    normally used for this purpose.<br/><br/>The units of this parameter are Pascals
    (Pa). Surface pressure is often measured in hPa and sometimes is presented in
    the old units of millibars, mb (1 hPa = 1 mb= 100 Pa).
- id: 135
  shortname: w
  longname: Vertical velocity
  units: Pa s**-1
  description: This parameter is the speed of air motion in the upward or downward
    direction. The ECMWF Integrated Forecasting System (IFS) uses a pressure based
    vertical co-ordinate system and pressure decreases with height, therefore negative
    values of vertical velocity indicate upward motion.<br/><br/>Vertical velocity
    can be useful to understand the large-scale dynamics of the atmosphere, including
    areas of upward motion/ascent (negative values) and downward motion/subsidence
    (positive values).
- id: 136
  shortname: tcw
  longname: Total column water
  units: kg m**-2
  description: This parameter is the sum of water vapour, liquid water, cloud ice,
    rain and snow in a column extending from the surface of the Earth to the top of
    the atmosphere. In old versions of the ECMWF model (IFS), rain and snow were not
    accounted for.
- id: 137
  shortname: tcwv
  longname: Total column vertically-integrated water vapour
  units: kg m**-2
  description: This parameter is the total amount of water vapour in a column extending
    from the surface of the Earth to the top of the atmosphere. <br/><br/>This parameter
    represents the area averaged value for a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>grid
    box</a>.
- id: 138
  shortname: vo
  longname: Vorticity (relative)
  units: s**-1
  description: This parameter is a measure of the rotation of air in the horizontal,
    around a vertical axis, relative to a fixed point on the surface of the Earth.<br/><br/>On
    the scale of weather systems, troughs (weather features that can include rain)
    are associated with anticlockwise rotation (in the northern hemisphere), and ridges
    (weather features that bring light or still winds) are associated with clockwise
    rotation.<br/><br/>Adding the rotation of the Earth, the so-called Coriolis parameter,
    to the relative vorticity produces the absolute vorticity.
- id: 139
  shortname: stl1
  longname: Soil temperature level 1
  units: K
  description: 'This parameter is the temperature of the soil at level 1 (in the middle
    of layer 1). <br/><br/>The ECMWF Integrated Forecasting System (IFS) has a four-layer
    representation of soil, where the surface is at 0cm: <br/><br/>Layer 1: 0 - 7cm
    <br/>Layer 2: 7 - 28cm <br/>Layer 3: 28 - 100cm <br/>Layer 4: 100 - 289cm <br/><br/>Soil
    temperature is set at the middle of each layer, and heat transfer is calculated
    at the interfaces between them. It is assumed that there is no heat transfer out
    of the bottom of the lowest layer. <br/><br/>This parameter has units of Kelvin
    (K). Temperature measured in Kelvin can be converted to degrees Celsius (&deg;C)
    by subtracting 273.15. <br/><br/><a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.5''>See
    further information.</a>'
- id: 140
  shortname: swl1
  longname: Soil wetness level 1
  units: m of water equivalent
  description: Old field, layer 1-7 cm (new soil moisture is archived as field 39).
    Surface soil wetness (SSW) before 19930804
- id: 141
  shortname: sd
  longname: Snow depth
  units: m of water equivalent
  description: "This parameter is the depth of snow from the snow-covered area of\
    \ a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+What+is+the+spatial+reference'>\
    \ grid box</a>.<br/><br/>Its units are metres of water equivalent, so it is the\
    \ depth the water would have if the snow melted and was spread evenly over the\
    \ whole grid box. The ECMWF Integrated Forecast System represents snow as a single\
    \ additional layer over the uppermost soil level. The snow may cover all or part\
    \ of the grid box.<br/><br/><a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4'>\
    \ See further information</a>.\r\n\r\n[NOTE: See 228141 for the equivalent parameter\
    \ in \"kg m-2\"]"
- id: 142
  shortname: lsp
  longname: Large-scale precipitation
  units: m
  description: 'This parameter is the accumulated liquid and frozen water, comprising
    rain and snow, that falls to the Earth''s surface and which is generated by the
    cloud scheme in the ECMWF Integrated Forecasting System (IFS). The cloud scheme
    represents the formation and dissipation of clouds and large-scale precipitation
    due to changes in atmospheric quantities (such as pressure, temperature and moisture)
    predicted directly by the IFS at spatial scales of the <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>grid
    box</a> or larger. Precipitation can also be generated by the convection scheme
    in the IFS, which represents convection at spatial scales smaller than the grid
    box. <a href=''https://confluence.ecmwf.int/display/CKB/Convective+and+large-scale+precipitation''>See
    further information.</a> This parameter does not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.
    <br/><br/>This parameter is the total amount of water <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>accumulated
    over a particular time period which depends on the data extracted</a>. The units
    of this parameter are depth in metres of water equivalent. It is the depth the
    water would have if it were spread evenly over the grid box. <br/><br/>Care should
    be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a model grid box.

    <br>[NOTE: See 3062 for the equivalent parameter in "kg m-2"]'
- id: 143
  shortname: cp
  longname: Convective precipitation
  units: m
  description: 'This parameter is the accumulated liquid and frozen water, comprising
    rain and snow, that falls to the Earth''s surface and which is generated by the
    convection scheme in the ECMWF Integrated Forecasting System (IFS). The convection
    scheme represents convection at spatial scales smaller than the <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>grid
    box</a>. Precipitation can also be generated by the cloud scheme in the IFS, which
    represents the formation and dissipation of clouds and large-scale precipitation
    due to changes in atmospheric quantities (such as pressure, temperature and moisture)
    predicted directly at spatial scales of the grid box or larger. <a href=''https://confluence.ecmwf.int/display/CKB/Convective+and+large-scale+precipitation''>See
    further information.</a> This parameter does not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.
    <br/><br/>This parameter is the total amount of water <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>accumulated
    over a particular time period which depends on the data extracted</a>. The units
    of this parameter are depth in metres of water equivalent. It is the depth the
    water would have if it were spread evenly over the grid box. <br/><br/>Care should
    be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a model grid box.

    <br>[NOTE: See 228143 for the equivalent parameter in "kg m-2"]'
- id: 144
  shortname: sf
  longname: Snowfall
  units: m of water equivalent
  description: 'This parameter is the accumulated snow that falls to the Earth''s
    surface. It is the sum of large-scale snowfall and convective snowfall. Large-scale
    snowfall is generated by the cloud scheme in the ECMWF Integrated Forecasting
    System (IFS). The cloud scheme represents the formation and dissipation of clouds
    and large-scale precipitation due to changes in atmospheric quantities (such as
    pressure, temperature and moisture) predicted directly by the IFS at spatial scales
    of the <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>grid
    box</a> or larger. Convective snowfall is generated by the convection scheme in
    the IFS, which represents convection at spatial scales smaller than the grid box.
    <a href=''https://confluence.ecmwf.int/display/CKB/Convective+and+large-scale+precipitation''>See
    further information.</a> <br/><br/>This parameter is the total amount of water
    <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>accumulated
    over a particular time period which depends on the data extracted</a>. The units
    of this parameter are depth in metres of water equivalent. It is the depth the
    water would have if it were spread evenly over the grid box. <br/><br/>Care should
    be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a model grid box.

    <br>[NOTE: See 228144 for the equivalent parameter in "kg m-2"]'
- id: 145
  shortname: bld
  longname: Time-integrated boundary layer dissipation
  units: J m**-2
  description: <p>This parameter is the amount of energy per unit area that is converted
    from kinetic energy, into heat, due to small-scale motion in the lower levels
    of the atmosphere. These small-scale motions are called eddies or turbulence.
    A higher value of this parameter means that more energy is being converted to
    heat, and so the mean flow is slowing more and the air temperature is rising by
    a greater amount.&nbsp;<br><br>This parameter is accumulated over a <a href="https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations">particular
    time period which depends on the data extracted</a>.</p>
- id: 146
  shortname: sshf
  longname: Time-integrated surface sensible heat net flux
  units: J m**-2
  description: <p>This parameter is the transfer of heat between the Earth's surface
    and the atmosphere through the effects of turbulent air motion (but excluding
    any heat transfer resulting from condensation or evaporation).<br><br>The magnitude
    of the sensible heat flux is governed by the difference in temperature between
    the surface and the overlying atmosphere, wind speed and the surface roughness.
    For example, cold air overlying a warm surface would produce a sensible heat flux
    from the land (or ocean) into the atmosphere.<a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.3.6">
    See further documentation&nbsp;</a><br><br>This is a single level parameter and
    it is accumulated over a <a href="https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations">particular
    time period which depends on the data extracted</a>.The units are joules per square
    metre (J m-2). To convert to watts per square metre (W m-2), the accumulated values
    should be divided by the accumulation period expressed in seconds. The ECMWF convention
    for vertical fluxes is positive downwards.</p>
- id: 147
  shortname: slhf
  longname: Time-integrated surface latent heat net flux
  units: J m**-2
  description: <p>This parameter is the transfer of latent heat (resulting from water
    phase changes, such as evaporation or condensation) between the Earth's surface
    and the atmosphere through the effects of turbulent air motion. Evaporation from
    the Earth's surface represents a transfer of energy from the surface to the atmosphere.
    <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.3.6">See
    further documentation</a><br><br>This parameter is accumulated over a <a href="https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations">particular
    time period which depends on the data extracted</a>.The units are joules per square
    metre (J m-2). To convert to watts per square metre (W m-2), the accumulated values
    should be divided by the accumulation period expressed in seconds.<br><br>The
    ECMWF convention for vertical fluxes is positive downwards.</p>
- id: 148
  shortname: chnk
  longname: Charnock
  units: Numeric
  description: "This parameter accounts for increased aerodynamic roughness as wave\
    \ heights grow due to increasing surface stress. It depends on the wind speed,\
    \ wave age and other aspects of the sea state and is used to calculate how much\
    \ the waves slow down the wind. <br/><br/>When the atmospheric model is run without\
    \ the ocean model, this parameter has a constant value of 0.018. When the atmospheric\
    \ model is coupled to the ocean model, this parameter is calculated by the <a\
    \ href='https://www.ecmwf.int/en/elibrary/18717-part-vii-ecmwf-wave-model'>ECMWF\
    \ Wave Model</a>.\r\n<br>"
- id: 149
  shortname: snr
  longname: Surface net radiation (SW and LW)
  units: J m**-2
  description: Accumulated field
- id: 150
  shortname: tnr
  longname: Top net radiation (SW and LW)
  units: J m**-2
  description: Accumulated field
- id: 151
  shortname: msl
  longname: Mean sea level pressure
  units: Pa
  description: This parameter is the pressure (force per unit area) of the atmosphere
    adjusted to the height of mean sea level.<br/><br/>It is a measure of the weight
    that all the air in a column vertically above the area of Earth's surface would
    have at that point, if the point were located at the mean sea level. It is calculated
    over all surfaces - land, sea and in-land water.<br/><br/>Maps of mean sea level
    pressure are used to identify the locations of low and high pressure systems,
    often referred to as cyclones and anticyclones. Contours of mean sea level pressure
    also indicate the strength of the wind. Tightly packed contours show stronger
    winds.<br/><br/>The units of this parameter are pascals (Pa).  Mean sea level
    pressure is often measured in hPa and sometimes is presented in the old units
    of millibars, mb (1 hPa = 1 mb = 100 Pa).
- id: 152
  shortname: lnsp
  longname: Logarithm of surface pressure
  units: Numeric
  description: This parameter is the natural logarithm of pressure (force per unit
    area) of the atmosphere on the surface of land, sea and inland water.  Numerical
    weather prediction models often utilise the logarithm of surface pressure in their
    calculations.
- id: 153
  shortname: swhr
  longname: Short-wave heating rate
  units: K
  description: Accumulated field
- id: 154
  shortname: lwhr
  longname: Long-wave heating rate
  units: K
  description: Accumulated field
- id: 155
  shortname: d
  longname: Divergence
  units: s**-1
  description: This parameter is the horizontal divergence of velocity. It is the
    rate at which air is spreading out horizontally from a point, per square metre.  This
    parameter is positive for air that is spreading out, or diverging, and negative
    for the opposite, for air that is concentrating, or converging (convergence).
- id: 156
  shortname: gh
  longname: Geopotential height
  units: gpm
  description: This parameter is a measure of the height of a point in the atmosphere
    in relation to its potential energy. It is calculated by dividing the geopotential
    by the Earth's mean gravitational acceleration, g (=9.80665 m s-2). The geopotential
    is the gravitational potential energy of a unit mass, at a particular location,
    relative to mean sea level. Geopotential is also the amount of work that would
    have to be done, against the force of gravity, to lift a unit mass to that location
    from mean sea level.<br/><br/>This parameter plays an important role in synoptic
    meteorology (analysis of weather patterns). Charts of geopotential height plotted
    at constant pressure levels (e.g., 300, 500 or 850 hPa) can be used to identify
    weather systems such as cyclones, anticyclones, troughs and ridges. At the surface
    of the Earth, this parameter shows the variations in geopotential height of the
    surface, and is often referred to as the orography.<br/><br/>The units of this
    parameter are geopotential metres. A geopotential metre is approximately 2% shorter
    than a geometric metre.
- id: 157
  shortname: r
  longname: Relative humidity
  units: '%'
  description: This parameter is the water vapour pressure as a percentage of the
    value at which the air becomes saturated (the point at which water vapour begins
    to condense into liquid water or deposition into ice).<br/><br/>For temperatures
    over 0&deg;C (273.15 K) it is calculated for saturation over water. At temperatures
    below -23&deg;C it is calculated for saturation over ice.  Between -23&deg;C and
    0&deg;C this parameter is calculated by interpolating between the ice and water
    values using a quadratic function. <br/><br/><a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.7.4.2'>See
    more information about the model's relative humidity calculation</a>.
- id: 158
  shortname: tsp
  longname: Tendency of surface pressure
  units: Pa s**-1
  description: null
- id: 159
  shortname: blh
  longname: Boundary layer height
  units: m
  description: This parameter is the depth of air next to the Earth's surface which
    is most affected by the resistance to the transfer of momentum, heat or moisture
    across the surface.<br/><br/>The boundary layer height can be as low as a few
    tens of metres, such as in cooling air at night, or as high as several kilometres
    over the desert in the middle of a hot sunny day. When the boundary layer height
    is low, higher concentrations of pollutants (emitted from the Earth's surface)
    can develop. <br/><br/>The boundary layer height calculation is based on the bulk
    Richardson number (a measure of the atmospheric conditions) following the conclusions
    of a 2012 review. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2017/17736-part-iv-physical-processes.pdf#section.3.10'>
    See further information</a>.
- id: 160
  shortname: sdor
  longname: Standard deviation of sub-gridscale orography
  units: m
  description: This parameter is one of four parameters (the others being angle of
    sub-gridscale orography, slope and anisotropy) that describe the features of the
    orography that are too small to be resolved by <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>the
    model grid</a>. These four parameters are calculated for orographic features with
    horizontal scales comprised between 5 km and the model grid resolution, being
    derived from the height of valleys, hills and mountains at about 1 km resolution.
    They are used as input for the sub-grid orography scheme which represents low-level
    blocking and orographic gravity wave effects.<br/><br/>This parameter represents
    the standard deviation of the height of the sub-grid valleys, hills and mountains
    within a grid box.
- id: 161
  shortname: isor
  longname: Anisotropy of sub-gridscale orography
  units: Numeric
  description: This parameter is one of four parameters (the others being standard
    deviation, slope and angle of sub-gridscale orography) that describe the features
    of the orography that are too small to be resolved by <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>the
    model grid</a>. These four parameters are calculated for orographic features with
    horizontal scales comprised between 5 km and the model grid resolution, being
    derived from the height of valleys, hills and mountains at about 1 km resolution.
    They are used as input for the sub-grid orography scheme which represents low-level
    blocking and orographic gravity wave effects.<br/><br/>This parameter is a measure
    of how much the shape of the terrain in the horizontal plane (from a bird's-eye
    view) is distorted from a circle.<br/><br/>A value of one is a circle, less than
    one an ellipse, and 0 is a ridge. In the case of a ridge, wind blowing parallel
    to it does not exert any drag on the flow, but wind blowing perpendicular to it
    exerts the maximum drag.
- id: 162
  shortname: anor
  longname: Angle of sub-gridscale orography
  units: radians
  description: This parameter is one of four parameters (the others being standard
    deviation, slope and anisotropy) that describe the features of the orography that
    are too small to be resolved by <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>the
    model grid</a>. These four parameters are calculated for orographic features with
    horizontal scales comprised between 5 km and the model grid resolution, being
    derived from the height of valleys, hills and mountains at about 1 km resolution.
    They are used as input for the sub-grid orography scheme which represents low-level
    blocking and orographic gravity wave effects.<br/><br/>The angle of the sub-grid
    scale orography characterises the geographical orientation of the terrain in the
    horizontal plane (from a bird's-eye view) relative to an eastwards axis.
- id: 163
  shortname: slor
  longname: Slope of sub-gridscale orography
  units: Numeric
  description: This parameter is one of four parameters (the others being standard
    deviation, angle and anisotropy) that describe the features of the orography that
    are too small to be resolved by <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>the
    model grid</a>. These four parameters are calculated for orographic features with
    horizontal scales comprised between 5 km and the model grid resolution, being
    derived from the height of valleys, hills and mountains at about 1 km resolution.
    They are used as input for the sub-grid orography scheme which represents low-level
    blocking and orographic gravity wave effects.<br/><br/>This parameter represents
    the slope of the sub-grid valleys, hills and mountains. A flat surface has a value
    of 0, and a 45 degree slope has a value of 0.5.
- id: 164
  shortname: tcc
  longname: Total cloud cover
  units: (0 - 1)
  description: 'This parameter is the proportion of a<a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>
    grid box</a> covered by cloud. Total cloud cover is a single level field calculated
    from the cloud occurring at different model levels through the atmosphere. Assumptions
    are made about the degree of overlap/randomness between clouds at different heights.<br/><br/>Cloud
    fractions vary from 0 to 1.

    <br>[NOTE: See 228164 for the equivalent parameter in "%"]'
- id: 165
  shortname: 10u
  longname: 10 metre U wind component
  units: m s**-1
  description: This parameter is the eastward component of the 10m wind. It is the
    horizontal speed of air moving towards the east, at a height of ten metres above
    the surface of the Earth, in metres per second.<br/><br/>Care should be taken
    when comparing this parameter with observations, because wind observations vary
    on small space and time scales and are affected by the local terrain, vegetation
    and buildings that are represented only on average in the ECMWF Integrated Forecasting
    System.<br/><br/>This parameter can be combined with the V component of 10m wind
    to give the speed and direction of the horizontal 10m wind.
- id: 166
  shortname: 10v
  longname: 10 metre V wind component
  units: m s**-1
  description: This parameter is the northward component of the 10m wind. It is the
    horizontal speed of air moving towards the north, at a height of ten metres above
    the surface of the Earth, in metres per second.<br/><br/>Care should be taken
    when comparing this parameter with observations, because wind observations vary
    on small space and time scales and are affected by the local terrain, vegetation
    and buildings that are represented only on average in the ECMWF Integrated Forecasting
    System.<br/><br/>This parameter can be combined with the U component of 10m wind
    to give the speed and direction of the horizontal 10m wind.
- id: 167
  shortname: 2t
  longname: 2 metre temperature
  units: K
  description: This parameter is the temperature of air at 2m above the surface of
    land, sea or in-land waters.<br/><br/>2m temperature is calculated by interpolating
    between the lowest model level and the Earth's surface, taking account of the
    atmospheric conditions.<a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>
    See further information </a>.<br/><br/>This parameter has units of kelvin (K).
    Temperature measured in kelvin can be converted to degrees Celsius (°C) by subtracting
    273.15.<br/><br/>Please note that the encodings listed here for s2s & uerra (which
    includes encodings for carra/cerra) include entries for Mean 2 metre temperature.
    The specific encoding for Mean 2 metre temperature can be found in 228004.
- id: 168
  shortname: 2d
  longname: 2 metre dewpoint temperature
  units: K
  description: This parameter is the temperature to which the air, at 2 metres above
    the surface of the Earth, would have to be cooled for saturation to occur.<br/><br/>It
    is a measure of the humidity of the air. Combined with temperature and pressure,
    it can be used to calculate the relative humidity.<br/><br/> 2m dew point temperature
    is calculated by interpolating between the lowest model level and the Earth's
    surface, taking account of the atmospheric conditions.<a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>
    See further information</a>.This parameter has units of kelvin (K). Temperature
    measured in kelvin can be converted to degrees Celsius (&deg;C) by subtracting
    273.15.
- id: 169
  shortname: ssrd
  longname: Surface short-wave (solar) radiation downwards
  units: J m**-2
  description: This parameter is the amount of solar radiation (also known as shortwave
    radiation) that reaches a horizontal plane at the surface of the Earth. This parameter
    comprises both direct and diffuse solar radiation. <br/><br/>Radiation from the
    Sun (solar, or shortwave, radiation) is partly reflected back to space by clouds
    and particles in the atmosphere (aerosols) and some of it is absorbed. The rest
    is incident on the Earth's surface (represented by this parameter). <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation.</a> <br/><br/>To a reasonably good approximation, this
    parameter is the model equivalent of what would be measured by a pyranometer (an
    instrument used for measuring solar radiation) at the surface. However, care should
    be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>model
    grid box</a>. <br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period which depends on the data extracted</a>. The units
    are joules per square metre (J m<sup>-2</sup>). To convert to watts per square
    metre (W m<sup>-2</sup>), the accumulated values should be divided by the accumulation
    period expressed in seconds. The ECMWF convention for vertical fluxes is positive
    downwards.
- id: 170
  shortname: stl2
  longname: Soil temperature level 2
  units: K
  description: 'This parameter is the temperature of the soil at level 2 (in the middle
    of layer 2). <br/><br/>The ECMWF Integrated Forecasting System (IFS) has a four-layer
    representation of soil, where the surface is at 0cm: <br/><br/>Layer 1: 0 - 7cm
    <br/>Layer 2: 7 - 28cm <br/>Layer 3: 28 - 100cm <br/>Layer 4: 100 - 289cm <br/><br/>Soil
    temperature is set at the middle of each layer, and heat transfer is calculated
    at the interfaces between them. It is assumed that there is no heat transfer out
    of the bottom of the lowest layer. <br/><br/>This parameter has units of Kelvin
    (K). Temperature measured in Kelvin can be converted to degrees Celsius (&deg;C)
    by subtracting 273.15. <br/><br/><a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.5''>See
    further information.</a>'
- id: 171
  shortname: swl2
  longname: Soil wetness level 2
  units: m of water equivalent
  description: Old field Layer 7-28 cm (new soil moisture is archived as field 40).
    Deep soil wetness (DSW) before 19930804. Water column scaled to depth of surf
    layer (7 cm).
- id: 172
  shortname: lsm
  longname: Land-sea mask
  units: (0 - 1)
  description: 'This parameter is the proportion of land, as opposed to ocean or inland
    waters (lakes, reservoirs, rivers and coastal waters), in a <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>grid
    box</a>.<br/>

    This parameter has values ranging between zero and one and is dimensionless.<br/>

    In cycles of the ECMWF Integrated Forecasting System (IFS) from CY41R1 (introduced
    in May 2015) onwards, grid boxes where this parameter has a value above 0.5 can
    be comprised of a mixture of land and inland water but not ocean. Grid boxes with
    a value of 0.5 and below can only be comprised of a water surface. In the latter
    case, the lake cover is used to determine how much of the water surface is ocean
    or inland water.

    <br/>In cycles of the IFS before CY41R1, grid boxes where this parameter has a
    value above 0.5 can only be comprised of land and those grid boxes with a value
    of 0.5 and below can only be comprised of ocean. In these older model cycles,
    there is no differentiation between ocean and inland water.'
- id: 173
  shortname: sr
  longname: Surface roughness (climatological)
  units: m
  description: Aerodynamic roughness length (over land). Climatological field.
- id: 174
  shortname: al
  longname: Albedo (climatological)
  units: (0 - 1)
  description: 'This parameter is a measure of the reflectivity of the Earth''s surface.
    It is the fraction of solar (shortwave) radiation reflected by Earth''s surface,
    across the solar spectrum, for both direct and diffuse radiation.<br/><br/>This
    parameter is a climatological (observed values averaged over a period of several
    years) background albedo which varies through the year and which excludes values
    over snow and sea-ice. Over land, values are typically between about 0.1 and 0.4
    and the ocean has low values of 0.1 or less.<br/><br/>Note: this parameter is
    a very old broadband albedo climatology that has since been replaced by a MODIS
    climatology in two spectral bands (see parameters 210186 to 210191).<br/><br/>Radiation
    from the Sun (also known as solar, or shortwave, radiation) is partly reflected
    back to space by clouds and particles in the atmosphere (aerosols) and some of
    it is absorbed. The rest is incident on the Earth''s surface, where some of it
    is reflected. The portion that is reflected by the Earth''s surface depends on
    the albedo.<a href=''https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf''>
    See further documentation</a>.<br/><br/>This parameter is calculated as a fraction
    (0 - 1), but albedo is sometimes shown as a percentage (%).'
- id: 175
  shortname: strd
  longname: Surface long-wave (thermal) radiation downwards
  units: J m**-2
  description: This parameter is the amount of thermal (also known as longwave or
    terrestrial) radiation emitted by the atmosphere and clouds that reaches a horizontal
    plane at the surface of the Earth. <br/><br/>The surface of the Earth emits thermal
    radiation, some of which is absorbed by the atmosphere and clouds. The atmosphere
    and clouds likewise emit thermal radiation in all directions, some of which reaches
    the surface (represented by this parameter). <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation.</a> <br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period which depends on the data extracted</a>. The units
    are joules per square metre (J m<sup>-2</sup>). To convert to watts per square
    metre (W m<sup>-2</sup>), the accumulated values should be divided by the accumulation
    period expressed in seconds. The ECMWF convention for vertical fluxes is positive
    downwards.
- id: 176
  shortname: ssr
  longname: Surface net short-wave (solar) radiation
  units: J m**-2
  description: This parameter is the amount of solar radiation (also known as shortwave
    radiation) that reaches a horizontal plane at the surface of the Earth (both direct
    and diffuse) minus the amount reflected by the Earth's surface (which is governed
    by the albedo). <br/><br/>Radiation from the Sun (solar, or shortwave, radiation)
    is partly reflected back to space by clouds and particles in the atmosphere (aerosols)
    and some of it is absorbed. The remainder is incident on the Earth's surface,
    where some of it is reflected. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation.</a> <br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period which depends on the data extracted</a>. The units
    are joules per square metre (J m<sup>-2</sup>). To convert to watts per square
    metre (W m<sup>-2</sup>), the accumulated values should be divided by the accumulation
    period expressed in seconds. The ECMWF convention for vertical fluxes is positive
    downwards.
- id: 177
  shortname: str
  longname: Surface net long-wave (thermal) radiation
  units: J m**-2
  description: Thermal radiation (also known as longwave or terrestrial radiation)
    refers to radiation emitted by the atmosphere, clouds and the surface of the Earth.
    This parameter is the difference between downward and upward thermal radiation
    at the surface of the Earth. It the amount passing through a horizontal plane.<br/><br/>The
    atmosphere and clouds emit thermal radiation in all directions, some of which
    reaches the surface as downward thermal radiation. The upward thermal radiation
    at the surface consists of thermal radiation emitted by the surface plus the fraction
    of downwards thermal radiation reflected upward by the surface. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br/><br/>The ECMWF convention for vertical fluxes is positive downwards.
- id: 178
  shortname: tsr
  longname: Top net short-wave (solar) radiation
  units: J m**-2
  description: This parameter is the incoming solar radiation (also known as shortwave
    radiation) minus the outgoing solar radiation at the top of the atmosphere. It
    is the amount of radiation passing through a horizontal plane. The incoming solar
    radiation is the amount received from the Sun. The outgoing solar radiation is
    the amount reflected and scattered by the Earth's atmosphere and surface. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br/><br/>The ECMWF convention for vertical fluxes is positive downwards.
- id: 179
  shortname: ttr
  longname: Top net long-wave (thermal) radiation
  units: J m**-2
  description: The thermal (also known as terrestrial or longwave) radiation emitted
    to space at the top of the atmosphere is commonly known as the Outgoing Longwave
    Radiation (OLR). The top net thermal radiation (this parameter) is equal to the
    negative of OLR. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period </a>which depends on the data extracted. The units
    are joules per square metre (J m<sup>-2</sup>). To convert to watts per square
    metre (W m<sup>-2</sup>), the accumulated values should be divided by the accumulation
    period expressed in seconds.The ECMWF convention for vertical fluxes is positive
    downwards.
- id: 180
  shortname: ewss
  longname: Time-integrated eastward turbulent surface stress
  units: N m**-2 s
  description: Air flowing over a surface exerts a stress that transfers momentum
    to the surface and slows the wind. This parameter is the accumulated stress on
    the Earth's surface in the eastward direction due to both the turbulent interactions
    between the atmosphere and the surface, and to turbulent orographic form drag.
    The turbulent interactions between the atmosphere and the surface are due to the
    roughness of the surface. The turbulent orographic form drag is the stress due
    to the valleys, hills and mountains on horizontal scales below 5km being derived
    from land surface data at about 1 km resolution. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a><br/><br/>Positive (negative) values denote stress in
    the eastward (westward) direction.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted.
- id: 181
  shortname: nsss
  longname: Time-integrated northward turbulent surface stress
  units: N m**-2 s
  description: Air flowing over a surface exerts a stress that transfers momentum
    to the surface and slows the wind. This parameter is the accumulated stress on
    the Earth's surface in the northward direction due to both the turbulent interactions
    between the atmosphere and the surface, and to turbulent orographic form drag.
    <br/><br/>The turbulent interactions between the atmosphere and the surface are
    due to the roughness of the surface.<br/><br/>The turbulent orographic form drag
    is the stress due to the valleys, hills and mountains on horizontal scales below
    5km being derived from land surface data at about 1 km resolution. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a><br/><br/>Positive (negative) values denote stress in
    the northward (southward) direction.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted.
- id: 182
  shortname: e
  longname: Evaporation
  units: m of water equivalent
  description: 'This parameter is the accumulated amount of water that has evaporated
    from the Earth''s surface, including a simplified representation of transpiration
    (from vegetation), into vapour in the air above.<br/><br/>This parameter is accumulated
    over a<a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>
    particular time period which depends on the data extracted</a>.<br/><br/>The ECMWF
    Integrated Forecasting System convention is that downward fluxes are positive.
    Therefore, negative values indicate evaporation and positive values indicate condensation.

    <br>[NOTE: See 260259 for the equivalent parameter in "kg m-2"]'
- id: 183
  shortname: stl3
  longname: Soil temperature level 3
  units: K
  description: 'This parameter is the temperature of the soil at level 3 (in the middle
    of layer 3). <br/><br/>The ECMWF Integrated Forecasting System (IFS) has a four-layer
    representation of soil, where the surface is at 0cm: <br/><br/>Layer 1: 0 - 7cm
    <br/>Layer 2: 7 - 28cm <br/>Layer 3: 28 - 100cm <br/>Layer 4: 100 - 289cm <br/><br/>Soil
    temperature is set at the middle of each layer, and heat transfer is calculated
    at the interfaces between them. It is assumed that there is no heat transfer out
    of the bottom of the lowest layer. <br/><br/>This parameter has units of Kelvin
    (K). Temperature measured in Kelvin can be converted to degrees Celsius (&deg;C)
    by subtracting 273.15. <br/><br/><a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.5''>See
    further information.</a>'
- id: 184
  shortname: swl3
  longname: Soil wetness level 3
  units: m of water equivalent
  description: Old field Layer 28-100 cm (new soil moisture is archived as field 41).
    Climatological deep soil wetness (CDSW) before 19930804. Water column scaled to
    depth of surf layer (7 cm).
- id: 185
  shortname: ccc
  longname: Convective cloud cover
  units: (0 - 1)
  description: null
- id: 186
  shortname: lcc
  longname: Low cloud cover
  units: (0 - 1)
  description: 'This parameter is the proportion of a<a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>
    grid box</a> covered by cloud occurring in the lower levels of the troposphere.
    Low cloud is a single level field calculated from cloud occurring on model levels
    with a pressure greater than 0.8 times the surface pressure. So, if the surface
    pressure is 1000 hPa (hectopascal), low cloud would be calculated using levels
    with a pressure greater than 800 hPa (below approximately 2km (assuming a ''standard
    atmosphere'')). <br/><br/>The low cloud cover parameter is calculated from cloud
    cover for the appropriate model levels as described above. Assumptions are made
    about the degree of overlap/randomness between clouds in different model levels.<br/><br/>Cloud
    fractions vary from 0 to 1.

    <br>[NOTE: See 3073 for the equivalent parameter in "%"]'
- id: 187
  shortname: mcc
  longname: Medium cloud cover
  units: (0 - 1)
  description: 'This parameter is the proportion of a<a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>
    grid box</a> covered by cloud occurring in the middle levels of the troposphere.
    Medium cloud is a single level field calculated from cloud occurring on model
    levels with a pressure between 0.45 and 0.8 times the surface pressure. So, if
    the surface pressure is 1000 hPa (hectopascal), medium cloud would be calculated
    using levels with a pressure of less than or equal to 800 hPa and greater than
    or equal to 450 hPa (between approximately 2km and 6km (assuming a ''standard
    atmosphere'')).<br/><br/>The medium cloud parameter is calculated from cloud cover
    for the appropriate model levels as described above. Assumptions are made about
    the degree of overlap/randomness between clouds in different model levels.<br/><br/>Cloud
    fractions vary from 0 to 1.

    <br>[NOTE: See 3074 for the equivalent parameter in "%"]'
- id: 188
  shortname: hcc
  longname: High cloud cover
  units: (0 - 1)
  description: 'The proportion of a <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>grid
    box </a>covered by cloud occurring in the high levels of the troposphere. High
    cloud is a single level field calculated from cloud occurring on model levels
    with a pressure less than 0.45 times the surface pressure. So, if the surface
    pressure is 1000 hPa (hectopascal), high cloud would be calculated using levels
    with a pressure of less than 450 hPa (approximately 6km and above (<a href=''http://glossary.ametsoc.org/wiki/Standard_atmosphere''>
    assuming a `standard atmosphere`</a>)).<br/><br/>The high cloud cover parameter
    is calculated from cloud for the appropriate model levels as described above.
    Assumptions are made about the degree of overlap/randomness between clouds in
    different model levels.<br/><br/>Cloud fractions vary from 0 to 1.

    <br>[NOTE: See 3075 for the equivalent parameter in "%"]'
- id: 189
  shortname: sund
  longname: Sunshine duration
  units: s
  description: This parameter is the length of time in which the direct solar (shortwave)
    radiation at the Earth's surface, falling on a plane perpendicular to the direction
    of the Sun, is greater than or equal to 120 W m-2. <br/><br/>The minimum solar
    intensity level of 120 W m-2 is defined by the World Meteorological Organisation
    and is consistent with observed values of sunshine duration from a Campbell-Stokes
    recorder (sometimes called a Stokes sphere) that can only measure moderately intense
    sunlight and brighter.<br/><br/>This parameter is accumulated over a particular
    time period which depends on the data extracted</a>.
- id: 190
  shortname: ewov
  longname: East-West component of sub-gridscale orographic variance
  units: m**2
  description: null
- id: 191
  shortname: nsov
  longname: North-South component of sub-gridscale orographic variance
  units: m**2
  description: null
- id: 192
  shortname: nwov
  longname: North-West/South-East component of sub-gridscale orographic variance
  units: m**2
  description: null
- id: 193
  shortname: neov
  longname: North-East/South-West component of sub-gridscale orographic variance
  units: m**2
  description: null
- id: 194
  shortname: btmp
  longname: Brightness temperature
  units: K
  description: null
- id: 195
  shortname: lgws
  longname: Eastward gravity wave surface stress
  units: N m**-2 s
  description: Air flowing over a surface exerts a stress that transfers momentum
    to the surface and slows the wind. This parameter is the component of the surface
    stress, in an eastward direction, associated with low-level blocking and orographic
    gravity waves.  It is calculated by the ECMWF Integrated Forecasting System sub-grid
    orography scheme. It represents surface stress due to unresolved valleys, hills
    and mountains with horizontal scales between 5 km and <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>the
    model grid</a>. (The surface stress associated with orographic features with horizontal
    scales smaller than 5 km is accounted for by the turbulent orographic form drag
    scheme).<br/><br/>Orographic gravity waves are oscillations in the flow maintained
    by the buoyancy of displaced air parcels, produced when the air is deflected upwards
    by hills and mountains. Hills and mountains can also block the flow of air at
    low levels. Together these processes can create a drag or stress on the atmosphere
    at the Earth's surface (and at other levels in the atmosphere). <br/><br/>This
    parameter is accumulated over a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>particular
    time period which depends on the data extracted</a>.
- id: 196
  shortname: mgws
  longname: Northward gravity wave surface stress
  units: N m**-2 s
  description: Air flowing over a surface exerts a stress that transfers momentum
    to the surface and slows the wind. This parameter is the component of the surface
    stress, in a northward direction, associated with low-level blocking and orographic
    gravity waves. It is calculated by the ECMWF Integrated Forecasting System sub-grid
    orography scheme. It represents surface stress due to unresolved valleys, hills
    and mountains with horizontal scales between 5 km and <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>the
    model grid</a>. (The surface stress associated with orographic features with horizontal
    scales smaller than 5 km is accounted for by the turbulent orographic form drag
    scheme). The stress computed in the sub-grid orography scheme is associated with
    low-level blocking and orographic gravity waves.<br/><br/>Orographic gravity waves
    are oscillations in the flow maintained by the buoyancy of displaced air parcels,
    produced when the air is deflected upwards by hills and mountains. Hills and mountains
    can also block the flow of air at low levels. Together these processes can create
    a drag or stress on the atmosphere at the Earth's surface (and at other levels
    in the atmosphere). <br/><br/>This parameter is accumulated over a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>particular
    time period which depends on the data extracted</a>.
- id: 197
  shortname: gwd
  longname: Gravity wave dissipation
  units: J m**-2
  description: This parameter is the amount of energy per unit area that is converted
    from kinetic energy in the mean flow, into heat, due to the effects of orographic
    gravity waves. A higher value of this parameter means that more energy is being
    converted to heat, and so the mean flow is slowing more and the air temperature
    is rising by a greater amount.  <br/><br/>Orographic gravity waves are oscillations
    in the flow maintained by the buoyancy of displaced air parcels, produced when
    the air is deflected upwards by hills and mountains. Hills and mountains can also
    block the flow of air at low levels. Together these processes can create a drag
    or stress on the atmosphere at the Earth's surface (and at other levels in the
    atmosphere). <br/><br/>This parameter is accumulated over a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>particular
    time period which depends on the data extracted</a>.
- id: 198
  shortname: src
  longname: Skin reservoir content
  units: m of water equivalent
  description: This parameter is the amount of water in the vegetation canopy and/or
    in a thin layer on the soil.<br/><br/>It represents the amount of rain intercepted
    by foliage, and water from dew. The maximum amount of 'skin reservoir content'
    a grid box can hold depends on the type of vegetation, and may be zero.  Water
    leaves the 'skin reservoir' by evaporation.<br/><br/><a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.H.6.1'>
    See further information.</a>
- id: 199
  shortname: veg
  longname: Vegetation fraction
  units: (0 - 1)
  description: null
- id: 200
  shortname: vso
  longname: Variance of sub-gridscale orography
  units: m**2
  description: null
- id: 201
  shortname: mx2t
  longname: Maximum temperature at 2 metres since previous post-processing
  units: K
  description: This parameter is the highest temperature of air at 2m above the surface
    of land, sea or in-land waters since the parameter was last archived in a particular
    forecast.<br/><br/>2m temperature is calculated by interpolating between the lowest
    model level and the Earth's surface, taking account of the atmospheric conditions.<a
    href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>
    See further information </a>.<br/><br/>This parameter has units of kelvin (K).
    Temperature measured in kelvin can be converted to degrees Celsius (&deg;C) by
    subtracting 273.15.
- id: 202
  shortname: mn2t
  longname: Minimum temperature at 2 metres since previous post-processing
  units: K
  description: This parameter is the lowest temperature of air at 2m above the surface
    of land, sea or in-land waters since the parameter was last archived in a particular
    forecast.<br/><br/>2m temperature is calculated by interpolating between the lowest
    model level and the Earth's surface, taking account of the atmospheric conditions.<a
    href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>
    See further information </a>.<br/><br/>This parameter has units of kelvin (K).
    Temperature measured in kelvin can be converted to degrees Celsius (&deg;C) by
    subtracting 273.15.
- id: 203
  shortname: o3
  longname: Ozone mass mixing ratio
  units: kg kg**-1
  description: This parameter is the mass of ozone per kilogram of air.<br/><br/>In
    the ECMWF Integrated Forecasting System (IFS), there is a simplified representation
    of ozone chemistry (including representation of the chemistry which has caused
    the ozone hole). Ozone is also transported around in the atmosphere through the
    motion of air. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#chapter.10'>See
    further documentation</a>.<br/><br/>Naturally occurring ozone in the stratosphere
    helps protect organisms at the surface of the Earth from the harmful effects of
    ultraviolet (UV) radiation from the Sun. Ozone near the surface, often produced
    because of pollution, is harmful to organisms.<br/><br/>Most of the IFS chemical
    species are archived as mass mixing ratios [kg kg<sup>-1</sup>]. <a href='https://forum.ecmwf.int/t/convert-mass-mixing-ratio-mmr-to-mass-concentration-or-to-volume-mixing-ratio-vmr/1253'>This
    link</a> explains how to convert to concentration in terms of mass per unit volume.
- id: 204
  shortname: paw
  longname: Precipitation analysis weights
  units: '~'
  description: null
- id: 205
  shortname: ro
  longname: Runoff
  units: m
  description: 'Some water from rainfall, melting snow, or deep in the soil, stays
    stored in the soil. Otherwise, the water drains away, either over the surface
    (surface runoff), or under the ground (sub-surface runoff) and the sum of these
    two is simply called ''runoff''. This parameter is the total amount of water accumulated
    over a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>particular
    time period which depends on the data extracted</a>.The units of runoff are depth
    in metres.  This is the depth the water would have if it were spread evenly over
    the <a href=''https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step''>grid
    box</a>. Care should be taken when comparing model parameters with observations,
    because observations are often local to a particular point rather than averaged
    over a grid square area.  Observations are also often taken in different units,
    such as mm/day, rather than the accumulated metres produced here.<br/><br/>Runoff
    is a measure of the availability of water in the soil, and can, for example, be
    used as an indicator of drought or flood.  More information about how runoff is
    calculated is given in the <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.H.6.3''>
    IFS Physical Processes documentation</a>.

    <br>[NOTE: See 231002 for the equivalent parameter in "kg m-2"]'
- id: 206
  shortname: tco3
  longname: Total column ozone
  units: kg m**-2
  description: "This parameter is the total amount of ozone in a column of air extending\
    \ from the surface of the Earth to the top of the atmosphere. This parameter can\
    \ also be referred to as total ozone, or vertically integrated ozone. The values\
    \ are dominated by ozone within the stratosphere.<br/><br/>In the ECMWF Integrated\
    \ Forecasting System (IFS), there is a simplified representation of ozone chemistry\
    \ (including representation of the chemistry which has caused the ozone hole).\
    \ Ozone is also transported around in the atmosphere through the motion of air.<a\
    \ href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#chapter.10'>\
    \ See further documentation </a>.<br/><br/>Naturally occurring ozone in the stratosphere\
    \ helps protect organisms at the surface of the Earth from the harmful effects\
    \ of ultraviolet (UV) radiation from the Sun. Ozone near the surface, often produced\
    \ because of pollution, is harmful to organisms.<br/><br/>In the IFS, the units\
    \ for total ozone are kilograms per square metre, but before 12/06/2001 dobson\
    \ units were used. Dobson units (DU) are still used extensively for total column\
    \ ozone. 1 DU = 2.1415E-5 kg m<sup>-2</sup>\r\n\r\n[NOTE: See 260132 for the equivalent\
    \ parameter in 'DU']"
- id: 207
  shortname: 10si
  longname: 10 metre wind speed
  units: m s**-1
  description: This parameter is the horizontal speed of the wind, or movement of
    air, at a height of ten metres above the surface of the Earth. The units of this
    parameter are metres per second.<br/><br/>Care should be taken when comparing
    this parameter with observations, because wind observations vary on small space
    and time scales and are affected by the local terrain, vegetation and buildings
    that are represented only on average in the ECMWF Integrated Forecasting System.<br/><br/>The
    eastward and northward components of the horizontal wind at 10m are also available
    as parameters.
- id: 208
  shortname: tsrc
  longname: Top net short-wave (solar) radiation, clear sky
  units: J m**-2
  description: This parameter is the incoming solar radiation (also known as shortwave
    radiation) minus the outgoing solar radiation at the top of the atmosphere, assuming
    clear-sky (cloudless) conditions. It is the amount of radiation passing through
    a horizontal plane. The incoming solar radiation is the amount received from the
    Sun. The outgoing solar radiation is the amount reflected and scattered by the
    Earth's atmosphere and surface, assuming clear-sky (cloudless) conditions. <a
    href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>Clear-sky radiation quantities are computed
    for exactly the same atmospheric conditions of temperature, humidity, ozone, trace
    gases and aerosol as the total-sky (clouds included) quantities, but assuming
    that the clouds are not there.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br/><br/>The ECMWF convention for vertical fluxes is positive downwards.
- id: 209
  shortname: ttrc
  longname: Top net long-wave (thermal) radiation, clear sky
  units: J m**-2
  description: This parameter is the thermal (also known as terrestrial or longwave)
    radiation emitted to space at the top of the atmosphere, assuming clear-sky (cloudless)
    conditions. It is the amount passing through a horizontal plane. Note that the
    ECMWF convention for vertical fluxes is positive downwards, so a flux from the
    atmosphere to space will be negative. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>Clear-sky radiation quantities are computed
    for exactly the same atmospheric conditions of temperature, humidity, ozone, trace
    gases and aerosol as total-sky quantities (clouds included), but assuming that
    the clouds are not there.<br/><br/>The thermal radiation emitted to space at the
    top of the atmosphere is commonly known as the Outgoing Longwave Radiation (OLR)
    (i.e., taking a flux from the atmosphere to space as positive). Note that OLR
    is typically shown in units of watts per square metre (W m-2).<br/><br/>This parameter
    is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.
- id: 210
  shortname: ssrc
  longname: Surface net short-wave (solar) radiation, clear sky
  units: J m**-2
  description: This parameter is the amount of solar (shortwave) radiation reaching
    the surface of the Earth (both direct and diffuse) minus the amount reflected
    by the Earth's surface (which is governed by the albedo), assuming clear-sky (cloudless)
    conditions. It is the amount of radiation passing through a horizontal plane,
    not a plane perpendicular to the direction of the Sun.<br/><br/>Clear-sky radiation
    quantities are computed for exactly the same atmospheric conditions of temperature,
    humidity, ozone, trace gases and aerosol as the corresponding total-sky quantities
    (clouds included), but assuming that the clouds are not there.<br/><br/>Radiation
    from the Sun (solar, or shortwave, radiation) is partly reflected back to space
    by clouds and particles in the atmosphere (aerosols) and some of it is absorbed.
    The rest is incident on the Earth's surface, where some of it is reflected. The
    difference between downward and reflected solar radiation is the surface net solar
    radiation. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf'>See
    further documentation</a>.<br/><br/>This parameter is <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br/><br/>The ECMWF convention for vertical fluxes is positive downwards.
- id: 211
  shortname: strc
  longname: Surface net long-wave (thermal) radiation, clear sky
  units: J m**-2
  description: 'Thermal radiation (also known as longwave or terrestrial radiation)
    refers to radiation emitted by the atmosphere, clouds and the surface of the Earth.
    This parameter is the difference between downward and upward thermal radiation
    at the surface of the Earth, assuming clear-sky (cloudless) conditions. It is
    the amount of radiation passing through a horizontal plane. <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf''>See
    further documentation</a>.<br/><br/>Clear-sky radiation quantities are computed
    for exactly the same atmospheric conditions of temperature, humidity, ozone, trace
    gases and aerosol as the corresponding total-sky quantities (clouds included),
    but assuming that the clouds are not there.<br/><br/>The atmosphere and clouds
    emit thermal radiation in all directions, some of which reaches the surface as
    downward thermal radiation. The upward thermal radiation at the surface consists
    of thermal radiation emitted by the surface plus the fraction of downwards thermal
    radiation reflected upward by the surface. <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf''>See
    further documentation</a>.<br/><br/>This parameter is <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>accumulated
    over a particular time period</a> which depends on the data extracted. The units
    are joules per square metre (J m-2). To convert to watts per square metre (W m-2),
    the accumulated values should be divided by the accumulation period expressed
    in seconds.<br/><br/>The ECMWF convention for vertical fluxes is positive downwards. '
- id: 212
  shortname: tisr
  longname: TOA incident short-wave (solar) radiation
  units: J m**-2
  description: Accumulated field
- id: 213
  shortname: vimd
  longname: Vertically integrated moisture divergence
  units: kg m**-2
  description: The vertical integral of the moisture flux is the horizontal rate of
    flow of moisture (water vapour, cloud liquid and cloud ice), per metre across
    the flow, for a column of air extending from the surface of the Earth to the top
    of the atmosphere. Its horizontal divergence is the rate of moisture spreading
    outward from a point, per square metre.<br/><br/>This parameter is accumulated
    over a <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>
    particular time period which depends on the data extracted </a><br/><br/>This
    parameter is positive for moisture that is spreading out, or diverging, and negative
    for the opposite, for moisture that is concentrating, or converging (convergence).
    This parameter thus indicates whether atmospheric motions act to decrease (for
    divergence) or increase (for convergence) the vertical integral of moisture, over
    the time period. High negative values of this parameter (i.e. large moisture convergence)
    can be related to precipitation intensification and floods.<br/><br/>1 kg of water
    spread over 1 square metre of surface is 1 mm deep (neglecting the effects of
    temperature on the density of water), therefore the units are equivalent to mm.
- id: 214
  shortname: dhr
  longname: Diabatic heating by radiation
  units: K
  description: null
- id: 215
  shortname: dhvd
  longname: Diabatic heating by vertical diffusion
  units: K
  description: null
- id: 216
  shortname: dhcc
  longname: Diabatic heating by cumulus convection
  units: K
  description: null
- id: 217
  shortname: dhlc
  longname: Diabatic heating large-scale condensation
  units: K
  description: null
- id: 218
  shortname: vdzw
  longname: Vertical diffusion of zonal wind
  units: m s**-1
  description: null
- id: 219
  shortname: vdmw
  longname: Vertical diffusion of meridional wind
  units: m s**-1
  description: null
- id: 220
  shortname: ewgd
  longname: East-West gravity wave drag tendency
  units: m s**-1
  description: null
- id: 221
  shortname: nsgd
  longname: North-South gravity wave drag tendency
  units: m s**-1
  description: null
- id: 222
  shortname: ctzw
  longname: Convective tendency of zonal wind
  units: m s**-1
  description: null
- id: 223
  shortname: ctmw
  longname: Convective tendency of meridional wind
  units: m s**-1
  description: null
- id: 224
  shortname: vdh
  longname: Vertical diffusion of humidity
  units: kg kg**-1
  description: null
- id: 225
  shortname: htcc
  longname: Humidity tendency by cumulus convection
  units: kg kg**-1
  description: null
- id: 226
  shortname: htlc
  longname: Humidity tendency by large-scale condensation
  units: kg kg**-1
  description: null
- id: 227
  shortname: crnh
  longname: Tendency due to removal of negative humidity
  units: kg kg**-1
  description: null
- id: 228
  shortname: tp
  longname: Total precipitation
  units: m
  description: "This parameter is the accumulated liquid and frozen water, comprising\
    \ rain and snow, that falls to the Earth's surface. It is the sum of large-scale\
    \ precipitation and convective precipitation. Large-scale precipitation is generated\
    \ by the cloud scheme in the ECMWF Integrated Forecasting System (IFS). The cloud\
    \ scheme represents the formation and dissipation of clouds and large-scale precipitation\
    \ due to changes in atmospheric quantities (such as pressure, temperature and\
    \ moisture) predicted directly by the IFS at spatial scales of the <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>grid\
    \ box</a> or larger. Convective precipitation is generated by the convection scheme\
    \ in the IFS, which represents convection at spatial scales smaller than the grid\
    \ box. <a href='https://confluence.ecmwf.int/display/CKB/Convective+and+large-scale+precipitation'>See\
    \ further information.</a> This parameter does not include fog, dew or the precipitation\
    \ that evaporates in the atmosphere before it lands at the surface of the Earth.\
    \ <br/><br/>This parameter is the total amount of water <a href='https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations'>accumulated\
    \ over a particular time period which depends on the data extracted</a>. The units\
    \ of this parameter are depth in metres of water equivalent. It is the depth the\
    \ water would have if it were spread evenly over the grid box. <br/><br/>Care\
    \ should be taken when comparing model parameters with observations, because observations\
    \ are often local to a particular point in space and time, rather than representing\
    \ averages over a model grid box.\r\n\r\n[NOTE: See 228228 for the equivalent\
    \ parameter in \"kg m-2\"]"
- id: 229
  shortname: iews
  longname: Instantaneous eastward turbulent surface stress
  units: N m**-2
  description: Air flowing over a surface exerts a stress that transfers momentum
    to the surface and slows the wind. This parameter is the stress on the Earth's
    surface <a href='https://confluence.ecmwf.int/display/CKB/Parameters+valid+at+the+specified+time'>at
    the specified time</a> in the eastward direction due to both the turbulent interactions
    between the atmosphere and the surface, and to turbulent orographic form drag.
    <br/><br/>The turbulent interactions between the atmosphere and the surface are
    due to the roughness of the surface. <br/><br/>The turbulent orographic form drag
    is the stress due to the valleys, hills and mountains on horizontal scales below
    5km being derived from land surface data at about 1 km resolution. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a> <br/><br/>Positive (negative) values denote stress in
    the eastward (westward) direction.
- id: 230
  shortname: inss
  longname: Instantaneous northward turbulent surface stress
  units: N m**-2
  description: Air flowing over a surface exerts a stress that transfers momentum
    to the surface and slows the wind. This parameter is the stress on the Earth's
    surface <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a> in the northward direction due to both the turbulent interactions
    between the atmosphere and the surface, and to turbulent orographic form drag.<br/><br/>The
    turbulent interactions between the atmosphere and the surface are due to the roughness
    of the surface.<br/><br/>The turbulent orographic form drag is the stress due
    to the valleys, hills and mountains on horizontal scales below 5km being derived
    from land surface data at about 1 km resolution. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information</a>. <br/><br/>Positive (negative) values denote stress in
    the northward (southward) direction.
- id: 231
  shortname: ishf
  longname: Instantaneous surface sensible heat net flux
  units: W m**-2
  description: <p>This parameter is the transfer of heat between the Earth's surface
    and the atmosphere, <a href="https://confluence.ecmwf.int/display/CKB/parameters%2bvalid%2bat%2bthe%2bspecified%2btime">at
    the specified time</a>, through the effects of turbulent air motion (but excluding
    any heat transfer resulting from condensation or evaporation).<br><br>The magnitude
    of the sensible heat flux is governed by the difference in temperature between
    the surface and the overlying atmosphere, wind speed and the surface roughness.
    For example, cold air overlying a warm surface would produce a sensible heat flux
    from the land (or ocean) into the atmosphere.The ECMWF convention for vertical
    fluxes is positive downwards. <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.3.6">See
    further documentation.</a></p>
- id: 232
  shortname: ie
  longname: Instantaneous moisture flux
  units: kg m**-2 s**-1
  description: This parameter is the net rate of moisture exchange between the land/ocean
    surface and the atmosphere, due to the processes of evaporation (including evapotranspiration)
    and condensation, <a href='https://confluence.ecmwf.int/display/CKB/Parameters%2Bvalid%2Bat%2Bthe%2Bspecified%2Btime'>at
    the specified time</a>. By convention, downward fluxes are positive, which means
    that evaporation is represented by negative values and condensation by positive
    values.
- id: 233
  shortname: asq
  longname: Apparent surface humidity
  units: kg kg**-1
  description: null
- id: 234
  shortname: lsrh
  longname: Logarithm of surface roughness length for heat (climatological)
  units: Numeric
  description: Represents surface roughness length for heat and moisture over land.
    Climatological field.
- id: 235
  shortname: skt
  longname: Skin temperature
  units: K
  description: <p>This parameter is the temperature of the surface of the Earth.<br><br>The
    skin temperature is the theoretical temperature that is required to satisfy the
    surface energy balance. It represents the temperature of the uppermost surface
    layer, which has no heat capacity and so can respond instantaneously to changes
    in surface fluxes. Skin temperature is calculated differently over land and sea.<br><br>This
    parameter has units of kelvin (K). Temperature measured in kelvin can be converted
    to degrees Celsius (°C) by subtracting 273.15.<br><br>See further information
    about the skin temperature <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.3.6">over
    land</a> and <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.10">over
    sea</a>.</p><p>Please note that the encodings listed here for s2s &amp; uerra
    (which includes carra/cerra) include entries for Time-mean skin temperature. The
    specific encoding for Mean skin temperature can be found in 235079.</p>
- id: 236
  shortname: stl4
  longname: Soil temperature level 4
  units: K
  description: 'This parameter is the temperature of the soil at level 4 (in the middle
    of layer 4). <br/><br/>The ECMWF Integrated Forecasting System (IFS) has a four-layer
    representation of soil, where the surface is at 0cm: <br/><br/>Layer 1: 0 - 7cm
    <br/>Layer 2: 7 - 28cm <br/>Layer 3: 28 - 100cm <br/>Layer 4: 100 - 289cm <br/><br/>Soil
    temperature is set at the middle of each layer, and heat transfer is calculated
    at the interfaces between them. It is assumed that there is no heat transfer out
    of the bottom of the lowest layer. <br/><br/>This parameter has units of Kelvin
    (K). Temperature measured in Kelvin can be converted to degrees Celsius (&deg;C)
    by subtracting 273.15. <br/><br/><a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.5''>See
    further information.</a>'
- id: 237
  shortname: swl4
  longname: Soil wetness level 4
  units: m
  description: Old field Layer 100-289 cm (soil moisture is archived as field 42).
    Water column scaled to depth of surf layer (7 cm).
- id: 238
  shortname: tsn
  longname: Temperature of snow layer
  units: K
  description: This parameter gives the temperature of the snow layer from the ground
    to the snow-air interface.<br/><br/>The ECMWF Integrated Forecast System (IFS)
    model represents snow as a single additional layer over the uppermost soil level.
    The snow may cover all or part of the <a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>
    grid box</a>.<br/><br/><a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4'>
    See further information on snow in the IFS</a>.<br/><br/>This parameter has units
    of kelvin (K). Temperature measured in kelvin can be converted to degrees Celsius
    (&deg;C) by subtracting 273.15.
- id: 239
  shortname: csf
  longname: Convective snowfall
  units: m of water equivalent
  description: Accumulated field
- id: 240
  shortname: lsf
  longname: Large-scale snowfall
  units: m of water equivalent
  description: Accumulated field
- id: 241
  shortname: acf
  longname: Accumulated cloud fraction tendency
  units: (-1 to 1)
  description: null
- id: 242
  shortname: alw
  longname: Accumulated liquid water tendency
  units: (-1 to 1)
  description: null
- id: 243
  shortname: fal
  longname: Forecast albedo
  units: (0 - 1)
  description: 'This parameter is a measure of the reflectivity of the Earth''s surface.
    It is the fraction of solar (shortwave) radiation reflected by Earth''s surface,
    across the solar spectrum, for both direct and diffuse radiation. Typically, snow
    and ice have high reflectivity with albedo values of 0.8 and above, land has intermediate
    values between about 0.1 and 0.4 and the ocean has low values of 0.1 or less.
    <br/><br/>Radiation from the Sun (solar, or shortwave, radiation) is partly reflected
    back to space by clouds and particles in the atmosphere (aerosols) and some of
    it is absorbed. The rest is incident on the Earth''s surface, where some of it
    is reflected. The portion that is reflected by the Earth''s surface depends on
    the albedo. <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2015/18490-radiation-quantities-ecmwf-model-and-mars.pdf''>See
    further documentation </a>.<br/><br/>In the ECMWF Integrated Forecasting System
    (IFS), a climatological background albedo (observed values averaged over a period
    of several years) is used, modified by the model over water, ice and snow.<br/><br/>Albedo
    is often shown as a percentage (%).<br>

    [NOTE: See 260509 for the equivalent parameter in ''%'']'
- id: 244
  shortname: fsr
  longname: Forecast surface roughness
  units: m
  description: This parameter is the aerodynamic roughness length in metres.<br/><br/>It
    is a measure of the surface resistance. This parameter is used to determine the
    air to surface transfer of momentum. For given atmospheric conditions, a higher
    surface roughness causes a slower near-surface wind speed.<br/><br/>Over the ocean,
    surface roughness depends on the waves. Over the land, surface roughness is derived
    from the vegetation type and snow cover.
- id: 245
  shortname: flsr
  longname: Forecast logarithm of surface roughness for heat
  units: Numeric
  description: This parameter is the natural logarithm of the roughness length for
    heat.<br/><br/>The surface roughness for heat is a measure of the surface resistance
    to heat transfer. This parameter is used to determine the air to surface transfer
    of heat. For given atmospheric conditions, a higher surface roughness for heat
    means that it is more difficult for the air to exchange heat with the surface.
    A lower surface roughness for heat that it is easier for the air to exchange heat
    with the surface.<br/><br/>Over the ocean, surface roughness for heat depends
    on the waves. Over sea-ice, it has a constant value of 0.001 m. Over the land,
    it is derived from the vegetation type and snow cover. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a>
- id: 246
  shortname: clwc
  longname: Specific cloud liquid water content
  units: kg kg**-1
  description: This parameter is the mass of cloud liquid water droplets per kilogram
    of the total mass of moist air. The 'total mass of moist air' is the sum of the
    dry air, water vapour, cloud liquid, cloud ice, rain and falling snow. This parameter
    represents the average value for a<a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>
    grid box</a>.<br/><br/>Water within clouds can be liquid or ice, or a combination
    of the two.<a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.7.2.2'>
    See further information about the cloud formulation</a>.
- id: 247
  shortname: ciwc
  longname: Specific cloud ice water content
  units: kg kg**-1
  description: This parameter is the mass of cloud ice particles per kilogram of the
    total mass of moist air. The 'total mass of moist air' is the sum of the dry air,
    water vapour, cloud liquid, cloud ice, rain and falling snow. This parameter represents
    the average value for a<a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>
    grid box</a>.<br/><br/>Water within clouds can be liquid or ice, or a combination
    of the two.<br/>Note that 'cloud frozen water' is the same as 'cloud ice water'.<br/><br/>See
    further information about the cloud formulation</a>.
- id: 248
  shortname: cc
  longname: Fraction of cloud cover
  units: (0 - 1)
  description: This parameter is the proportion of a<a href='https://confluence.ecmwf.int/display/CKB/Model+grid+box+and+time+step'>
    grid box</a> covered by cloud (liquid or ice). This parameter is available on
    multiple levels through the atmosphere.
