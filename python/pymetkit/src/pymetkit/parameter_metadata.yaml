  shortname: mn2tp
  longname: Minimum 2 metre temperature probability
  units: '%'
  description: null
- id: 131228
  shortname: tpp
  longname: Total precipitation probability
  units: '%'
  description: This parameter is the probability (in %) that the total precipitation
    falls within a particular quantile of the probability distribution function (pdf)
    for total precipitation. It is derived from the range of possible outcomes as
    predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5%2Bforecast%2Bensemble%2B%2528ENS%2529%2B-%2Brationale%2band%2Bconstruction'>ECMWF
    ensemble forecasting system</a>.<br/><br/>The user decides how many quantiles
    the pdf is divided into, and which one the probability describes, e.g. lowest
    third, middle third or highest third. A higher probability indicates that more
    ensemble members are predicting a total precipitation  in the selected part of
    the range.<br/><br/>In the ECMWF Integrated Forecasting System (IFS), total precipitation
    is rain and snow that falls to the Earth's surface. It is the sum of large-scale
    precipitation and convective precipitation. Large-scale precipitation is generated
    by the cloud scheme in the IFS. The cloud scheme represents the formation and
    dissipation of clouds and large-scale precipitation due to changes in atmospheric
    quantities (such as pressure, temperature and moisture) predicted directly by
    the IFS at spatial scales of a grid box or larger. Convective precipitation is
    generated by the convection scheme in the IFS. The convection scheme represents
    convection at spatial scales smaller than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/convective%2band%2blarge-scale%2bprecipitation'>further
    information</a>.  Precipitation parameters do not include fog, dew or the precipitation
    that evaporates in the atmosphere before it lands at the surface of the Earth.
