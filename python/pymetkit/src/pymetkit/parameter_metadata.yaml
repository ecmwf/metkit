- id: 171163
  shortname: slora
  longname: Slope of sub-gridscale orography anomaly
  units: '~'
  description: ''
- id: 171164
  shortname: tcca
  longname: Total cloud cover anomaly
  units: (0 - 1)
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that total cloud cover is larger/smaller than
    the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>Total cloud cover is the proportion of a <a href='https://confluence.ecmwf.int/display/CKB/model%2bgrid%2bbox%2band%2btime%2bstep'>model
    grid box</a> covered by cloud. Total cloud cover is a single level field calculated
    from the cloud occurring at different model levels through the atmosphere. Assumptions
    are made about the degree of overlap/randomness between the horizontal positioning
    of clouds at different heights.
- id: 171165
  shortname: 10ua
  longname: 10 metre U wind component anomaly
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the wind is more eastward (or less westward) than average.
    A negative anomaly indicates that the wind is more westward (or less eastward)
    than average. The long-term average is typically derived from several decades
    of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>The 10 metre U wind component is the eastward component
    of the 10 m wind. It is the horizontal speed of air moving towards the east, at
    a height of ten metres above the surface of the Earth, in metres per second.<br/><br/>Care
    should be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 171166
  shortname: 10va
  longname: 10 metre V wind component anomaly
  units: m s**-1
  description: An anomaly is a difference from a defined long-term average. A positive
    anomaly indicates that the wind is more northward (or less southward) than average.
    A negative anomaly indicates that the wind is more southward (or less northward)
    than average. The long-term average is typically derived from several decades
    of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>The 10 metre V wind component is the northward component
    of the 10 m wind. It is the horizontal speed of air moving towards the north,
    at a height of ten metres above the surface of the Earth, in metres per second.<br/><br/>Care
    should be taken when comparing model parameters with observations, because observations
    are often local to a particular point in space and time, rather than representing
    averages over a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    grid box and model time step</a>.
- id: 171167
  shortname: 2ta
  longname: 2 metre temperature anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the 2 metre temperature is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>2m temperature is calculated by interpolating between
    the lowest model level and the Earth's surface, taking account of the atmospheric
    conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
- id: 171168
  shortname: 2da
  longname: 2 metre dewpoint temperature anomaly
  units: K
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the 2 metre dew point temperature is higher/lower
    than the long-term average. The long-term average is typically derived from several
    decades of model data and will vary with location and time of year (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2BModel%2BClimates'>further
    information</a>).<br/><br/>Dew point temperature is the temperature to which the
    air would have to be cooled for saturation to occur. It is a measure of the humidity
    of the air. Combined with temperature and pressure, it can be used to calculate
    the relative humidity.<br/><br/>2m dew point temperature is calculated by interpolating
    between the lowest model level and the Earth's surface, taking account of the
    atmospheric conditions.See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
- id: 171169
  shortname: ssrda
  longname: Surface solar radiation downwards anomaly
  units: J m**-2
  description: An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the surface solar radiation downwards is
    higher/lower than the long-term average. The long-term average is typically derived
    from several decades of model data and will vary with location and time of year
    (see <a href='https://confluence.ecmwf.int/display/FUG/5.3%2Bmodel%2Bclimates'>further
    information</a>).<br/><br/>The surface solar radiation downwards is the amount
    of solar radiation (also known as shortwave radiation) reaching the surface of
    the Earth (both direct and diffuse). It is the amount of radiation passing through
    a horizontal plane, not a plane perpendicular to the direction of the Sun. It
    is accumulated over a particular time period</a> which depends on the data extracted.<br/><br/>The
    ECMWF convention for vertical fluxes is positive downwards.
- id: 171170
  shortname: stal2
  longname: Soil temperature anomaly level 2
  units: K
  description: 'An anomaly is a difference from a defined long-term average. Positive/negative
    values of this parameter indicate that the soil temperature at level 2 (the middle
    of layer 2) is higher/lower than the long-term average. The long-term average
    is typically derived from several decades of model data and will vary with location
    and time of year (see <a href=''https://confluence.ecmwf.int/display/FUG/5.3+Model+Climates''>further
    information</a> ).<br/><br/>The ECMWF Integrated Forecasting System model has
    a four-layer representation of soil:<br/><br/>Layer 1: 0 - 7cm<br/><br/>Layer
    2: 7 - 28cm<br/><br/>Layer 3: 28 - 100cm<br/><br/>Layer 4: 100 - 289cm<br/><br/>Soil
    temperature is set at the middle of each layer, and heat transfer is calculated
    at the interfaces between them. It is assumed that there is no heat transfer out
    of the bottom of the lowest layer.<br/><br/>This parameter has units of kelvin
    (K). Temperature measured in kelvin can be converted to degrees Celsius (&deg;C)
    by subtracting 273.15.<br/><br/> <a href=''https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.5''>See
    further information</a>.'
