- id: 260121
  shortname: kx
  longname: K index
  units: K
  description: This parameter is a measure of potential for a thunderstorm to develop
    calculated from the temperature and dew point temperature in the lower part of
    the atmosphere. The calculation uses the temperature at 850, 700 and 500 hPa and
    dewpoint temperature at 850 and 700 hPa. Higher values of K indicate a higher
    potential for the development of thunderstorms. <br/><br/>This parameter is related
    to the probability of occurrence of a thunderstorm:<table><tr><td>Parameter value</td><td>Thunderstorm
    Probability</td></tr><tr><td><20 K </td><td>No thunderstorm.</td></tr><tr><td>20-25
    K </td><td>Isolated thunderstorms.</td></tr><tr><td>26-30 K </td><td>Widely scattered
    thunderstorms.</td></tr><tr><td>31-35 K </td><td>Scattered thunderstorms.</td></tr><tr><td>>35
