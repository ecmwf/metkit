- id: 172189
  shortname: msdr
  longname: Mean sunshine duration rate
  units: s s**-1
  description: <p>This parameter is the accumulated sunshine duration divided by the
    length of the accumulation period, which depends on the data extracted, giving
    the mean sunshine duration rate.<br><br>The sunshine duration is the length of
    time in which the direct solar (shortwave) radiation at the Earth's surface, falling
    on a plane perpendicular to the direction of the Sun, is greater than or equal
    to 120 W m-2.&nbsp;<br><br>The minimum solar intensity level of 120 W m-2 is defined
    by the World Meteorological Organisation and is consistent with observed values
    of sunshine duration from a Campbell-Stokes recorder (sometimes called a Stokes
    sphere) that can only measure moderately intense sunlight and brighter.</p><p>This
    parameter is only available in GRIB1.</p>
