- id: 132044
  shortname: capesi
  longname: Convective available potential energy shear index
  units: Numeric
  description: <p>From 48r1 this parameter is based on most unstable CAPE rather than
    the previously used surface based CAPE.<br><br>High values of this parameter indicate
    where deep, organised convection is more likely to occur, if it is initiated.
    When air rises through a large depth of the atmosphere extensive condensation
    can occur and heavy rainfall, thunderstorms and other severe weather can result.&nbsp;<br><br>The
    likelihood of severe weather and its level of intensity tend to increase with
    increasing organisation of convection. Convective supercells are the most prominent
    example. Such organised areas of convection tend to occur where wind changes rapidly
    with height i.e., in areas with strong vertical wind shear.<br><br>This parameter
    shows how extreme the ensemble forecast of convective available potential energy
    shear (CAPES) is, relative to the model climate. It is one of the ECMWF Extreme
    Forecast Indices (EFIs). Values range from -1 to +1.&nbsp;<br><br>&nbsp;</p><ul><li>The
    closer the EFI is to +1 or -1, the more extreme the forecast CAPES values are.</li><li>EFI
    = 0 indicates that extreme CAPES values are unlikely, although convection can
    still occur.</li><li>EFI = +1 occurs when all the ensemble members' forecast values
    are above the maximum of the model climate. In this case, it means that very high
    CAPES values are expected, relative to the model climate .</li><li>EFI = -1 occurs
    when all the ensemble members' forecast values are below the minimum of the model
    climate. In this case, it means that very low CAPES values are expected, relative
    to the model climate.</li></ul><p><br><br>See <a href="https://confluence.ecmwf.int/display/FUG/Extreme%2BForecast%2BIndex%2B-%2BEFI">more
    information about the EFI </a>. See <a href="https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction">more
    information about the ensemble forecast</a>.<br><br>To help determine whether
    convection will be initiated or not, the probability forecast for precipitation
    (for example) can be used, in conjunction with this parameter.<br><br>The convective
    available potential energy shear (CAPES) is the product of wind shear and the
    square root of convective available potential energy (CAPE). The wind shear denotes
    bulk shear which is a vector difference of winds at two different heights in the
    atmosphere (925 hPa and 500 hPa). The square root of CAPE is proportional to the
    maximum vertical velocity in convective updraughts.</p>
- id: 132045
  shortname: wvfi
  longname: Water vapour flux index
  units: Numeric
  description: "Water Vapour Flux Index is a dimensionless parameter which represents\
    \ the Extreme Forecast Index (EFI) of the Water Vapour Flux (wvf) averaged for\
    \ a specified forecast period. It varies between -1 and 1. Shift of Tails (SOT)\
    \ for wvfi is also computed and it can be retrieved by specifying type=sot. For\
    \ details about wvfi please see:\r\n<br>\r\nLavers, D.A., E. Zsoter, D.S. Richardson,\
    \ and F. Pappenberger, 2017: An Assessment of the ECMWF Extreme Forecast Index\
    \ for Water Vapor Transport during Boreal Winter. Wea. Forecasting, 32, 1667–1674,\
    \ https://doi.org/10.1175/WAF-D-17-0073.1\r\n<br>\r\nLavers, D. A., F. Pappenberger,\
    \ D. S. Richardson, and E. Zsoter (2016), ECMWF Extreme Forecast Index for water\
    \ vapor transport: A forecast tool for atmospheric rivers and extreme precipitation,\
    \ Geophys. Res. Lett., 43, doi:10.1002/2016GL071320."
- id: 132049
  shortname: 10fgi
  longname: 10 metre wind gust index
  units: Numeric
  description: This parameter indicates how extreme the ensemble forecast 10 metre
    wind gust is, relative to the model climate. It is one of the ECMWF Extreme Forecast
    Indices (EFIs). Values range from -1 to +1.<br/><br/><ul><li>The closer the EFI
    is to +1 or -1, the more likely an extreme event is.</li><li>EFI = 0 indicates
    an extreme event is unlikely. </li><li>EFI = +1 occurs when all the ensemble members'
    forecast values are above the maximum of the model climate. In this case, it means
    that much stronger gusts are expected, relative to the model climate.</li><li>EFI
    = -1 occurs when all the ensemble members' forecast values are below the minimum
    of the model climate. In this case, it means that very calm conditions are expected,
    relative to the model climate.</li></ul>See <a href='https://confluence.ecmwf.int/display/FUG/Extreme%2BForecast%2BIndex%2B-%2BEFI'>more
    information about the EFI</a>. See <a href='https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction'>more
    information about the ensemble forecast</a>.<br/><br/>The WMO defines a wind gust
    as the maximum of the wind averaged over 3 second intervals.  This duration is
    shorter than a <a href='https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep'>model
    time step</a>, and so the ECMWF Integrated Forecasting System deduces the magnitude
    of a gust within each time step from the time-step-averaged surface stress, surface
    friction, wind shear and stability. Then, the maximum wind gust is selected from
    the gusts at each time step during a particular time period which depends on the
    data extracted.<br/><br/>This parameter is calculated at a height of ten metres
    above the surface of the Earth.
- id: 132059
  shortname: capei
  longname: Convective available potential energy index
  units: Numeric
  description: <p>From 48r1 this parameter is based on most unstable CAPE rather than
    the previously used surface based CAPE.<br><br>High values of this parameter indicate
    where deep convection is more likely to occur, if it is initiated. When air rises
    through a large depth of the atmosphere, extensive condensation can occur and
    heavy rainfall, thunderstorms and other severe weather can result.&nbsp;<br><br>This
    parameter shows how extreme the ensemble forecast of convective available potential
    energy (CAPE) is, relative to the model climate. It is one of the ECMWF Extreme
    Forecast Indices (EFIs). Values range from -1 to +1.&nbsp;<br><br>&nbsp;</p><ul><li>The
    closer the EFI is to +1 or -1, the more extreme the forecast CAPE values are.</li><li>EFI
    = 0 indicates that extreme CAPE values are unlikely, although convection can still
    occur.</li><li>EFI = +1 occurs when all the ensemble members' forecast values
    are above the maximum of the model climate. In this case, it means that very high
    CAPE values are expected, relative to the model climate.</li><li>EFI = -1 occurs
    when all the ensemble members' forecast values are below the minimum of the model
    climate. In this case, it means that very low CAPE values are expected, relative
    to the model climate.</li></ul><p>See <a href="https://confluence.ecmwf.int/display/FUG/Extreme%2BForecast%2BIndex%2B-%2BEFI">more
    information about the EFI </a>. See <a href="https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction">more
    information about the ensemble forecast </a>.<br><br>To help determine whether
    deep, moist convection will be initiated or not, the probability forecast for
    precipitation (for example) can be used, in conjunction with this parameter.</p>
- id: 132144
  shortname: sfi
  longname: Snowfall index
  units: Numeric
  description: This parameter indicates how extreme the ensemble forecast accumulated
    total snowfall is relative to the model climate. It is one of the ECMWF Extreme
    Forecast Indices (EFIs). Values range from -1 to +1.<br/><br/><ul><li>The closer
    the EFI is to +1 or -1, the more likely an extreme event is.<li><li>EFI = 0 indicates
    an extreme event is unlikely. <li><li>EFI = +1 occurs when all the ensemble members'
    forecast values are above the maximum of the model climate. In this case, it means
    that heavy snowfall is expected, relative to the model climate. <li><li>EFI =
    -1 occurs when all the ensemble members' forecast values are below the minimum
    of the model climate. In this case, it means that little snowfall is expected,
    relative to the model climate.</li></ul><br/><br/>This parameter is based on the
    accumulated total snow that has fallen to the Earth's surface. Snowfall is the
    sum of large-scale snowfall and convective snowfall. Large-scale snowfall is generated
    by the cloud scheme in the ECMWF Integrated Forecast System. The cloud scheme
    represents the formation and dissipation of clouds and large-scale snowfall due
    to changes in atmospheric quantities (such as pressure, temperature and moisture)
    predicted directly by the IFS at spatial scales of a grid box or larger. Convective
    snowfall is generated by the convection scheme in the IFS. The convection scheme
    represents convection at spatial scales smaller than the grid box. See <a href='https://confluence.ecmwf.int/display/CKB/Convective+and+large-scale+precipitation'>further
    information</a>.<br/><br/>See <a href='https://confluence.ecmwf.int/display/FUG/Extreme+Forecast+Index+-+EFI'>more
    information about the EFI</a>.  See <a href='https://confluence.ecmwf.int/display/FUG/5+Forecast+Ensemble+%2528ENS%2529+-+Rationale+and+Construction'>more
    information about the ensemble forecast</a>.
- id: 132165
  shortname: 10wsi
  longname: 10 metre speed index
  units: Numeric
  description: This parameter indicates how extreme the ensemble forecast 10 metre
    wind speed is, relative to the model climate. It is one of the ECMWF Extreme Forecast
    Indices (EFIs). Values range from -1 to +1.<br/><br/><ul><li>The closer the EFI
    is to +1 or -1, the more likely an extreme event is.</li><li>EFI = 0 indicates
    an extreme event is unlikely. </li><li>EFI = +1 occurs when all the ensemble members'
    forecast values are above the maximum of the model climate. In this case, it means
    that very windy conditions are expected, relative to the model climate.</li><li>EFI
    = -1 occurs when all the ensemble members' forecast values are below the minimum
    of the model climate. In this case, it means that very calm conditions are expected,
    relative to the model climate.</li></ul><br/><br/>See <a href='https://confluence.ecmwf.int/display/FUG/Extreme%2BForecast%2BIndex%2B-%2BEFI'>more
    information about the EFI</a>. See <a href='https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction'>
    more information about the ensemble forecast </a>.<br/><br/>The 10 metre speed
    is the horizontal speed of the wind, or movement of air, at a height of ten metres
    above the surface of the Earth.
- id: 132167
  shortname: 2ti
  longname: 2 metre temperature index
  units: Numeric
  description: This parameter indicates how extreme the ensemble forecast 2 metre
    temperature is, relative to the model climate. It is one of the ECMWF Extreme
    Forecast Indices (EFIs). Values range from -1 to +1.<br/><br/><ul><li>The closer
    the EFI is to +1 or -1, the more likely an extreme event is.</li><li>EFI = 0 indicates
    an extreme event is unlikely. </li><li>EFI = +1 occurs when all the ensemble members'
    forecast values are above the maximum of the model climate. In this case, it means
    that very high temperatures are expected, relative to the model climate.</li><li>EFI
    = -1 occurs when all the ensemble members' forecast values are below the minimum
    of the model climate. In this case, it means that very low temperatures are expected,
    relative to the model climate.</li></ul>See <a href='https://confluence.ecmwf.int/display/FUG/Extreme%2BForecast%2BIndex%2B-%2BEFI'>more
    information about the EFI</a>. See<a href='https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction'>more
    information about the ensemble forecast</a>.<br/><br/>2m temperature is calculated
    by interpolating between the lowest model level and the Earth's surface, taking
    account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
- id: 132201
  shortname: mx2ti
  longname: Maximum temperature at 2 metres index
  units: Numeric
  description: This parameter indicates how extreme the ensemble forecast 2 metre
    maximum temperature is relative to the model climate. It is one of the ECMWF Extreme
    Forecast Indices (EFIs). Values range from -1 to +1.<br/><br/><ul><li>The closer
    the EFI is to +1 or -1, the more likely an extreme event is.</li><li>EFI = 0 indicates
    an extreme event is unlikely.</li><li>EFI = +1 occurs when all the ensemble members'
    forecast values are above the maximum of the model climate. In this case, it means
    that very high maximum temperatures are expected, relative to the model climate.</li><li>EFI
    = -1 occurs when all the ensemble members' forecast values are below the minimum
    of the model climate. In this case, it means that very low maximum temperatures
    are expected, relative to the model climate.</li></ul>Here, maximum temperature
    refers to the highest temperature of air at 2m above the surface of land, sea
    or in-land waters since the parameter was last archived in a particular forecast.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
- id: 132202
  shortname: mn2ti
  longname: Minimum temperature at 2 metres index
  units: Numeric
  description: This parameter indicates how extreme the ensemble forecast 2 metre
    minimum temperature is relative to the model climate. It is one of the ECMWF Extreme
    Forecast Indices (EFIs). Values range from -1 to +1.<br/><br/><ul><li>The closer
    the EFI is to +1 or -1, the more likely an extreme event is.</li><li>EFI = 0 indicates
    an extreme event is unlikely. </li><li>EFI = +1 occurs when all the ensemble members'
    forecast values are above the maximum of the model climate. In this case, it means
    that very high minimum temperatures are expected, relative to the model climate.</li><li>EFI
    = -1 occurs when all the ensemble members' forecast values are below the minimum
    of the model climate. In this case, it means that very low minimum temperatures
    are expected, relative to the model climate.</li></ul>Here, maximum temperature
    refers to the highest temperature of air at 2m above the surface of land, sea
    or in-land waters since the parameter was last archived in a particular forecast.<br/><br/>2m
    temperature is calculated by interpolating between the lowest model level and
    the Earth's surface, taking account of the atmospheric conditions. See <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>further
    information</a>.
- id: 132216
  shortname: maxswhi
  longname: Maximum of significant wave height index
  units: Numeric
  description: This parameter indicates how extreme the significant wave height is
    relative to the model climate. It is part of the ECMWF Extreme Forecast Index
    (EFI). Values range from -1 to +1.<br/><br/><ul><li>The closer the EFI is to +1
    or -1, the more likely an extreme event is.</li><li>EFI = 0 indicates an extreme
    event is unlikely. </li><li>EFI = +1 where all the ensemble members' forecast
    values are above the maximum of the model climate. In this case, it means that
    very high waves are expected, relative to the model climate.</li><li>EFI = -1
    where all the ensemble members' forecast values are below the minimum of the model
    climate.  In this case, it means that very calm conditions are expected, relative
    to the model climate. See <a href='https://confluence.ecmwf.int/display/FUG/Extreme+Forecast+Index+-+EFI'>more
    information about the EFI</a>.  See <a href='https://confluence.ecmwf.int/display/FUG/5+Forecast+Ensemble+%2528ENS%2529+-+Rationale+and+Construction'>more
    information about the ensemble forecast</a>.</li></ul><br/><br/>The significant
    wave height represents the average height of the highest third of surface ocean/sea
    waves, generated by local winds and associated with swell. See <a href='https://confluence.ecmwf.int/display/FUG/2.2+Ocean+Wave+Model+-+ECWAM'>further
    information</a>.
- id: 132228
  shortname: tpi
  longname: Total precipitation index
  units: Numeric
  description: This parameter indicates how extreme the ensemble forecast total precipitation
    is relative to the model climate. It is one of the ECMWF Extreme Forecast Indices
    (EFIs). Values range from -1 to +1.<br/><br/><ul><li>The closer the EFI is to
    +1 or -1, the more likely an extreme event is.</li><li>EFI = 0 indicates an extreme
    event is unlikely. </li><li>EFI = +1 occurs when all the ensemble members' forecast
    values are above the maximum of the model climate. In this case, it means that
    very wet conditions are expected, relative to the model climate. </li><li>EFI
    = -1 occurs when all the ensemble members' forecast values are below the minimum
    of the model climate. In this case, it means that very dry conditions are expected,
    relative to the model climate. </li></ul>Note that, because precipitation cannot
    be less than zero, negative values of this parameter calculated for 24-hour (short-term)
    precipitation do not provide sensible information (typically a dry day is not
    extreme/unusual). For accumulation of precipitation over longer periods (10 to
    15 days for example), negative values indicate extended periods of dry weather.<br/><br/>See
    <a href='https://confluence.ecmwf.int/display/FUG/Extreme%2BForecast%2BIndex%2B-%2BEFI'>more
    information about the EFI</a>. See <a href='https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction'>
    more information about the ensemble forecast </a>.
