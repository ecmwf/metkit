- id: 131167
  shortname: 2tp
  longname: 2 metre temperature probability
  units: '%'
  description: This parameter is the probability (in %) that the 2 metre temperature
    falls within a particular quantile of the probability distribution function (pdf)
    for 2 metre temperature. It is derived from the range of possible outcomes as
    predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5%2Bforecast%2Bensemble%2B%2528ENS%2529%2B-%2Brationale%2band%2Bconstruction'>ECMWF
    ensemble forecasting system</a>.<br/><br/>The 2 metre temperature is the temperature
    of air at 2 m above the surface of land, sea or in-land waters. It is the standard
    for surface-level temperature measurements on land. <br/><br/>2m temperature is
    calculated by interpolating between the lowest model level and the Earth's surface,
    taking account of the atmospheric conditions. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#subsection.3.10.3'>See
    further information</a> .<br/><br/>A quantile is the division of the pdf into
    equally spaced interval. A higher probability indicates that more ensemble members
    are predicting a 2 metre temperature in that part of the quantile range.
- id: 131201
  shortname: mx2tp
  longname: Maximum 2 metre temperature probability
  units: '%'
  description: null
