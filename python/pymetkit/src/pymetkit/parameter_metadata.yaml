- id: 131070
  shortname: 10fgg15
  longname: 10 metre wind gust of at least 15 m/s
  units: '%'
  description: 'This parameter gives the probability (in %) that the 10 m gust will
    be 15 m s-1 or above. It is derived from the range of possible outcomes as predicted
    by the <a href=''https://confluence.ecmwf.int/display/FUG/5%2BForecast%2BEnsemble%2B%2528ENS%2529%2B-%2BRationale%2Band%2BConstruction''>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a 10 m gust speed of 15 m s-1  or above.<br/><br/>The WMO
    defines a wind gust as the maximum of the wind averaged over 3 second intervals.  This
    duration is shorter than a <a href=''https://confluence.ecmwf.int/display/CKB/Model%2Bgrid%2Bbox%2Band%2Btime%2Bstep''>model
    time step</a>, and so the ECMWF Integrated Forecasting System deduces the magnitude
    of a gust within each time step from the time-step-averaged surface stress, surface
    friction, wind shear and stability. Then, the maximum wind gust is selected from
    the gusts at each time step during a particular time period which depends on the
    data extracted.<br/><br/>This parameter is calculated at a height of ten metres
    above the surface of the Earth. '
