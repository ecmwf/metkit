    time step</a>.<br/><br/>In the ECMWF Integrated Forecasting System (IFS), total
    precipitation is rain and snow that falls to the Earth's surface. It is the sum
    of large-scale precipitation and convective precipitation. Large-scale precipitation
    is generated by the cloud scheme in the IFS. The cloud scheme represents the formation
