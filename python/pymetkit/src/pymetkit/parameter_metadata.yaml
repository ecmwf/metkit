- id: 131074
  shortname: swhg2
  longname: Significant wave height of at least 2 m
  units: '%'
  description: This parameter gives the probability (in %) that the significant wave
    height will be 2 m or above. It is derived from the range of possible outcomes
    as predicted by the <a href='https://confluence.ecmwf.int/display/FUG/5+Forecast+Ensemble+%2528ENS%2529+-+Rationale+and+Construction'>ECMWF
    ensemble forecasting system</a>. A higher probability indicates that more ensemble
    members are predicting a significant wave height of 2 m or above.<br/><br/>The
    significant wave height represents the average height of the highest third of
    surface ocean/sea waves generated by wind and swell. It represents the vertical
    distance between the wave crest and the wave trough.<br/><br/>The ocean/sea surface
    wave field consists of a combination of waves with different heights, lengths
    and directions (known as the two-dimensional wave spectrum). The wave spectrum
    can be decomposed into wind-sea waves, which are directly affected by local winds,
    and swell, the waves that were generated by the wind at a different location and
    time. This parameter takes account of both.<br/><br/>More strictly, this significant
    wave height is four times the square root of the integral over all directions
    and all frequencies of the two-dimensional wave spectrum. <a href='https://www.ecmwf.int/sites/default/files/elibrary/2016/16651-part-vii-ecmwf-wave-model.pdf'>See
    further documentation</a>.<br/><br/>Significant wave height can be used to assess
    sea state and swell. For example, engineers use significant wave height to calculate
    the load on structures in the open ocean, such as oil platforms, or in coastal
    applications.
