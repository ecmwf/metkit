- id: 260651
  shortname: srlh
  longname: Surface roughness length for heat
  units: m
  description: The surface roughness for heat is a measure of the surface resistance
    to heat transfer. This parameter is used to determine the air to surface transfer
    of heat. For given atmospheric conditions, a higher surface roughness for heat
    means that it is more difficult for the air to exchange heat with the surface.
    A lower surface roughness for heat that it is easier for the air to exchange heat
    with the surface.<br>Over the ocean, surface roughness for heat depends on the
    waves. Over sea-ice, it has a constant value of 0.001 m. Over the land, it is
    derived from the vegetation type and snow cover. <a href='https://www.ecmwf.int/en/elibrary/17117-part-iv-physical-processes'>See
    further information.</a>
