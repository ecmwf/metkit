- id: 235071
  shortname: tislhsf
  longname: Time integral of surface latent heat sublimation flux
  units: J m**-2
  description: "This parameter is the transfer of latent heat due to sublimation from\
    \ snow surfaces between the Earth's surface and the atmosphere through the effects\
    \ of turbulent air motion. Sublimation from the Earth's surface represents a transfer\
    \ of energy from the surface to the atmosphere.<a href=\"https://www.ecmwf.int/sites/default/files/elibrary/2016/16648-part-iv-physical-processes.pdf#section.3.6\"\
    >See further documentation</a>\r\n\r\nThis parameter is accumulated over a <a\
    \ href=\"https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations\"\
    >particular time period which depends on the data extracted</a>. The units are\
    \ joules per square metre (J m-2). To convert to watts per square metre (W m-2),\
    \ the accumulated values should be divided by the accumulation period expressed\
    \ in seconds.\r\n\r\nThe ECMWF convention for vertical fluxes is positive downwards."
- id: 235072
  shortname: tisef
  longname: Time integral of snow evaporation flux
  units: kg m**-2
  description: 'This parameter is the accumulated amount of water that has evaporated
    from snow from the snow-covered area of a <a href="https://confluence.ecmwf.int/display/CKB/ERA5%253A+What+is+the+spatial+reference">grid
    box</a>.<br>

    The <a href="https://www.ecmwf.int/sites/default/files/elibrary/2016/17117-part-iv-physical-processes.pdf#section.H.4"
    >ECMWF Integrated Forecast System represents snow</a>&nbsp;as additional layer(s)
    over the uppermost soil level. The snow may cover all or part of the grid box.
    This parameter corresponds to the mass of liquid water per unit area of evaporated
    snow (from the snow-covered area of a <a href="https://confluence.ecmwf.int/display/CKB/ERA5%253A+What+is+the+spatial+reference">grid
    box</a>).<br>

    This parameter is accumulated over a <a href="https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations">&nbsp;particular
    time period which depends on the data extracted</a>.<br>

    The ECMWF Integrated Forecasting System convention is that downward fluxes are
    positive. Therefore, negative values indicate evaporation and positive values
    indicate deposition.'
- id: 235073
  shortname: tietrf
  longname: Time integral of evapotranspiration flux
  units: kg m**-2
  description: 'This parameter is the accumulated amount of water that has evaporated
    from the different surfaces (e.g. soil, water bodies) and from the vegetation
    transpiration in a grid box, into vapour in the air above.<br>

    This parameter is accumulated over a <a href=''https://confluence.ecmwf.int/display/CKB/ERA5%3A+data+documentation#ERA5:datadocumentation-Meanrates/fluxesandaccumulations''>particular
    time period which depends on the data extracted</a>.<br>

    The ECMWF Integrated Forecasting System convention is that downward fluxes are
    positive. Therefore, negative values indicate evaporation and positive values
    indicate condensation.'
