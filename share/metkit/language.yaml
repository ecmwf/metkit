      - [bc, boundary conditions]
      - [monday, mon]
      - [tuesday, tue]
      - [wednesday, wed]
      - [thursday, thu]
      - [friday, fri]
      - [saturday, sat]
      - [sunday, sun]

  option:
    category: sink
    default: normal
    flatten: false
    multiple: true
    type: enum
    values:
