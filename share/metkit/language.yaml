      - [e, europe]

  grid:
    category: postproc
    flatten: false
    multiple: true
    type: [enum, regex, float]
    values:
      - auto
      - [av, archived value]
      - [F16, 16]
      - [F24, 24]
      - [F32, 32]
      - [F48, 48]
      - [F64, 64]
      - [F80, 80]
      - [F96, 96]
      - [F128, 128]
      - [F160, 160]
      - [F192, 192]
      - [F200, 200]
      - [F256, 256]
      - [F320, 320]
      - [F400, 400]
      - [F512, 512]
      - [F576, 576]
      - [F640, 640]
      - [F800, 800]
      - [F912, 912]
      - [F1024, 1024]
      - [F1280, 1280]
      - [F1600, 1600]
      - [F2000, 2000]
      - [F2560, 2560]
      - [F4000, 4000]
      - [F8000, 8000]
    regex:
      - '^[oOfF][1-9][0-9]*$'
      - '^[nN](32|48|64|80|96|128|160|200|256|320|400|512|640|800|1024|1280|8000)$'
      - '^[hH][rRnN]?(1|2|4|8|16|32|64|128|256|512|1024|2048|4096|8192)$'
    uppercase: true

  interpolation:
    category: postproc
    flatten: false
    type: enum
    values:
      - [linear]
      - [bilinear]
      - [nearest-lsm, nlsm, nearest lsm]
      - [nearest-neighbour, nn, nearest neighbour]
      - [grid-box-average, average]

  packing:
    category: postproc
    flatten: false
    type: enum
    values:
      - [so, second order]
      - [av]
      - [complex, co]
      - [simple, si]
      - [ccsds]

  resol:
    category: postproc
    flatten: false
    type: [enum, integer]
    values:
      - [av, archived value]
      - [auto, automatic resolution]
      - [N128, reduced gaussian 128]
      - [N200, reduced gaussian 200]

  rotation:
    category: postproc
    flatten: false
    multiple: true
    type: float

  intgrid:
    category: postproc
    flatten: false
    type: [enum, regex]
    values:
      - auto
      - N32
      - N48
      - N64
      - N80
      - N96
      - N128
      - N160
      - N192
      - N200
      - N256
      - N320
      - N400
      - N512
      - N640
      - N800
      - N912
      - N1024
      - N1280
    regex:
      - '^[oOfFhH][1-9][0-9]+$'

  truncation:
    category: postproc
    flatten: false
    type: [enum, integer]
    values:
      - auto
      - none

  process:
    category: postproc
    flatten: false
    type: enum
    values:
      - local
      - server

#######################################################################

_obspproc: &_obspproc

  filter:
    type: any
    category: postproc

  ident:
    type: any
    category: postproc

